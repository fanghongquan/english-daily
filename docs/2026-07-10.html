<script>
const ARTICLE = {"date": "2026-07-10", "level": "CET-4", "title": "Beyond Helping Others: The Unexpected Gains from Volunteering", "title_zh": "超越助人：从志愿服务中获得的意外收获", "intro_zh": "本文约1000词，探讨做志愿者的多重收获，包括个人成长、社交拓展、职业发展和心理健康，并引用调查数据支持观点。", "paragraphs": [{"en": "Many people think volunteering is simply about giving time to help others. However, research and personal stories show that <span class=\"kw\" data-ipa=\"ˈvoʊlənˌtɪrɪŋ\" data-def=\"志愿活动\">volunteering</span> brings unexpected benefits to the volunteers themselves. From building new skills to improving mental health, the gains are often more profound than the help provided.", "zh": "许多人认为志愿服务仅仅是付出时间帮助他人。然而，研究和个人经历表明，志愿服务为志愿者本人带来了意想不到的好处。从培养新技能到改善心理健康，这些收获往往比所提供的帮助更加深远。"}, {"en": "First, volunteering helps people develop practical skills. For example, a college student who tutors children in math may improve her own <span class=\"kw\" data-ipa=\"ˌkɑːmjuːnɪˈkeɪʃən\" data-def=\"沟通\">communication</span> and <span class=\"kw\" data-ipa=\"ˈlɛdʒərˌʃɪp\" data-def=\"领导力\">leadership</span> abilities. A 2021 survey by the Corporation for National and Community Service found that 76% of volunteers said they gained new skills through their service. These abilities can be valuable in future <span class=\"kw\" data-ipa=\"ˈkærɪr\" data-def=\"职业\">career</span> paths.", "zh": "首先，志愿服务帮助人们培养实用技能。例如，一名辅导儿童数学的大学生可能提高自己的沟通和领导能力。美国国家与社区服务公司2021年的一项调查发现，76%的志愿者表示他们通过服务获得了新技能。这些能力在未来的职业道路上可能很有价值。"}, {"en": "Second, volunteering creates social connections. When people work together for a common cause, they often form strong <span class=\"kw\" data-ipa=\"bɒndz\" data-def=\"纽带\">bonds</span>. A study from the University of Michigan showed that volunteers have larger social networks and higher levels of <span class=\"kw\" data-ipa=\"səˈpɔːrt\" data-def=\"支持\">support</span>. For international students or newcomers to a city, volunteering can be a great way to meet people and feel a sense of <span class=\"kw\" data-ipa=\"bɪˈlɒŋɪŋ\" data-def=\"归属感\">belonging</span>.", "zh": "其次，志愿服务创造社交联系。当人们为了共同的目标一起工作时，往往会形成牢固的纽带。密歇根大学的一项研究表明，志愿者拥有更大的社交网络和更高水平的支持。对于国际学生或刚到一个城市的人来说，志愿服务是结识朋友、获得归属感的好方法。"}, {"en": "Third, volunteering boosts mental health. Helping others can reduce <span class=\"kw\" data-ipa=\"ˈstrɛs\" data-def=\"压力\">stress</span> and increase happiness. A longitudinal study by the London School of Economics found that people who volunteered reported higher <span class=\"kw\" data-ipa=\"laɪf səˈtɪsfækʃən\" data-def=\"生活满意度\">life satisfaction</span> than those who did not. The act of giving releases <span class=\"kw\" data-ipa=\"ˌendəˈfɪnz\" data-def=\"内啡肽\">endorphins</span>, creating a natural high often called \"helper's high\".", "zh": "第三，志愿服务促进心理健康。帮助他人可以减轻压力、增加幸福感。伦敦政治经济学院的一项纵向研究发现，参与志愿服务的人比不参与的人生活满意度更高。给予的行为会释放内啡肽，产生一种被称为“助人者快感”的自然愉悦感。"}, {"en": "Fourth, volunteering offers a sense of purpose. Many people struggle to find meaning in their daily routines. By <span class=\"kw\" data-ipa=\"kənˈtrɪbjutɪŋ\" data-def=\"贡献\">contributing</span> to something larger than themselves, volunteers often feel a stronger sense of <span class=\"kw\" data-ipa=\"ˈpɜːrpəs\" data-def=\"目标\">purpose</span>. For example, a retired teacher who volunteers at a local library may feel valued and needed again.", "zh": "第四，志愿服务提供目标感。许多人在日常生活中难以找到意义。通过为比自己更大的事业做贡献，志愿者常常感受到更强的目标感。例如，一位退休教师在当地图书馆做志愿者，可能会再次感到被重视和被需要。"}, {"en": "Fifth, volunteering can improve career prospects. Employers often look for candidates with <span class=\"kw\" data-ipa=\"ˈvaɪtəl\" data-def=\"重要的\">vital</span> soft skills like teamwork and problem-solving. Volunteering provides real-world experience that can be listed on a <span class=\"kw\" data-ipa=\"rɪˈzjuːm\" data-def=\"简历\">resume</span>. A 2022 LinkedIn survey found that 41% of hiring managers considered volunteer work as valuable as paid work when evaluating <span class=\"kw\" data-ipa=\"kænˈdɪdeɪts\" data-def=\"候选人\">candidates</span>.", "zh": "第五，志愿服务可以提升职业前景。雇主通常寻找具备团队合作和解决问题等重要软技能的候选人。志愿服务提供了可以写在简历上的真实经验。2022年领英的一项调查发现，41%的招聘经理在评估候选人时认为志愿工作和有偿工作同等有价值。"}, {"en": "Lastly, volunteering fosters personal growth. Volunteers often step out of their comfort zones and face new challenges. This builds <span class=\"kw\" data-ipa=\"rɪˈzaɪliəns\" data-def=\"韧性\">resilience</span> and <span class=\"kw\" data-ipa=\"sɛlf kənˈfɪdəns\" data-def=\"自信\">self-confidence</span>. A 2019 study in the Journal of Happiness Studies found that volunteers reported higher levels of personal growth compared to non-volunteers.", "zh": "最后，志愿服务促进个人成长。志愿者常常走出舒适区，面对新的挑战。这培养了他们韧性和自信心。2019年《幸福研究杂志》的一项研究发现，与非志愿者相比，志愿者报告了更高水平的个人成长。"}, {"en": "In conclusion, volunteering is not just a one-way street of giving. It brings <span class=\"kw\" data-ipa=\"ˈmʌltɪpl\" data-def=\"多重的\">multiple</span> benefits to the volunteer, from skill development and social connections to mental well-being and career advancement. So why not start today? Find a cause you care about and experience the <span class=\"kw\" data-ipa=\"trænsˈfɔːrmətɪv\" data-def=\"变革性的\">transformative</span> power of helping others.", "zh": "总之，志愿服务并非单向的付出。它为志愿者带来了多重好处，从技能发展和社交联系到心理健康和职业发展。那么，何不从今天开始？找一个你关心的事业，体验帮助他人的变革性力量。"}], "questions": [{"q": "What is the main idea of the passage?", "options": ["Volunteering is only beneficial for the recipients.", "Volunteering offers unexpected gains to volunteers.", "Volunteering requires special skills.", "Volunteering is a waste of time."], "answer": 1, "explain": "主旨题。文章开篇即点明志愿服务为志愿者带来意想不到的好处，后续段落分别从技能、社交、心理、目标、职业、个人成长等方面阐述。选项B正确。"}, {"q": "According to the 2021 survey mentioned in paragraph 2, what percentage of volunteers gained new skills?", "options": ["41%", "76%", "50%", "90%"], "answer": 1, "explain": "细节题。第二段明确提到“a 2021 survey ... found that 76% of volunteers said they gained new skills”。选项B正确。"}, {"q": "What does the word 'endorphins' in paragraph 4 most likely mean?", "options": ["A type of stress hormone", "Chemicals that cause pain", "Natural substances that make you feel good", "Vitamins that boost energy"], "answer": 2, "explain": "词义题。第四段提到“releases endorphins, creating a natural high”，说明内啡肽是能带来愉悦感的天然物质。选项C正确。"}, {"q": "Which of the following is NOT mentioned as a benefit of volunteering in the passage?", "options": ["Improving mental health", "Earning more money", "Developing communication skills", "Expanding social networks"], "answer": 1, "explain": "细节题。文章提到了心理健康（第三段）、沟通技能（第二段）、社交网络（第三段），但未提及赚钱。选项B不是文章提到的益处。"}]};
const TTS_API = "https://1300942703-hhwd575mtt.ap-guangzhou.tencentscf.com";
let rate = 0.95;
let voice = parseInt(localStorage.getItem('ttsVoice') || '101051', 10);
const cloudOn = TTS_API && TTS_API.indexOf('__') !== 0;

/* ========== 发音引擎(腾讯云按需 + 浏览器回退) ========== */
let usVoice=null;
function pickFallback(){ const vs=speechSynthesis.getVoices();
  usVoice=vs.find(v=>/en-US/i.test(v.lang)&&/Google|Natural|Neural|Enhanced|Siri|Premium/i.test(v.name))
        ||vs.find(v=>v.lang==='en-US')||vs.find(v=>/^en/i.test(v.lang))||null; }
pickFallback(); speechSynthesis.onvoiceschanged=pickFallback;

  const u=new SpeechSynthesisUtterance(text); u.lang='en-US'; u.rate=rate;
  if(usVoice)u.voice=usVoice; speechSynthesis.speak(u); }

const clipCache=new Map(); let curAudio=null, token=0;
function stopAll(){ token++; if(curAudio){curAudio.pause();curAudio=null;} speechSynthesis.cancel();
  document.querySelectorAll('.speaking').forEach(e=>e.classList.remove('speaking')); }
function splitClient(text){ const parts=text.trim().split(/(?<=[.!?;:])\s+/); const out=[]; let buf='';
  for(let s of parts){ while(s.length>180){ let c=s.lastIndexOf(' ',180); if(c<=0)c=180;
    out.push(s.slice(0,c)); s=s.slice(c).trim(); }
    if((buf+' '+s).trim().length<=180) buf=(buf+' '+s).trim();
    else { if(buf)out.push(buf); buf=s; } }
  if(buf)out.push(buf); return out.length?out:[text.trim()]; }
async function fetchClip(text){ const key=voice+'|'+text;
  if(clipCache.has(key))return clipCache.get(key);
  const r=await fetch(TTS_API,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({text,voice})});
  if(!r.ok)throw new Error('http'+r.status); const j=await r.json();
  if(!j.audio)throw new Error(j.error||'no audio');
  const url='data:audio/mp3;base64,'+j.audio; clipCache.set(key,url); return url; }
function playClip(url){ return new Promise((res,rej)=>{ const a=new Audio(url);
  a.playbackRate=rate; curAudio=a; a.onended=res; a.onerror=()=>rej(new Error('audio'));
  a.play().catch(rej); }); }
async function play(text, hiEl){
  if(!text) return; stopAll(); const my=token;
  if(hiEl)hiEl.classList.add('speaking');
  try{
    if(!cloudOn){ speakFallback(text); return; }
    const parts=splitClient(text);
    for(let i=0;i<parts.length;i++){ if(my!==token)return;
      const cur=fetchClip(parts[i]); if(i+1<parts.length)fetchClip(parts[i+1]).catch(()=>{});
      let url; try{ url=await cur; }catch(e){ speakFallback(parts.slice(i).join(' ')); return; }
      if(my!==token)return; await playClip(url); }
  } finally { if(my===token&&hiEl)hiEl.classList.remove('speaking'); }
}

/* 理解自测：渲染 CET-4 选择题，点选后判分并显示答案+解析 */
function esc(s){ return (s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
const LAB=['A','B','C','D','E','F'];
const quizEl=document.getElementById('quiz');
const QS=Array.isArray(ARTICLE.questions)?ARTICLE.questions:[];
if(QS.length){
  QS.forEach((q,qi)=>{
    const opts=Array.isArray(q.options)?q.options:[];
    let ans=q.answer;
    if(typeof ans==='string'){ ans='ABCDEF'.indexOf(ans.trim().toUpperCase()); }
    if(typeof ans!=='number'||ans<0||ans>=opts.length) ans=0;
    const card=document.createElement('div'); card.className='q';
    card.innerHTML='<div class="stem"><span class="num">Q'+(qi+1)+'.</span>'+esc(q.q||q.question||'')+'</div>';
    opts.forEach((o,oi)=>{
      const b=document.createElement('button'); b.className='opt'; b.type='button';
      b.innerHTML='<span class="lab">'+LAB[oi]+'</span><span>'+esc(o)+'</span>';
      b.onclick=()=>{ if(card.dataset.done) return; card.dataset.done='1';
        card.querySelectorAll('.opt').forEach((x,xi)=>{ x.disabled=true;
          if(xi===ans) x.classList.add('correct');
          else if(xi===oi) x.classList.add('wrong'); });
        const e=card.querySelector('.exp'); if(e) e.classList.add('show'); };
      card.appendChild(b);
    });
    const exp=document.createElement('div'); exp.className='exp';
    exp.innerHTML='<b>答案 '+LAB[ans]+'</b>　'+esc(q.explain||q.explanation||'');
    card.appendChild(exp);
    quizEl.appendChild(card);
  });
} else {
  document.getElementById('quiz-sec').style.display='none';   // 旧文章没有题目则隐藏
}

/* ========== toast ========== */
let toastT=null;
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),1600); }
async function doAdd(text){ text=(text||'').trim(); if(!text) return;
  if(!cloudOn){ toast('需云函数支持'); return; }
  toast('正在加入墨墨…');
  try{
    const r=await fetch(TTS_API,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({op:'maimemo',text})});
    const j=await r.json();
    if(j.ok){ toast(j.dup?'已经在墨墨里了':('已加入墨墨 ✓ 共 '+(j.total||'?')+' 词')); }
    else { toast('加入失败'+(j.error?'：'+j.error:'')); }
  }catch(e){ toast('加入失败，请重试'); } }

/* ========== 双击加生词，其他选词行为交给系统默认菜单 ========== */
const selbar=document.getElementById('selbar');
let selText='';
const artEl=document.getElementById('article');

function tokenize(){
  artEl.querySelectorAll('.en').forEach(en=>{
    en.querySelectorAll('.kw').forEach(k=>{ k.classList.add('tok');
      k.dataset.w=(k.firstChild.textContent||k.textContent).trim(); });
    const tw=document.createTreeWalker(en, NodeFilter.SHOW_TEXT, null);
    const nodes=[]; let n;
    while(n=tw.nextNode()){ const p=n.parentNode;
      if(p.classList&&(p.classList.contains('ipa')||p.classList.contains('tok'))) continue;
      if(p.closest&&p.closest('.kw')) continue;
      if(n.nodeValue.trim()) nodes.push(n); }
    nodes.forEach(tn=>{
      const frag=document.createDocumentFragment();
      tn.nodeValue.split(/(\s+)/).forEach(part=>{
        if(part==='') return;
        if(/^\s+$/.test(part)) frag.appendChild(document.createTextNode(part));
        else { const s=document.createElement('span'); s.className='tok';
          s.dataset.w=part; s.textContent=part; frag.appendChild(s); }
      });
      tn.parentNode.replaceChild(frag, tn);
    });
  });
}
tokenize();
let TOKENS=[];
function indexTokens(){ TOKENS=[...artEl.querySelectorAll('.tok')]; TOKENS.forEach((t,i)=>t.dataset.i=i); }
indexTokens();

function cleanToken(text){ return (text||'').trim().replace(/^[^A-Za-z]+|[^A-Za-z]+$/g,''); }
function clearSel(){ selbar.style.display='none'; selText=''; }
function showBar(tok){ selbar.style.display='flex';
  const r=tok.getBoundingClientRect();
  const bw=selbar.offsetWidth, bh=selbar.offsetHeight;
  let cx=Math.min(Math.max(r.left+r.width/2, bw/2+8), window.innerWidth-bw/2-8);  // 收拢进屏幕
  let top=r.top-8; if(top<bh+8) top=r.bottom+bh+12;          // 离顶太近则移到下方
  selbar.style.left=cx+'px'; selbar.style.top=top+'px'; }

artEl.addEventListener('dblclick', e=>{
  const tok=e.target.closest&&e.target.closest('.tok');
  if(!tok||!artEl.contains(tok)){ clearSel(); return; }
  selText=cleanToken(tok.dataset.w||tok.textContent);
  if(!selText){ clearSel(); return; }
  showBar(tok);
}, true);
document.getElementById('sel-add').onclick=()=>{ if(selText){ doAdd(selText); clearSel(); } };
document.addEventListener('click', e=>{ if(e.target.closest&&!e.target.closest('#selbar')) clearSel(); }, true);
document.addEventListener('scroll',()=>{ selbar.style.display='none'; }, true);

</script>
