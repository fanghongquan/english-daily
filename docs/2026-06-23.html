<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日英语 · From Ethiopian Highlands to Global Cups: How Coffee Conquered the World</title>
<style>
  :root{
    --bg:#f6f7f9; --card:#fff; --ink:#1f2329; --sub:#646a73;
    --line:#e5e6eb; --accent:#3370ff; --accent-soft:#eaf0ff;
    --kw:#1456f0; --zh:#8a5a00; --zhbg:#fff8ec;
    --know:#2ea043; --fuzzy:#d29302; --forget:#e5484d;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Segoe UI,Roboto,sans-serif;
    line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:720px;margin:0 auto;padding:18px 16px 120px}
  header{padding:6px 2px 14px;border-bottom:1px solid var(--line);margin-bottom:18px}
  .meta{font-size:12px;color:var(--sub);letter-spacing:.5px;text-transform:uppercase}
  h1{font-size:24px;margin:8px 0 4px;line-height:1.3}
  .h1zh{font-size:15px;color:var(--sub);margin:0}
  .intro{font-size:13px;color:var(--sub);background:var(--card);border:1px solid var(--line);
    border-radius:10px;padding:10px 12px;margin-top:14px}
  .toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:16px 0 4px}
  .btn{border:1px solid var(--line);background:var(--card);color:var(--ink);
    border-radius:20px;padding:6px 13px;font-size:13px;cursor:pointer;transition:.15s}
  .btn:hover{border-color:var(--accent);color:var(--accent)}
  .btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .speed{font-size:12px;color:var(--sub);display:flex;align-items:center;gap:6px}
  .vsel{font-size:12px;border:1px solid var(--line);border-radius:8px;padding:4px 6px;
    background:var(--card);color:var(--ink)}
  .para{background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:14px 16px;margin:14px 0;box-shadow:0 1px 2px rgba(0,0,0,.02)}
  .en{font-size:17px;line-height:1.85}
  .en .kw{color:var(--kw);font-weight:700;cursor:pointer;border-bottom:1px dashed rgba(20,86,240,.4)}
  .en .kw .ipa{font-size:.72em;font-weight:500;color:var(--sub);margin-left:2px;white-space:nowrap}
  .en .kw:hover{background:var(--accent-soft);border-radius:3px}
  .ptools{display:flex;gap:10px;margin-top:10px}
  .icbtn{border:none;background:var(--accent-soft);color:var(--accent);border-radius:8px;
    padding:5px 11px;font-size:12.5px;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
  .icbtn:hover{background:#dce7ff}
  .zh{display:none;margin-top:11px;padding-top:11px;border-top:1px dashed var(--line);
    font-size:14.5px;color:var(--zh);background:var(--zhbg);margin-left:-16px;margin-right:-16px;
    margin-bottom:-14px;padding:11px 16px 14px;border-radius:0 0 12px 12px}
  .para.show-zh .zh{display:block}
  h2.vh{font-size:18px;margin:30px 0 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  h2.vh .cnt{font-size:13px;color:var(--sub);font-weight:400}
  .vlist{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .vrow{display:flex;align-items:center;gap:8px;padding:11px 14px;border-bottom:1px solid var(--line)}
  .vrow:last-child{border-bottom:none}
  .vrow .w{font-weight:700;color:var(--kw);min-width:120px;cursor:pointer}
  .vrow .vipa{color:var(--sub);font-size:13px;min-width:140px}
  .vrow .vdef{color:var(--ink);font-size:14px;flex:1}
  .vrow .mini{border:none;background:var(--accent-soft);color:var(--accent);border-radius:6px;
    padding:3px 8px;font-size:12px;cursor:pointer}
  .vrow .mini:hover{background:#dce7ff}
  /* 复习模块 */
  #review{margin-top:30px}
  .rvcard{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:26px 18px;text-align:center;box-shadow:0 1px 2px rgba(0,0,0,.03)}
  .rv-type{font-size:12px;color:var(--sub);margin-bottom:10px}
  .rv-text{font-size:24px;font-weight:600;line-height:1.5;margin:6px 0 16px;word-break:break-word}
  .rv-text.sent{font-size:19px;font-weight:500}
  .rv-play{border:1px solid var(--line);background:var(--card);color:var(--accent);
    border-radius:20px;padding:7px 18px;font-size:14px;cursor:pointer;margin-bottom:20px}
  .rv-play:hover{border-color:var(--accent)}
  .rv-grade{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .rv-grade button{border:none;border-radius:10px;padding:11px 22px;font-size:15px;
    font-weight:600;color:#fff;cursor:pointer;transition:.15s;min-width:92px}
  .rv-grade button:active{transform:scale(.96)}
  .g-know{background:var(--know)}
  .g-fuzzy{background:var(--fuzzy)}
  .g-forget{background:var(--forget)}
  .rv-progress{font-size:12px;color:var(--sub);margin-top:16px}
  .rv-empty{font-size:15px;color:var(--sub);padding:18px 0}
  .rv-empty .big{font-size:30px;display:block;margin-bottom:8px}
  .syncbar{display:flex;align-items:center;justify-content:space-between;gap:10px;
    margin-top:12px;font-size:13px;color:var(--sub);flex-wrap:wrap}
  /* 选中弹出条 */
  #selbar{position:fixed;z-index:50;display:none;transform:translate(-50%,-100%);
    background:#1f2329;border-radius:12px;padding:5px;box-shadow:0 4px 14px rgba(0,0,0,.28);
    white-space:nowrap;gap:4px}
  #selbar button{background:transparent;border:none;color:#fff;font-size:13px;
    padding:7px 12px;border-radius:8px;cursor:pointer}
  #selbar button:hover{background:rgba(255,255,255,.15)}
  #selbar .sep{width:1px;background:rgba(255,255,255,.2);margin:5px 0}
  /* toast */
  #toast{position:fixed;left:50%;bottom:40px;transform:translateX(-50%) translateY(20px);
    background:#1f2329;color:#fff;padding:10px 18px;border-radius:22px;font-size:14px;
    opacity:0;pointer-events:none;transition:.25s;z-index:60}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #transbox{position:fixed;z-index:55;display:none;transform:translate(-50%,0);
    max-width:300px;background:#fff;color:var(--ink);border:1px solid var(--line);
    border-radius:10px;padding:10px 13px;font-size:14.5px;line-height:1.5;
    box-shadow:0 6px 20px rgba(0,0,0,.18)}
  #transbox .tb-en{font-size:12px;color:var(--sub);margin-bottom:4px;
    max-height:34px;overflow:hidden}
  #transbox .tb-zh{color:var(--zh)}
  footer{text-align:center;color:var(--sub);font-size:12px;margin-top:36px}
  .tip{font-size:12px;color:var(--sub);margin:2px 0 0}
  .speaking{background:#fff3cd !important;border-radius:3px}
  /* 禁用系统选中菜单(翻译/查询/Look Up)，改用自定义选择 */
  body{-webkit-touch-callout:none}
  .en,.vrow,.rvcard,.rv-text{-webkit-user-select:none;-moz-user-select:none;user-select:none}
  .en .tok{cursor:pointer}
  .en .tok.sel{background:#cfe0ff;border-radius:3px}
  /* ---- 手机端排版优化 ---- */
  @media (max-width:480px){
    .wrap{padding:14px 12px 100px}
    h1{font-size:21px}
    .h1zh{font-size:14px}
    .intro{font-size:12.5px}
    .en{font-size:16.5px;line-height:1.8}
    .en .kw .ipa{font-size:.62em;margin-left:1px}
    h2.vh{font-size:16.5px;margin:24px 0 10px}
    .toolbar{gap:6px}
    .btn{padding:6px 11px;font-size:12.5px}
    .vrow{flex-wrap:wrap;gap:6px 8px;padding:11px 12px}
    .vrow .w{min-width:0;order:1;font-size:15px}
    .vrow .vipa{min-width:0;flex:1;order:2;font-size:11.5px}
    .vrow .pl{order:3}
    .vrow .ad{order:4}
    .vrow .vdef{order:5;flex-basis:100%;font-size:13.5px;color:var(--sub);margin-top:1px}
    .rvcard{padding:22px 14px}
    .rv-text{font-size:22px}
    .rv-grade button{padding:10px 16px;font-size:14px;min-width:80px}
  }
</style>
</head>

<script>
const ARTICLE = {"date": "2026-06-23", "level": "CET-4", "title": "From Ethiopian Highlands to Global Cups: How Coffee Conquered the World", "title_zh": "从埃塞俄比亚高地到全球杯子：咖啡如何征服世界", "intro_zh": "本文约1000词，讲述了咖啡从非洲起源到风靡全球的传播历程，涉及历史传说、贸易路线、文化影响等。", "paragraphs": [{"en": "Today, coffee is one of the most popular <span class=\"kw\" data-ipa=\"/bɛvərɪdʒ/\" data-def=\"n. 饮料\">beverages</span> worldwide, with over 2.25 billion cups consumed every day. But its journey from a wild plant in Ethiopia to a global <span class=\"kw\" data-ipa=\"/ˈkɑːmədi/\" data-def=\"n. 商品\">commodity</span> is a fascinating story of trade, culture, and <span class=\"kw\" data-ipa=\"/ˌɪnɑːˈveɪʃən/\" data-def=\"n. 创新\">innovation</span>. This article explores how coffee spread across continents and became an essential part of modern life.", "zh": "如今，咖啡是全球最受欢迎的饮料之一，每天消费超过22.5亿杯。但它从埃塞俄比亚的一种野生植物到成为全球商品的过程，是一个关于贸易、文化和创新的迷人故事。本文探讨了咖啡如何跨越大陆传播，并成为现代生活不可或缺的一部分。"}, {"en": "The story begins in the highlands of Ethiopia, where coffee <span class=\"kw\" data-ipa=\"/ˈtriːz/\" data-def=\"n. 树（复数）\">trees</span> grew wild. According to <span class=\"kw\" data-ipa=\"/ˈledʒənd/\" data-def=\"n. 传说\">legend</span>, a goat herder named Kaldi noticed his goats became very energetic after eating red berries from a certain tree. He tried the berries himself and felt a new <span class=\"kw\" data-ipa=\"/vɪˈgɔr/\" data-def=\"n. 活力\">vigor</span>. This discovery soon reached local monks, who used the berries to stay awake during long hours of prayer. By the 15th century, coffee was being cultivated in Yemen, just across the Red Sea.", "zh": "故事始于埃塞俄比亚高地，那里野生着咖啡树。据传说，一位名叫卡尔迪的牧羊人注意到他的山羊在吃了某种树上的红色浆果后变得非常精力充沛。他亲自尝试了浆果，感到一种新的活力。这一发现很快传到了当地僧侣那里，他们用这种浆果在长时间祈祷时保持清醒。到了15世纪，咖啡已经在红海对岸的也门被种植。"}, {"en": "From Yemen, coffee spread to the <span class=\"kw\" data-ipa=\"/ˈmɪdl̩ iːst/\" data-def=\"n. 中东\">Middle East</span>. In the 16th century, coffeehouses appeared in cities like <span class=\"kw\" data-ipa=\"/ˈmɛkə/\" data-def=\"n. 麦加\">Mecca</span>, Cairo, and Istanbul. These places became centers for socializing, music, and <span class=\"kw\" data-ipa=\"/dɪˈbeɪt/\" data-def=\"n. 辩论\">debate</span>. However, some religious leaders viewed coffee as an <span class=\"kw\" data-ipa=\"/ɪnˈtɑksɪkənt/\" data-def=\"n. 兴奋剂\">intoxicant</span> and tried to ban it. Despite such opposition, coffee’s popularity grew, and by the early 1600s, it had reached Europe through Venetian merchants.", "zh": "从也门，咖啡传播到了中东。16世纪，咖啡馆出现在麦加、开罗和伊斯坦布尔等城市。这些地方成为社交、音乐和辩论的中心。然而，一些宗教领袖认为咖啡是兴奋剂，试图禁止它。尽管有这些反对声音，咖啡的受欢迎程度仍在增长，到17世纪初，它通过威尼斯商人传到了欧洲。"}, {"en": "In Europe, coffee was initially met with <span class=\"kw\" data-ipa=\"/səˈspɪʃən/\" data-def=\"n. 怀疑\">suspicion</span> and called the \"bitter invention of Satan.\" But after Pope Clement VIII tasted it and gave his approval, coffee became <span class=\"kw\" data-ipa=\"/əˈseptəbl/\" data-def=\"adj. 可接受的\">acceptable</span> for Christians. Soon, coffeehouses began to <span class=\"kw\" data-ipa=\"/ˈflʌrɪʃ/\" data-def=\"v. 繁荣\">flourish</span> in major European cities like London, Paris, and Vienna. These establishments were nicknamed \"penny universities\" because for the price of a penny, one could engage in <span class=\"kw\" data-ipa=\"/ˌɪntəˈlektʃuəl/\" data-def=\"adj. 知识的\">intellectual</span> conversation and access newspapers.", "zh": "在欧洲，咖啡最初遭到怀疑，被称为“撒旦的苦涩发明”。但在教皇克莱门特八世品尝并认可后，咖啡对基督徒来说变得可接受。很快，咖啡馆开始在伦敦、巴黎和维也纳等欧洲主要城市繁荣起来。这些场所被称为“便士大学”，因为花一便士就可以参与知识性谈话并阅读报纸。"}, {"en": "The <span class=\"kw\" data-ipa=\"/ˈkɒlənaɪ/\" data-def=\"n. 殖民地\">colony</span> system played a huge role in coffee’s global spread. European powers planted coffee in their tropical <span class=\"kw\" data-ipa=\"/kəˈlʌmbəs/\" data-def=\"n. 殖民地\">colonies</span> in Asia, Africa, and the Americas. The Dutch brought coffee to Java (Indonesia) in the 17th century, and the French to the Caribbean. Brazil became the world’s largest coffee producer after a <span class=\"kw\" data-ipa=\"/ˈskændl/\" data-def=\"n. 丑闻\">scandal</span> involving a smuggled seedling from French Guiana. By the 19th century, coffee was a major global <span class=\"kw\" data-ipa=\"/ˈkɑːmədi/\" data-def=\"n. 商品\">commodity</span>.", "zh": "殖民地体系在咖啡的全球传播中发挥了巨大作用。欧洲列强在亚洲、非洲和美洲的热带殖民地种植咖啡。荷兰人在17世纪将咖啡带到爪哇（印度尼西亚），法国人则带到加勒比地区。巴西在一次涉及从法属圭亚那走私幼苗的丑闻后，成为世界上最大的咖啡生产国。到19世纪，咖啡已成为一种主要的全球商品。"}, {"en": "In the 20th century, coffee underwent further <span class=\"kw\" data-ipa=\"/ˌtrænsfərˈmeɪʃən/\" data-def=\"n. 转变\">transformation</span>. The invention of instant coffee in 1901 by a Japanese chemist made it more <span class=\"kw\" data-ipa=\"/kənˈviːniənt/\" data-def=\"adj. 方便的\">convenient</span> to prepare. Meanwhile, companies like Starbucks and Dunkin’ Donuts <span class=\"kw\" data-ipa=\"/rɪˈvɑːljuːʃənaɪz/\" data-def=\"v. 彻底改变\">revolutionized</span> the coffee shop experience, turning it into a global <span class=\"kw\" data-ipa=\"/ˈtrend/\" data-def=\"n. 趋势\">trend</span>. Today, specialty coffee—focusing on single-origin beans and artisanal roasting—has become a <span class=\"kw\" data-ipa=\"/ˈbʊmɪŋ/\" data-def=\"adj. 繁荣的\">booming</span> industry.", "zh": "20世纪，咖啡经历了进一步的转变。1901年，一位日本化学家发明了速溶咖啡，使其制备更加方便。同时，星巴克和唐恩都乐等公司彻底改变了咖啡店体验，使其成为全球趋势。如今，专注于单一产地豆和手工烘焙的特色咖啡已成为一个蓬勃发展的行业。"}, {"en": "The cultural <span class=\"kw\" data-ipa=\"/ɪmˈpækt/\" data-def=\"n. 影响\">impact</span> of coffee is undeniable. It has given rise to unique <span class=\"kw\" data-ipa=\"/ˈrɪtʃuəlz/\" data-def=\"n. 仪式\">rituals</span> like the Japanese siphon brewing and the Italian espresso. Coffee breaks are a standard part of work culture worldwide. Moreover, coffee farming supports millions of smallholder <span class=\"kw\" data-ipa=\"/ˈfɑːmərz/\" data-def=\"n. 农民\">farmers</span> in developing countries, though the industry also faces challenges such as fair trade and <span class=\"kw\" data-ipa=\"/səˈsteɪnəbɪlɪti/\" data-def=\"n. 可持续性\">sustainability</span>.", "zh": "咖啡的文化影响不可否认。它催生了独特的仪式，如日本虹吸壶冲泡和意大利浓缩咖啡。咖啡休息时间已成为全球工作文化的标准部分。此外，咖啡种植业支撑着发展中国家数百万小农的生计，尽管该行业也面临公平贸易和可持续性等挑战。"}, {"en": "From its humble beginnings in Ethiopian forests to the modern espresso machine, coffee’s journey reflects human <span class=\"kw\" data-ipa=\"/kəˈnɛkʃən/\" data-def=\"n. 联系\">connection</span> and <span class=\"kw\" data-ipa=\"/kriˈeɪtɪvɪti/\" data-def=\"n. 创造力\">creativity</span>. It is more than a drink; it is a global <span class=\"kw\" data-ipa=\"/ˈfɛnəmɪnən/\" data-def=\"n. 现象\">phenomenon</span> that brings people together. Whether you prefer a simple black coffee or a <span class=\"kw\" data-ipa=\"/ˈleɪti/\" data-def=\"n. 拿铁\">latte</span>, you are part of a history that spans centuries and continents.", "zh": "从埃塞俄比亚森林中的不起眼起点到现代浓缩咖啡机，咖啡的旅程反映了人类的联系和创造力。它不仅仅是一种饮品，而是一种将人们聚集在一起的全球现象。无论你喜欢简单的黑咖啡还是拿铁，你都是跨越几个世纪和各大洲的历史的一部分。"}], "vocab": [{"w": "beverage", "ipa": "/ˈbɛvərɪdʒ/", "def": "n. 饮料"}, {"w": "commodity", "ipa": "/kəˈmɑːdəti/", "def": "n. 商品"}, {"w": "innovation", "ipa": "/ˌɪnəˈveɪʃən/", "def": "n. 创新"}, {"w": "legend", "ipa": "/ˈlɛdʒənd/", "def": "n. 传说"}, {"w": "vigor", "ipa": "/ˈvɪɡər/", "def": "n. 活力"}, {"w": "Middle East", "ipa": "/ˈmɪdl iːst/", "def": "n. 中东"}, {"w": "debate", "ipa": "/dɪˈbeɪt/", "def": "n. 辩论"}, {"w": "intoxicant", "ipa": "/ɪnˈtɑksɪkənt/", "def": "n. 兴奋剂"}, {"w": "suspicion", "ipa": "/səˈspɪʃən/", "def": "n. 怀疑"}, {"w": "acceptable", "ipa": "/əkˈsɛptəbəl/", "def": "adj. 可接受的"}, {"w": "flourish", "ipa": "/ˈflɜːrɪʃ/", "def": "v. 繁荣"}, {"w": "intellectual", "ipa": "/ˌɪntəˈlɛktʃuəl/", "def": "adj. 知识的"}, {"w": "colony", "ipa": "/ˈkɑːləni/", "def": "n. 殖民地"}, {"w": "scandal", "ipa": "/ˈskændl/", "def": "n. 丑闻"}, {"w": "transformation", "ipa": "/ˌtrænsfərˈmeɪʃən/", "def": "n. 转变"}, {"w": "convenient", "ipa": "/kənˈviːniənt/", "def": "adj. 方便的"}, {"w": "revolutionize", "ipa": "/ˌrɛvəˈluːʃənaɪz/", "def": "v. 彻底改变"}, {"w": "booming", "ipa": "/ˈbuːmɪŋ/", "def": "adj. 繁荣的"}, {"w": "impact", "ipa": "/ˈɪmpækt/", "def": "n. 影响"}, {"w": "ritual", "ipa": "/ˈrɪtʃuəl/", "def": "n. 仪式"}, {"w": "farmer", "ipa": "/ˈfɑːrmər/", "def": "n. 农民"}, {"w": "sustainability", "ipa": "/səˌsteɪnəˈbɪlɪti/", "def": "n. 可持续性"}, {"w": "phenomenon", "ipa": "/fɪˈnɑːmɪnən/", "def": "n. 现象"}]};
const TTS_API = "https://1300942703-hhwd575mtt.ap-guangzhou.tencentscf.com";
let rate = 0.95;
let voice = parseInt(localStorage.getItem('ttsVoice') || '101051', 10);
const cloudOn = TTS_API && TTS_API.indexOf('__') !== 0;

/* ========== 发音引擎(腾讯云按需 + 浏览器回退) ========== */
let usVoice=null;
function pickFallback(){ const vs=speechSynthesis.getVoices();
  usVoice=vs.find(v=>/en-US/i.test(v.lang)&&/Google|Natural|Neural|Enhanced|Siri|Premium/i.test(v.name))
        ||vs.find(v=>v.lang==='en-US')||vs.find(v=>/^en/i.test(v.lang))||null; }
pickFallback(); speechSynthesis.onvoiceschanged=pickFallback;
function speakFallback(text){ speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text); u.lang='en-US'; u.rate=rate;
  if(usVoice)u.voice=usVoice; speechSynthesis.speak(u); }

const clipCache=new Map(); let curAudio=null, token=0;
function stopAll(){ token++; if(curAudio){curAudio.pause();curAudio=null;} speechSynthesis.cancel();
  document.querySelectorAll('.speaking').forEach(e=>e.classList.remove('speaking')); }
function splitClient(text){ const parts=text.trim().split(/(?<=[.!?;:])\s+/); const out=[]; let buf='';
  for(let s of parts){ while(s.length>180){ let c=s.lastIndexOf(' ',180); if(c<=0)c=180;
    out.push(s.slice(0,c)); s=s.slice(c).trim(); }
    if((buf+' '+s).trim().length<=180) buf=(buf+' '+s).trim();
    else { if(buf)out.push(buf); buf=s; } }
  if(buf)out.push(buf); return out.length?out:[text.trim()]; }
async function fetchClip(text){ const key=voice+'|'+text;
  if(clipCache.has(key))return clipCache.get(key);
  const r=await fetch(TTS_API,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({text,voice})});
  if(!r.ok)throw new Error('http'+r.status); const j=await r.json();
  if(!j.audio)throw new Error(j.error||'no audio');
  const url='data:audio/mp3;base64,'+j.audio; clipCache.set(key,url); return url; }
function playClip(url){ return new Promise((res,rej)=>{ const a=new Audio(url);
  a.playbackRate=rate; curAudio=a; a.onended=res; a.onerror=()=>rej(new Error('audio'));
  a.play().catch(rej); }); }
async function play(text, hiEl){
  if(!text) return; stopAll(); const my=token;
  if(hiEl)hiEl.classList.add('speaking');
  try{
    if(!cloudOn){ speakFallback(text); return; }
    const parts=splitClient(text);
    for(let i=0;i<parts.length;i++){ if(my!==token)return;
      const cur=fetchClip(parts[i]); if(i+1<parts.length)fetchClip(parts[i+1]).catch(()=>{});
      let url; try{ url=await cur; }catch(e){ speakFallback(parts.slice(i).join(' ')); return; }
      if(my!==token)return; await playClip(url); }
  } finally { if(my===token&&hiEl)hiEl.classList.remove('speaking'); }
}

/* 生词直接存入墨墨背单词，见下方 doAdd() */

/* ========== 渲染文章 ========== */
document.getElementById('m-level').textContent=ARTICLE.level||'CET-4';
document.getElementById('m-date').textContent=ARTICLE.date||'';
document.getElementById('m-title').textContent=ARTICLE.title||'';
document.getElementById('m-titlezh').textContent=ARTICLE.title_zh||'';
document.getElementById('m-intro').textContent=ARTICLE.intro_zh||'';
document.getElementById('engine-note').textContent=
  cloudOn?'（腾讯云自然发音）':'（当前用浏览器语音）';

const art=document.getElementById('article');
ARTICLE.paragraphs.forEach((p,i)=>{
  const div=document.createElement('div'); div.className='para show-zh';
  div.innerHTML='<div class="en">'+p.en+'</div>'+
    '<div class="ptools"><button class="icbtn tz">中/英</button></div>'+
    '<div class="zh">'+p.zh+'</div>';
  art.appendChild(div);
  div.querySelector('.tz').onclick=()=>div.classList.toggle('show-zh');
});
function applyIpa(show){ document.querySelectorAll('.en .kw').forEach(k=>{
  let b=k.querySelector('.ipa');
  if(show){ if(!b){ b=document.createElement('span'); b.className='ipa'; b.textContent=k.dataset.ipa||''; k.appendChild(b);} b.style.display=''; }
  else if(b){ b.style.display='none'; } }); }
applyIpa(true);
/* 重点词的点击/朗读由下方“自定义选择”统一处理 */

/* 词汇表(播放 + 加入遗忘库) */
const vl=document.getElementById('vlist');
(ARTICLE.vocab||[]).forEach(v=>{ const row=document.createElement('div'); row.className='vrow';
  row.innerHTML='<span class="w">'+v.w+'</span><span class="vipa">'+v.ipa+
    '</span><span class="vdef">'+v.def+'</span>'+
    '<button class="mini pl">🔊</button><button class="mini ad">＋生词</button>';
  row.querySelector('.w').onclick=()=>play(v.w);
  row.querySelector('.pl').onclick=()=>play(v.w);
  row.querySelector('.ad').onclick=()=>doAdd(v.w);
  vl.appendChild(row); });

/* ========== 工具条 ========== */
const tgZh=document.getElementById('tg-zh');
tgZh.onclick=()=>{ const on=tgZh.classList.toggle('on'); tgZh.textContent=on?'显示中文翻译':'隐藏中文翻译';
  document.querySelectorAll('.para').forEach(p=>p.classList.toggle('show-zh',on)); };
const tgIpa=document.getElementById('tg-ipa'); let ipaOn=true;
tgIpa.onclick=()=>{ ipaOn=!ipaOn; applyIpa(ipaOn); tgIpa.textContent=ipaOn?'隐藏音标':'显示音标'; };
document.getElementById('play-all').onclick=()=>{ const full=ARTICLE.paragraphs.map(p=>{
  const t=document.createElement('div'); t.innerHTML=p.en; return t.textContent; }).join(' ');
  play(full,null); };
document.getElementById('stop').onclick=stopAll;
const rEl=document.getElementById('rate'),rv=document.getElementById('rateval');
rEl.oninput=()=>{ rate=parseFloat(rEl.value); rv.textContent=rate.toFixed(2)+'×'; if(curAudio)curAudio.playbackRate=rate; };
const vEl=document.getElementById('voice'); vEl.value=String(voice);
vEl.onchange=()=>{ voice=parseInt(vEl.value,10); localStorage.setItem('ttsVoice',vEl.value); };

/* ========== toast ========== */
let toastT=null;
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),1600); }
async function doAdd(text){ text=(text||'').trim(); if(!text) return;
  if(!cloudOn){ toast('需云函数支持'); return; }
  toast('正在加入墨墨…');
  try{
    const r=await fetch(TTS_API,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({op:'maimemo',text})});
    const j=await r.json();
    if(j.ok){ toast(j.dup?'已经在墨墨里了':('已加入墨墨 ✓ 共 '+(j.total||'?')+' 词')); }
    else { toast('加入失败'+(j.error?'：'+j.error:'')); }
  }catch(e){ toast('加入失败，请重试'); } }

/* ========== 自定义选择(禁用系统翻译/查询菜单) ========== */
const selbar=document.getElementById('selbar');
let selText='';
const artEl=document.getElementById('article');

function tokenize(){
  artEl.querySelectorAll('.en').forEach(en=>{
    en.querySelectorAll('.kw').forEach(k=>{ k.classList.add('tok');
      k.dataset.w=(k.firstChild.textContent||k.textContent).trim(); });
    const tw=document.createTreeWalker(en, NodeFilter.SHOW_TEXT, null);
    const nodes=[]; let n;
    while(n=tw.nextNode()){ const p=n.parentNode;
      if(p.classList&&(p.classList.contains('ipa')||p.classList.contains('tok'))) continue;
      if(p.closest&&p.closest('.kw')) continue;
      if(n.nodeValue.trim()) nodes.push(n); }
    nodes.forEach(tn=>{
      const frag=document.createDocumentFragment();
      tn.nodeValue.split(/(\s+)/).forEach(part=>{
        if(part==='') return;
        if(/^\s+$/.test(part)) frag.appendChild(document.createTextNode(part));
        else { const s=document.createElement('span'); s.className='tok';
          s.dataset.w=part; s.textContent=part; frag.appendChild(s); }
      });
      tn.parentNode.replaceChild(frag, tn);
    });
  });
}
tokenize();
let TOKENS=[];
function indexTokens(){ TOKENS=[...artEl.querySelectorAll('.tok')]; TOKENS.forEach((t,i)=>t.dataset.i=i); }
indexTokens();

function tokAt(x,y){ const e=document.elementFromPoint(x,y);
  if(!e||!e.closest) return -1; const t=e.closest('.tok'); return t?+t.dataset.i:-1; }
function hl(a,b){ const lo=Math.min(a,b),hi=Math.max(a,b);
  TOKENS.forEach((t,i)=>t.classList.toggle('sel', i>=lo&&i<=hi)); }
function selOf(a,b){ const lo=Math.min(a,b),hi=Math.max(a,b);
  return TOKENS.slice(lo,hi+1).map(t=>(t.dataset.w||t.textContent).trim()).filter(Boolean)
    .join(' ').replace(/\s+([,.;:!?])/g,'$1').trim(); }
function clearSel(){ TOKENS.forEach(t=>t.classList.remove('sel')); selbar.style.display='none';
  document.getElementById('transbox').style.display='none'; selText=''; }
function showBar(a,b){ selbar.style.display='flex';
  const r=TOKENS[Math.max(a,b)].getBoundingClientRect();
  const bw=selbar.offsetWidth, bh=selbar.offsetHeight;
  let cx=Math.min(Math.max(r.left+r.width/2, bw/2+8), window.innerWidth-bw/2-8);  // 收拢进屏幕
  let top=r.top-8; if(top<bh+8) top=r.bottom+bh+12;          // 离顶太近则移到下方
  selbar.style.left=cx+'px'; selbar.style.top=top+'px'; }

let selecting=false, anchor=-1, head=-1, sx=0, sy=0, moved=false;
artEl.addEventListener('pointerdown', e=>{
  sx=e.clientX; sy=e.clientY; moved=false;
  if(e.pointerType==='mouse'){          // 电脑:按下即可拖选
    const i=tokAt(e.clientX,e.clientY); clearSel(); if(i<0) return;
    selecting=true; anchor=head=i; hl(i,i);
  }
  /* 手机:按下不动作，松手时再判定(点选 / 扩选 / 滚动) */
}, true);
artEl.addEventListener('pointermove', e=>{
  if(Math.abs(e.clientX-sx)+Math.abs(e.clientY-sy)>8) moved=true;
  if(!selecting) return;                // 手机或未选中:允许页面正常滚动
  const i=tokAt(e.clientX,e.clientY); if(i<0) return; head=i; hl(anchor,i); e.preventDefault();
}, {passive:false});
window.addEventListener('pointerup', e=>{
  if(e.target.closest && (e.target.closest('#selbar') || e.target.closest('#transbox'))) return;
  if(selecting){ selecting=false; const t=selOf(anchor,head); if(t){ selText=t; showBar(anchor,head);} return; }
  if(moved) return;                     // 手机上是滚动手势，忽略
  const i=tokAt(e.clientX,e.clientY);
  if(i<0){ clearSel(); return; }        // 点空白=取消选择
  if(selText && anchor>=0 && i!==anchor){ head=i; }   // 已选中再点另一个词 = 扩展成整句
  else { anchor=head=i; }               // 否则 = 选这个词
  hl(anchor,head); selText=selOf(anchor,head); showBar(anchor,head); });
document.getElementById('sel-play').onclick=()=>{ if(selText) play(selText,null); };
document.getElementById('sel-add').onclick=()=>{ if(selText){ doAdd(selText); clearSel(); } };
function selRect(){ if(anchor<0||!TOKENS[anchor])return null;
  const lo=Math.min(anchor,head),hi=Math.max(anchor,head);
  const a=TOKENS[lo].getBoundingClientRect(), b=TOKENS[hi].getBoundingClientRect();
  return {cx:(a.left+b.right)/2, bottom:Math.max(a.bottom,b.bottom)}; }
function showTransbox(enText, zhHtml){
  const tb=document.getElementById('transbox'); const r=selRect();
  tb.innerHTML='<div class="tb-en">'+(enText||'').replace(/</g,'&lt;')+
    '</div><div class="tb-zh">'+zhHtml+'</div>';
  if(r){ tb.style.left=Math.min(Math.max(r.cx,150),window.innerWidth-150)+'px';
    tb.style.top=(r.bottom+8)+'px'; }
  tb.style.display='block'; }
async function translate(text){
  if(!text) return;
  if(!cloudOn){ showTransbox(text,'需云函数支持'); return; }
  showTransbox(text,'翻译中…');
  try{
    const r=await fetch(TTS_API,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({op:'translate',text})});
    const j=await r.json();
    showTransbox(text, j.zh || ('翻译失败'+(j.error?'：'+j.error:'')));
  }catch(e){ showTransbox(text,'翻译失败，请重试'); }
}
document.getElementById('sel-translate').onclick=()=>{ if(selText){ const t=selText;
  selbar.style.display='none'; translate(t); } };
document.addEventListener('scroll',()=>{ if(!selecting){ selbar.style.display='none';
  document.getElementById('transbox').style.display='none'; } }, true);

</script>
