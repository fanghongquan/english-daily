<script>
const ARTICLE = {"date": "2026-06-26", "level": "CET-4", "title": "Street Food: A Taste of Local Culture and Community", "title_zh": "街头美食：本地文化与社区的味道", "intro_zh": "本文约1000词，探讨街头美食如何反映当地文化、促进社交，并带来经济与健康方面的思考。", "paragraphs": [{"en": "When you walk through the busy streets of a city, the <span class=\"kw\" data-ipa=\"ˈsɛntər\">center</span> of your attention is often drawn by the <span class=\"kw\" data-ipaˈəˈrɑmə\">aroma</span> of cooking food. Street food is not just a quick meal; it is a <span class=\"kw\" data-ipa=\"ˈvɪbrənt\">vibrant</span> part of local culture. From Bangkok's spicy noodles to Mexico's tacos, these foods tell stories of tradition and innovation. For many travelers, tasting street food is the best way to understand a place's true character.", "zh": "当你穿行于城市繁忙的街道时，注意力常被烹饪食物的香气所吸引。街头美食不仅是快餐，更是当地文化中充满活力的一部分。从曼谷的辣面条到墨西哥的玉米卷，这些食物讲述着传统与创新的故事。对许多旅行者来说，品尝街头美食是了解一个地方真正特色的最佳方式。"}, {"en": "One of the greatest <span class=\"kw\" data-ipa=\"ˈbɛnɪfɪts\">benefits</span> of street food is its <span class=\"kw\" data-ipa=\"ˌɛkəˈnɑmɪk\">economic</span> role. In many developing countries, street vending provides jobs for millions of people. For example, in India, the street food industry employs over 10 million workers. These small businesses often require little <span class=\"kw\" data-ipa=\"ˈkæpɪtl\">capital</span> to start, allowing people from low-income backgrounds to earn a living. Moreover, they offer affordable meals to city residents, making food accessible to everyone.", "zh": "街头美食最大的好处之一是它的经济作用。在许多发展中国家，街头摊贩为数百万人提供了就业机会。例如，在印度，街头食品行业雇佣了超过1000万工人。这些小生意通常启动资金很少，使得低收入人群能够谋生。此外，它们为城市居民提供价格实惠的餐食，让每个人都能获得食物。"}, {"en": "Beyond economics, street food <span class=\"kw\" data-ipa=\"ˈfoʊstərz\">fosters</span> a sense of community. In many cities, street food markets become social <span class=\"kw\" data-ipa=\"ˈhʌb\">hubs</span> where people gather. Friends and families share meals, and strangers start conversations over a shared table. This <span class=\"kw\" data-ipa=\"ˌɪntərˈækʃən\">interaction</span> breaks down social barriers. For instance, in Singapore's hawker centers, people from all walks of life eat side by side, creating a unique social mix.", "zh": "除了经济方面，街头美食还促进了社区感。在许多城市，街头美食市场成为人们聚集的社交中心。朋友和家人共享餐食，陌生人在同一张桌子上开始交谈。这种互动打破了社会障碍。例如，在新加坡的小贩中心，各行各业的人并肩吃饭，形成了独特的社会融合。"}, {"en": "However, street food also faces <span class=\"kw\" data-ipa=\"ˈtʃælɪndʒɪz\">challenges</span>. One major concern is food <span class=\"kw\" data-ipa=\"ˈseɪfti\">safety</span>. Without proper regulation, street vendors may not follow hygiene standards. A study in 2019 found that about 30% of street food samples in some cities contained harmful bacteria. To address this, many governments are now providing training and <span class=\"kw\" data-ipa=\"ˈsɜːrtɪfɪkeɪt\">certificate</span> programs for vendors. These efforts help ensure that street food remains both delicious and safe.", "zh": "然而，街头美食也面临挑战。一个主要问题是食品安全。如果没有适当的监管，街头摊贩可能不遵守卫生标准。2019年的一项研究发现，一些城市约30%的街头食品样本含有有害细菌。为了解决这个问题，许多政府现在为摊贩提供培训和认证项目。这些努力有助于确保街头美食既美味又安全。"}, {"en": "Another <span class=\"kw\" data-ipa=\"ˈɪʃuː\">issue</span> is the impact on the <span class=\"kw\" data-ipa=\"ɪnˈvaɪrənmənt\">environment</span>. Street food often uses disposable packaging, which creates a lot of waste. For example, in Thailand, it is estimated that street food generates over 10,000 tons of plastic waste each year. Some cities have started to encourage vendors to use <span class=\"kw\" data-ipa=\"baɪəˈdeɪɡrəbəl\">biodegradable</span> materials. Customers can also help by bringing their own containers.", "zh": "另一个问题是环境的影响。街头食品经常使用一次性包装，产生大量垃圾。例如，在泰国，据估计街头食品每年产生超过1万吨塑料垃圾。一些城市已开始鼓励摊贩使用可生物降解材料。顾客也可以通过自带容器来帮助。"}, {"en": "Despite these problems, the <span class=\"kw\" data-ipaəˈpiːl\">appeal</span> of street food remains strong. Its <span class=\"kw\" data-ipaˈveəraɪəti\">variety</span> is endless: from grilled meat skewers to fresh fruit shakes, there is something for everyone. Moreover, street food is often more <span class=\"kw\" data-ipaˈɔːθentɪk\">authentic</span> than restaurant food because it is made using traditional recipes passed down through generations. This authenticity attracts both locals and tourists.", "zh": "尽管存在这些问题，街头美食的吸引力依然强大。它的种类无穷无尽：从烤肉串到鲜果奶昔，每个人都能找到喜欢的。此外，街头食品往往比餐厅食物更地道，因为它使用的是代代相传的传统配方。这种地道吸引了当地人和游客。"}, {"en": "In recent years, street food has also become a <span class=\"kw\" data-ipaˈtrend\">trend</span> in the culinary world. Many famous chefs have started their careers by selling food on the street. For instance, the popular Korean dish 'Korean fried chicken' was first popularized by street vendors in Seoul. Today, street food <span class=\"kw\" data-ipaˈfɛstəvəlz\">festivals</span> are held around the world, celebrating the creativity and diversity of these humble dishes.", "zh": "近年来，街头美食也成为烹饪界的一种趋势。许多著名厨师都是从街头卖食物开始职业生涯的。例如，流行的韩国菜“韩式炸鸡”最初是由首尔的街头摊贩推广开的。如今，世界各地都举办街头美食节，庆祝这些朴实菜肴的创造力和多样性。"}, {"en": "In conclusion, street food is much more than a quick bite. It is an <span class=\"kw\" data-ipaɪnˈtɛɡrəl\">integral</span> part of urban life, offering economic opportunities, social connections, and cultural experiences. While challenges like safety and waste exist, they can be solved through better regulation and public awareness. Next time you see a street food stall, why not stop and try something new? You might just <span class=\"kw\" data-ipaˈdɪskəvər\">discover</span> a world of flavor.", "zh": "总之，街头美食远不止是一顿快餐。它是城市生活不可或缺的一部分，提供经济机会、社会联系和文化体验。虽然存在安全和垃圾等挑战，但通过更好的监管和公众意识可以解决这些问题。下次你看到街头小吃摊时，为什么不停下来尝试一些新东西呢？你可能会发现一个风味世界。"}], "questions": [{"q": "What is the main idea of the passage?", "options": ["Street food is unhealthy and should be avoided.", "Street food is an important part of culture, economy, and community.", "Street food is only popular in developing countries.", "Street food causes too much environmental waste."], "answer": 1, "explain": "文章主旨是街头美食在文化、经济和社区方面的重要性。选项A片面否定，选项C不准确（发达国家也有），选项D只是问题之一。"}, {"q": "According to the passage, what is one benefit of street food for low-income people?", "options": ["It provides them with high-quality restaurant meals.", "It requires little capital to start a business.", "It guarantees a high income.", "It is always safer than homemade food."], "answer": 1, "explain": "第二段提到街头食品生意启动资金少（little capital），使低收入人群能谋生。其他选项未提及或与原文相反。"}, {"q": "What does the word 'authentic' (Paragraph 6) most likely mean?", "options": ["Expensive", "Traditional and genuine", "Modern", "Artificial"], "answer": 1, "explain": "第六段说街头食品使用代代相传的传统配方，因此更authentic，意为‘地道的、正宗的’，对应traditional and genuine。"}, {"q": "What can be inferred about the future of street food?", "options": ["It will disappear due to safety concerns.", "It will continue to grow but with improvements in safety and environment.", "It will be replaced by restaurants.", "It will only be available in festivals."], "answer": 1, "explain": "文章最后一段指出挑战可以通过监管和意识解决，且街头美食趋势上升，因此推断它会继续发展并改进。其他选项过于极端。"}]};

  if(usVoice)u.voice=usVoice; speechSynthesis.speak(u); }

const clipCache=new Map(); let curAudio=null, token=0;
function stopAll(){ token++; if(curAudio){curAudio.pause();curAudio=null;} speechSynthesis.cancel();
  document.querySelectorAll('.speaking').forEach(e=>e.classList.remove('speaking')); }
function splitClient(text){ const parts=text.trim().split(/(?<=[.!?;:])\s+/); const out=[]; let buf='';
  for(let s of parts){ while(s.length>180){ let c=s.lastIndexOf(' ',180); if(c<=0)c=180;
    out.push(s.slice(0,c)); s=s.slice(c).trim(); }
    if((buf+' '+s).trim().length<=180) buf=(buf+' '+s).trim();
    else { if(buf)out.push(buf); buf=s; } }
  if(buf)out.push(buf); return out.length?out:[text.trim()]; }
async function fetchClip(text){ const key=voice+'|'+text;
  if(clipCache.has(key))return clipCache.get(key);
  const r=await fetch(TTS_API,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({text,voice})});
  if(!r.ok)throw new Error('http'+r.status); const j=await r.json();
  if(!j.audio)throw new Error(j.error||'no audio');
  const url='data:audio/mp3;base64,'+j.audio; clipCache.set(key,url); return url; }
function playClip(url){ return new Promise((res,rej)=>{ const a=new Audio(url);
  a.playbackRate=rate; curAudio=a; a.onended=res; a.onerror=()=>rej(new Error('audio'));
  a.play().catch(rej); }); }
async function play(text, hiEl){
  if(!text) return; stopAll(); const my=token;
  if(hiEl)hiEl.classList.add('speaking');
  try{
    if(!cloudOn){ speakFallback(text); return; }
    const parts=splitClient(text);
    for(let i=0;i<parts.length;i++){ if(my!==token)return;
      const cur=fetchClip(parts[i]); if(i+1<parts.length)fetchClip(parts[i+1]).catch(()=>{});
      let url; try{ url=await cur; }catch(e){ speakFallback(parts.slice(i).join(' ')); return; }
      if(my!==token)return; await playClip(url); }
  } finally { if(my===token&&hiEl)hiEl.classList.remove('speaking'); }
}

/* 生词直接存入墨墨背单词，见下方 doAdd() */

/* ========== 渲染文章 ========== */
document.getElementById('m-level').textContent=ARTICLE.level||'CET-4';

const art=document.getElementById('article');

    '<div class="zh">'+p.zh+'</div>';

  div.querySelector('.tz').onclick=()=>div.classList.toggle('show-zh');

function applyIpa(show){ document.querySelectorAll('.en .kw').forEach(k=>{
  let b=k.querySelector('.ipa');
  if(show){ if(!b){ b=document.createElement('span'); b.className='ipa'; b.textContent=k.dataset.ipa||''; k.appendChild(b);} b.style.display=''; }
  else if(b){ b.style.display='none'; } }); }
applyIpa(true);
/* 重点词的正文交互由下方“双击加生词”统一处理 */

/* 理解自测：渲染 CET-4 选择题，点选后判分并显示答案+解析 */
function esc(s){ return (s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
const LAB=['A','B','C','D','E','F'];
const quizEl=document.getElementById('quiz');
const QS=Array.isArray(ARTICLE.questions)?ARTICLE.questions:[];
if(QS.length){
  QS.forEach((q,qi)=>{
    const opts=Array.isArray(q.options)?q.options:[];
    let ans=q.answer;
    if(typeof ans==='string'){ ans='ABCDEF'.indexOf(ans.trim().toUpperCase()); }
    if(typeof ans!=='number'||ans<0||ans>=opts.length) ans=0;
    const card=document.createElement('div'); card.className='q';
    card.innerHTML='<div class="stem"><span class="num">Q'+(qi+1)+'.</span>'+esc(q.q||q.question||'')+'</div>';
    opts.forEach((o,oi)=>{
      const b=document.createElement('button'); b.className='opt'; b.type='button';
      b.innerHTML='<span class="lab">'+LAB[oi]+'</span><span>'+esc(o)+'</span>';
      b.onclick=()=>{ if(card.dataset.done) return; card.dataset.done='1';
        card.querySelectorAll('.opt').forEach((x,xi)=>{ x.disabled=true;
          if(xi===ans) x.classList.add('correct');
          else if(xi===oi) x.classList.add('wrong'); });
        const e=card.querySelector('.exp'); if(e) e.classList.add('show'); };
      card.appendChild(b);
    });
    const exp=document.createElement('div'); exp.className='exp';
    exp.innerHTML='<b>答案 '+LAB[ans]+'</b>　'+esc(q.explain||q.explanation||'');
    card.appendChild(exp);
    quizEl.appendChild(card);
  });
} else {
  document.getElementById('quiz-sec').style.display='none';   // 旧文章没有题目则隐藏
}

/* ========== toast ========== */
let toastT=null;
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),1600); }
async function doAdd(text){ text=(text||'').trim(); if(!text) return;
  if(!cloudOn){ toast('需云函数支持'); return; }
  toast('正在加入墨墨…');
  try{
    const r=await fetch(TTS_API,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({op:'maimemo',text})});
    const j=await r.json();
    if(j.ok){ toast(j.dup?'已经在墨墨里了':('已加入墨墨 ✓ 共 '+(j.total||'?')+' 词')); }
    else { toast('加入失败'+(j.error?'：'+j.error:'')); }
  }catch(e){ toast('加入失败，请重试'); } }

/* ========== 双击加生词，其他选词行为交给系统默认菜单 ========== */
const selbar=document.getElementById('selbar');
let selText='';
const artEl=document.getElementById('article');

function tokenize(){
  artEl.querySelectorAll('.en').forEach(en=>{
    en.querySelectorAll('.kw').forEach(k=>{ k.classList.add('tok');
      k.dataset.w=(k.firstChild.textContent||k.textContent).trim(); });
    const tw=document.createTreeWalker(en, NodeFilter.SHOW_TEXT, null);
    const nodes=[]; let n;
    while(n=tw.nextNode()){ const p=n.parentNode;
      if(p.classList&&(p.classList.contains('ipa')||p.classList.contains('tok'))) continue;
      if(p.closest&&p.closest('.kw')) continue;
      if(n.nodeValue.trim()) nodes.push(n); }
    nodes.forEach(tn=>{
      const frag=document.createDocumentFragment();
      tn.nodeValue.split(/(\s+)/).forEach(part=>{
        if(part==='') return;
        if(/^\s+$/.test(part)) frag.appendChild(document.createTextNode(part));
        else { const s=document.createElement('span'); s.className='tok';
          s.dataset.w=part; s.textContent=part; frag.appendChild(s); }
      });
      tn.parentNode.replaceChild(frag, tn);
    });
  });
}
tokenize();
let TOKENS=[];
function indexTokens(){ TOKENS=[...artEl.querySelectorAll('.tok')]; TOKENS.forEach((t,i)=>t.dataset.i=i); }
indexTokens();

function cleanToken(text){ return (text||'').trim().replace(/^[^A-Za-z]+|[^A-Za-z]+$/g,''); }
function clearSel(){ selbar.style.display='none'; selText=''; }
function showBar(tok){ selbar.style.display='flex';
  const r=tok.getBoundingClientRect();
  const bw=selbar.offsetWidth, bh=selbar.offsetHeight;
  let cx=Math.min(Math.max(r.left+r.width/2, bw/2+8), window.innerWidth-bw/2-8);  // 收拢进屏幕
  let top=r.top-8; if(top<bh+8) top=r.bottom+bh+12;          // 离顶太近则移到下方
  selbar.style.left=cx+'px'; selbar.style.top=top+'px'; }

artEl.addEventListener('dblclick', e=>{
  const tok=e.target.closest&&e.target.closest('.tok');
  if(!tok||!artEl.contains(tok)){ clearSel(); return; }
  selText=cleanToken(tok.dataset.w||tok.textContent);
  if(!selText){ clearSel(); return; }
  showBar(tok);
}, true);
document.getElementById('sel-add').onclick=()=>{ if(selText){ doAdd(selText); clearSel(); } };
document.addEventListener('click', e=>{ if(e.target.closest&&!e.target.closest('#selbar')) clearSel(); }, true);
document.addEventListener('scroll',()=>{ selbar.style.display='none'; }, true);

</script>
