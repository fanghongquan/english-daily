/* 尽早设置主题，避免刷新时白屏闪烁：优先用户选择，否则跟随系统 */
(function(){try{var t=localStorage.getItem('theme');
  if(t!=='light'&&t!=='dark') t=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
  document.documentElement.setAttribute('data-theme',t);}catch(e){}})();
</script>
<style>
  :root{
    --bg:#f6f7f9; --card:#fff; --ink:#1f2329; --sub:#646a73;
    --line:#e5e6eb; --accent:#3370ff; --accent-soft:#eaf0ff; --accent-soft2:#dce7ff;
    --kw:#1456f0; --zh:#8a5a00; --zhbg:#fff8ec;
    --know:#2ea043; --fuzzy:#d29302; --forget:#e5484d;
    --selbg:#cfe0ff; --speakbg:#fff3cd; --shadow:rgba(0,0,0,.18);
    --ok-bg:#eaf7ee; --no-bg:#fdecec;
  }
  html[data-theme="dark"]{
    --bg:#15171a; --card:#22262b; --ink:#e6e8eb; --sub:#9aa0a6;
    --line:#343a42; --accent:#6b97ff; --accent-soft:#22304d; --accent-soft2:#2c3f63;
    --kw:#86a9ff; --zh:#e3b877; --zhbg:#2a2620;
    --know:#3fb950; --fuzzy:#e3a72f; --forget:#f06b70;
    --selbg:#33507e; --speakbg:#4a431f; --shadow:rgba(0,0,0,.5);
    --ok-bg:#1f3a28; --no-bg:#3a2222;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Segoe UI,Roboto,sans-serif;
    line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:720px;margin:0 auto;padding:18px 16px 120px}
  header{padding:6px 2px 14px;border-bottom:1px solid var(--line);margin-bottom:18px}
  .meta{font-size:12px;color:var(--sub);letter-spacing:.5px;text-transform:uppercase}
  h1{font-size:24px;margin:8px 0 4px;line-height:1.3}
  .h1zh{font-size:15px;color:var(--sub);margin:0}
  .intro{font-size:13px;color:var(--sub);background:var(--card);border:1px solid var(--line);
    border-radius:10px;padding:10px 12px;margin-top:14px}
  .toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:16px 0 4px}
  .btn{border:1px solid var(--line);background:var(--card);color:var(--ink);
    border-radius:20px;padding:6px 13px;font-size:13px;cursor:pointer;transition:.15s}
  .btn:hover{border-color:var(--accent);color:var(--accent)}
  .btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .speed{font-size:12px;color:var(--sub);display:flex;align-items:center;gap:6px}
  .vsel{font-size:12px;border:1px solid var(--line);border-radius:8px;padding:4px 6px;
    background:var(--card);color:var(--ink)}
  .para{background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:14px 16px;margin:14px 0;box-shadow:0 1px 2px rgba(0,0,0,.02)}
  .en{font-size:17px;line-height:1.85}
  .en .kw{color:var(--kw);font-weight:700;cursor:pointer;border-bottom:1px dashed rgba(20,86,240,.4)}
  .en .kw .ipa{font-size:.72em;font-weight:500;color:var(--sub);margin-left:2px;white-space:nowrap}
  .en .kw:hover{background:var(--accent-soft);border-radius:3px}
  .ptools{display:flex;gap:10px;margin-top:10px}
  .icbtn{border:none;background:var(--accent-soft);color:var(--accent);border-radius:8px;
    padding:5px 11px;font-size:12.5px;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
  .icbtn:hover{background:var(--accent-soft2)}
  .zh{display:none;margin-top:11px;padding-top:11px;border-top:1px dashed var(--line);
    font-size:14.5px;color:var(--zh);background:var(--zhbg);margin-left:-16px;margin-right:-16px;
    margin-bottom:-14px;padding:11px 16px 14px;border-radius:0 0 12px 12px}
  .para.show-zh .zh{display:block}
  h2.vh{font-size:18px;margin:30px 0 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  h2.vh .cnt{font-size:13px;color:var(--sub);font-weight:400}
  .vlist{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .vrow{display:flex;align-items:center;gap:8px;padding:11px 14px;border-bottom:1px solid var(--line)}
  .vrow:last-child{border-bottom:none}
  .vrow .w{font-weight:700;color:var(--kw);min-width:120px;cursor:pointer}
  .vrow .vipa{color:var(--sub);font-size:13px;min-width:140px}
  .vrow .vdef{color:var(--ink);font-size:14px;flex:1}
  .vrow .mini{border:none;background:var(--accent-soft);color:var(--accent);border-radius:6px;
    padding:3px 8px;font-size:12px;cursor:pointer}
  .vrow .mini:hover{background:var(--accent-soft2)}
  /* 复习模块 */
  #review{margin-top:30px}
  .rvcard{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:26px 18px;text-align:center;box-shadow:0 1px 2px rgba(0,0,0,.03)}
  .rv-type{font-size:12px;color:var(--sub);margin-bottom:10px}
  .rv-text{font-size:24px;font-weight:600;line-height:1.5;margin:6px 0 16px;word-break:break-word}
  .rv-text.sent{font-size:19px;font-weight:500}
  .rv-play{border:1px solid var(--line);background:var(--card);color:var(--accent);
    border-radius:20px;padding:7px 18px;font-size:14px;cursor:pointer;margin-bottom:20px}
  .rv-play:hover{border-color:var(--accent)}
  .rv-grade{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .rv-grade button{border:none;border-radius:10px;padding:11px 22px;font-size:15px;
    font-weight:600;color:#fff;cursor:pointer;transition:.15s;min-width:92px}
  .rv-grade button:active{transform:scale(.96)}
  .g-know{background:var(--know)}
  .g-fuzzy{background:var(--fuzzy)}
  .g-forget{background:var(--forget)}
  .rv-progress{font-size:12px;color:var(--sub);margin-top:16px}
  .rv-empty{font-size:15px;color:var(--sub);padding:18px 0}
  .rv-empty .big{font-size:30px;display:block;margin-bottom:8px}
  .syncbar{display:flex;align-items:center;justify-content:space-between;gap:10px;
    margin-top:12px;font-size:13px;color:var(--sub);flex-wrap:wrap}
  /* 选中弹出条 */
  #selbar{position:fixed;z-index:50;display:none;transform:translate(-50%,-100%);
    background:#1f2329;border-radius:12px;padding:5px;box-shadow:0 4px 14px rgba(0,0,0,.28);
    white-space:nowrap;gap:4px}
  #selbar button{background:transparent;border:none;color:#fff;font-size:13px;
    padding:7px 12px;border-radius:8px;cursor:pointer}
  #selbar button:hover{background:rgba(255,255,255,.15)}
  /* toast */
  #toast{position:fixed;left:50%;bottom:40px;transform:translateX(-50%) translateY(20px);
    background:#1f2329;color:#fff;padding:10px 18px;border-radius:22px;font-size:14px;
    opacity:0;pointer-events:none;transition:.25s;z-index:60}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  footer{text-align:center;color:var(--sub);font-size:12px;margin-top:36px}
  .tip{font-size:12px;color:var(--sub);margin:2px 0 0}
  .speaking{background:var(--speakbg) !important;border-radius:3px}
  /* 理解自测 */
  .quiz .q{background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:14px 16px;margin:14px 0}
  .quiz .stem{font-size:15.5px;font-weight:600;line-height:1.6;margin-bottom:10px}
  .quiz .stem .num{color:var(--accent);margin-right:6px}
  .quiz .opt{display:flex;align-items:flex-start;gap:9px;width:100%;text-align:left;
    border:1px solid var(--line);background:var(--bg);color:var(--ink);border-radius:9px;
    padding:10px 12px;margin:7px 0;font-size:14.5px;line-height:1.5;cursor:pointer;transition:.12s}
  .quiz .opt:hover{border-color:var(--accent)}
  .quiz .opt .lab{font-weight:700;color:var(--sub);flex-shrink:0}
  .quiz .opt.correct{background:var(--ok-bg);border-color:var(--know)}
  .quiz .opt.correct .lab{color:var(--know)}
  .quiz .opt.wrong{background:var(--no-bg);border-color:var(--forget)}
  .quiz .opt.wrong .lab{color:var(--forget)}
  .quiz .opt:disabled{cursor:default}
  .quiz .exp{display:none;margin-top:9px;padding:10px 12px;border-radius:9px;
    background:var(--zhbg);color:var(--zh);font-size:13.5px;line-height:1.6}
  .quiz .exp.show{display:block}
  .en .tok{cursor:pointer}
  /* ---- 手机端排版优化 ---- */
  @media (max-width:480px){
    .wrap{padding:14px 12px 100px}
    h1{font-size:21px}
    .h1zh{font-size:14px}
    .intro{font-size:12.5px}
    .en{font-size:16.5px;line-height:1.8}
    .en .kw .ipa{font-size:.62em;margin-left:1px}
    h2.vh{font-size:16.5px;margin:24px 0 10px}
    .toolbar{gap:6px}
    .btn{padding:6px 11px;font-size:12.5px}
    .vrow{flex-wrap:wrap;gap:6px 8px;padding:11px 12px}
    .vrow .w{min-width:0;order:1;font-size:15px}
    .vrow .vipa{min-width:0;flex:1;order:2;font-size:11.5px}
    .vrow .pl{order:3}
    .vrow .ad{order:4}
    .vrow .vdef{order:5;flex-basis:100%;font-size:13.5px;color:var(--sub);margin-top:1px}
    .rvcard{padding:22px 14px}
    .rv-text{font-size:22px}
    .rv-grade button{padding:10px 16px;font-size:14px;min-width:80px}
  }
</style>

<script>
const ARTICLE = {"date": "2026-07-06", "level": "CET-4", "title": "National Parks: Preserving Natural Heritage for Future Generations", "title_zh": "国家公园：为子孙后代守护自然遗产", "intro_zh": "本文约1000词，探讨国家公园在生态保护、教育、经济等方面的多重意义，并介绍美国、中国等国实例。", "paragraphs": [{"en": "When we think of <span class=\"kw\" data-ipa=\"ˈnæʃnəl pɑːrk\" data-def=\"国家公园\">national parks</span>, we often picture vast, untouched landscapes. But these protected areas are far more than just beautiful scenery. They serve as <span class=\"kw\" data-ipa=\"ˈrefjuːdʒ\" data-def=\"避难所；庇护所\">refuges</span> for wildlife, living laboratories for scientists, and places where people can reconnect with nature. In an increasingly urbanized world, national parks play a crucial role in maintaining <span class=\"kw\" data-ipa=\"baɪəʊdaɪˈvɜːrsəti\" data-def=\"生物多样性\">biodiversity</span> and providing ecosystem services that benefit all of humanity.", "zh": "当我们想到国家公园时，脑海中常浮现广袤纯净的自然风光。但这些保护区的意义远不止美丽的风景。它们是野生动物的庇护所、科学家的活体实验室，也是人们重新与自然建立联系的场所。在日益城市化的世界中，国家公园在维护生物多样性和提供惠及全人类的生态系统服务方面发挥着关键作用。"}, {"en": "The concept of national parks originated in the United States with Yellowstone National Park, established in 1872. Yellowstone spans nearly 9,000 square kilometers across three states, featuring geothermal wonders like Old Faithful geyser. It is home to <span class=\"kw\" data-ipa=\"ɪˈstɪmətɪd\" data-def=\"估计的\">estimated</span> 500 grizzly bears, 20,000 elk, and countless other species. The park's creation marked a turning point in <span class=\"kw\" data-ipa=\"kənˈsɜːrvəsi\" data-def=\"（对自然资源的）保护\">conservation</span>, inspiring other nations to set aside land for <span class=\"kw\" data-ipa=\"ˈpɜːrpəs\" data-def=\"目的；用途\">purposes</span> of preservation and public enjoyment.", "zh": "国家公园的概念起源于美国，1872年建立了黄石国家公园。黄石公园横跨三个州，占地近9000平方公里，拥有老忠实间歇泉等地质奇观。园内约有500头灰熊、2万头麋鹿和无数其他物种。黄石公园的创建是自然保护的一个转折点，激励其他国家为保护和公众游憩划拨土地。"}, {"en": "Today, national parks exist in more than 100 countries. China has been actively building its national park system, with pilot projects like the Giant Panda National Park, which spans over 27,000 square kilometers. This park <span class=\"kw\" data-ipa=\"kənˈteɪnz\" data-def=\"包含；容纳\">contains</span> about 1,800 wild giant pandas, representing over 70% of the global wild population. The park also protects other <span class=\"kw\" data-ipa=\"ˈendʒərd\" data-def=\"濒危的\">endangered</span> species such as the snow leopard and the golden monkey. By <span class=\"kw\" data-ipa=\"ˈkriːeɪtɪŋ\" data-def=\"创建\">creating</span> corridors that connect isolated habitats, the park helps ensure genetic diversity and long-term survival of these animals.", "zh": "如今，全球100多个国家建立了国家公园。中国正积极建设国家公园体系，试点项目包括占地超过2.7万平方公里的大熊猫国家公园。该公园内约有1800只野生大熊猫，占全球野生种群数量的70%以上。公园还保护雪豹、金丝猴等其他濒危物种。通过建立连接孤立栖息地的走廊，公园有助于确保遗传多样性和这些动物的长期生存。"}, {"en": "Beyond wildlife protection, national parks offer significant economic benefits through <span class=\"kw\" data-ipa=\"ˌekəʊˈtʊrɪzəm\" data-def=\"生态旅游\">ecotourism</span>. Visitors to national parks spend money on travel, lodging, and <span class=\"kw\" data-ipa=\"ˌrekriˈeɪʃn\" data-def=\"娱乐；消遣\">recreation</span>, generating local income and jobs. For example, in 2024, U.S. national parks hosted over 300 million visits, contributing an <span class=\"kw\" data-ipa=\"ɪˈstɪmətɪd\" data-def=\"估计的\">estimated</span> $50 billion to the economy and supporting more than 300,000 jobs. This demonstrates that conservation and economic development can go hand in hand.", "zh": "除了保护野生动物，国家公园通过生态旅游带来显著的经济效益。游客在国家公园内的旅行、住宿和娱乐消费为当地创造收入和就业。例如，2024年美国国家公园接待了超过3亿人次的游客，为经济贡献约500亿美元，并支持了30多万个工作岗位。这表明保护与经济发展可以并行不悖。"}, {"en": "National parks also serve as outdoor classrooms. They provide <span class=\"kw\" data-ipa=\"ˌedʒuˈkeɪʃənl\" data-def=\"教育的\">educational</span> programs for students and families, teaching about geology, ecology, and history. For instance, the Grand Canyon's rock layers reveal two billion years of Earth's history. Many parks offer ranger-led tours, guided hikes, and interactive exhibits. These <span class=\"kw\" data-ipa=\"ɪkˈspɪriənsɪz\" data-def=\"经历；体验\">experiences</span> foster a deeper <span class=\"kw\" data-ipa=\"əˈpriːʃieɪʃn\" data-def=\"欣赏；感激\">appreciation</span> for nature and encourage environmental stewardship.", "zh": "国家公园也是户外课堂。它们为学生和家庭提供地质学、生态学和历史学方面的教育项目。例如，大峡谷的岩层揭示了20亿年的地球历史。许多公园提供护林员导览、有导游的徒步和互动展览。这些体验培养人们对自然的深层欣赏，并鼓励环保意识。"}, {"en": "However, national parks face challenges. Popular parks often suffer from <span class=\"kw\" data-ipa=\"ˌoʊvəˌkraʊˈdɪŋ\" data-def=\"过度拥挤\">overcrowding</span>, leading to traffic jams, <span class=\"kw\" data-ipa=\"pəˈluːʃn\" data-def=\"污染\">pollution</span>, and damage to fragile ecosystems. Climate change poses an even greater threat, altering habitats and <span class=\"kw\" data-ipa=\"ˈθretnɪŋ\" data-def=\"威胁\">threatening</span> species. For example, rising temperatures have caused glaciers in Glacier National Park to shrink by 80% since 1850. Park managers are adopting strategies like timed entry systems and promoting off-season visits to reduce human impact.", "zh": "然而，国家公园也面临挑战。热门公园常常过度拥挤，导致交通拥堵、污染和脆弱生态系统受损。气候变化构成更大威胁，改变栖息地并威胁物种。例如，自1850年以来，气温上升已导致冰川国家公园的冰川缩小了80%。公园管理者采取分时段入园和推广淡季游览等策略来减少人类影响。"}, {"en": "Despite these difficulties, the future of national parks looks promising. New <span class=\"kw\" data-ipa=\"tekˈnɑːlədʒiz\" data-def=\"技术\">technologies</span> like satellite monitoring help track wildlife and detect illegal activities. Community involvement is growing, with local people participating in <span class=\"kw\" data-ipa=\"kənˈsɜːrvəsi\" data-def=\"保护\">conservation</span> efforts and benefiting from park-related <span class=\"kw\" data-ipa=\"ˌopərˈtuːnətiz\" data-def=\"机会\">opportunities</span>. As more people recognize the value of these natural treasures, support for expanding and improving park systems increases.", "zh": "尽管存在这些困难，国家公园的未来依然光明。卫星监测等新技术有助于追踪野生动物和发现非法活动。社区参与度不断提高，当地居民参与保护工作并从公园相关机遇中受益。随着越来越多人认识到这些自然瑰宝的价值，支持扩大和完善公园体系的呼声也日益高涨。"}, {"en": "In conclusion, national parks are not just protected areas; they are <span class=\"kw\" data-ipa=\"ˈvaɪtl\" data-def=\"至关重要的\">vital</span> components of a sustainable future. They preserve our planet's <span class=\"kw\" data-ipa=\"ˈnætʃrəl\" data-def=\"自然的\">natural</span> and cultural heritage, support biodiversity, provide <span class=\"kw\" data-ipa=\"ɪˈkɑːnəmɪk\" data-def=\"经济的\">economic</span> benefits, and offer places for inspiration and education. As we face environmental challenges, the importance of national parks will only continue to grow.", "zh": "总之，国家公园不仅仅是保护区；它们是可持续未来的重要组成部分。它们保护地球的自然和文化遗产，支持生物多样性，提供经济效益，并给予人们灵感和教育的场所。面对环境挑战，国家公园的重要性只会与日俱增。"}], "questions": [{"q": "What is the main purpose of national parks according to the passage?", "options": ["To generate tourism revenue", "To protect biodiversity and offer educational opportunities", "To create jobs for local communities", "To preserve cultural heritage only"], "answer": 1, "explain": "文章首段和末段均强调国家公园在保护生物多样性和提供教育机会方面的多重意义，选项B概括了这两个核心功能。选项A和C只是部分经济收益，选项D过于片面。"}, {"q": "Which of the following is NOT mentioned as a challenge facing national parks?", "options": ["Overcrowding", "Climate change", "Illegal wildlife trade", "Habitat loss due to human activities"], "answer": 2, "explain": "第六段提到了过度拥挤、气候变化和污染（污染是人为活动导致栖息地破坏的一种形式），但并未提及非法野生动物贸易。因此选项C不属于文中提到的挑战。"}, {"q": "What does the word 'corridors' in paragraph 3 most likely refer to?", "options": ["Long hallways inside buildings", "Narrow strips of land connecting separated areas", "River channels", "Mountain passes"], "answer": 1, "explain": "第三段提到 \"By creating corridors that connect isolated habitats\"，这里的corridors指连接孤立栖息地的狭窄地带，即生态走廊。因此选项B正确。"}, {"q": "What can be inferred about the future of national parks from the passage?", "options": ["They will become less popular due to climate change", "They will likely expand with more public support", "They will be replaced by private reserves", "They will focus only on tourism"], "answer": 1, "explain": "第七段提到新技术、社区参与和公众支持增加，暗示公园系统有望扩大。选项B符合推断。其他选项与原文信息相悖。"}]};
const TTS_API = "https://1300942703-hhwd575mtt.ap-guangzhou.tencentscf.com";
let rate = 0.95;
let voice = parseInt(localStorage.getItem('ttsVoice') || '101051', 10);
const cloudOn = TTS_API && TTS_API.indexOf('__') !== 0;

/* ========== 发音引擎(腾讯云按需 + 浏览器回退) ========== */
let usVoice=null;
function pickFallback(){ const vs=speechSynthesis.getVoices();
  usVoice=vs.find(v=>/en-US/i.test(v.lang)&&/Google|Natural|Neural|Enhanced|Siri|Premium/i.test(v.name))
        ||vs.find(v=>v.lang==='en-US')||vs.find(v=>/^en/i.test(v.lang))||null; }
pickFallback(); speechSynthesis.onvoiceschanged=pickFallback;
function speakFallback(text){ speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text); u.lang='en-US'; u.rate=rate;
  if(usVoice)u.voice=usVoice; speechSynthesis.speak(u); }

const clipCache=new Map(); let curAudio=null, token=0;
function stopAll(){ token++; if(curAudio){curAudio.pause();curAudio=null;} speechSynthesis.cancel();
  document.querySelectorAll('.speaking').forEach(e=>e.classList.remove('speaking')); }
function splitClient(text){ const parts=text.trim().split(/(?<=[.!?;:])\s+/); const out=[]; let buf='';
  for(let s of parts){ while(s.length>180){ let c=s.lastIndexOf(' ',180); if(c<=0)c=180;
    out.push(s.slice(0,c)); s=s.slice(c).trim(); }
    if((buf+' '+s).trim().length<=180) buf=(buf+' '+s).trim();
    else { if(buf)out.push(buf); buf=s; } }
  if(buf)out.push(buf); return out.length?out:[text.trim()]; }
async function fetchClip(text){ const key=voice+'|'+text;
  if(clipCache.has(key))return clipCache.get(key);
  const r=await fetch(TTS_API,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({text,voice})});
  if(!r.ok)throw new Error('http'+r.status); const j=await r.json();
  if(!j.audio)throw new Error(j.error||'no audio');
  const url='data:audio/mp3;base64,'+j.audio; clipCache.set(key,url); return url; }
function playClip(url){ return new Promise((res,rej)=>{ const a=new Audio(url);
  a.playbackRate=rate; curAudio=a; a.onended=res; a.onerror=()=>rej(new Error('audio'));
  a.play().catch(rej); }); }
async function play(text, hiEl){
  if(!text) return; stopAll(); const my=token;
  if(hiEl)hiEl.classList.add('speaking');
  try{
    if(!cloudOn){ speakFallback(text); return; }
    const parts=splitClient(text);
    for(let i=0;i<parts.length;i++){ if(my!==token)return;
      const cur=fetchClip(parts[i]); if(i+1<parts.length)fetchClip(parts[i+1]).catch(()=>{});
      let url; try{ url=await cur; }catch(e){ speakFallback(parts.slice(i).join(' ')); return; }
      if(my!==token)return; await playClip(url); }
  } finally { if(my===token&&hiEl)hiEl.classList.remove('speaking'); }
}

/* 生词直接存入墨墨背单词，见下方 doAdd() */

/* ========== 渲染文章 ========== */
document.getElementById('m-level').textContent=ARTICLE.level||'CET-4';
document.getElementById('m-date').textContent=ARTICLE.date||'';
document.getElementById('m-title').textContent=ARTICLE.title||'';
document.getElementById('m-titlezh').textContent=ARTICLE.title_zh||'';
document.getElementById('m-intro').textContent=ARTICLE.intro_zh||'';
document.getElementById('engine-note').textContent=
  cloudOn?'（腾讯云自然发音）':'（当前用浏览器语音）';

const art=document.getElementById('article');
ARTICLE.paragraphs.forEach((p,i)=>{
  const div=document.createElement('div'); div.className='para show-zh';
  div.innerHTML='<div class="en">'+p.en+'</div>'+
    '<div class="ptools"><button class="icbtn tz">中/英</button></div>'+
    '<div class="zh">'+p.zh+'</div>';
  art.appendChild(div);
  div.querySelector('.tz').onclick=()=>div.classList.toggle('show-zh');
});
function applyIpa(show){ document.querySelectorAll('.en .kw').forEach(k=>{
  let b=k.querySelector('.ipa');
  if(show){ if(!b){ b=document.createElement('span'); b.className='ipa'; b.textContent=k.dataset.ipa||''; k.appendChild(b);} b.style.display=''; }
  else if(b){ b.style.display='none'; } }); }
applyIpa(true);
/* 重点词的正文交互由下方“双击加生词”统一处理 */

/* 理解自测：渲染 CET-4 选择题，点选后判分并显示答案+解析 */
function esc(s){ return (s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
const LAB=['A','B','C','D','E','F'];
const quizEl=document.getElementById('quiz');
const QS=Array.isArray(ARTICLE.questions)?ARTICLE.questions:[];
if(QS.length){
  QS.forEach((q,qi)=>{
    const opts=Array.isArray(q.options)?q.options:[];
    let ans=q.answer;
    if(typeof ans==='string'){ ans='ABCDEF'.indexOf(ans.trim().toUpperCase()); }
    if(typeof ans!=='number'||ans<0||ans>=opts.length) ans=0;
    const card=document.createElement('div'); card.className='q';
    card.innerHTML='<div class="stem"><span class="num">Q'+(qi+1)+'.</span>'+esc(q.q||q.question||'')+'</div>';
    opts.forEach((o,oi)=>{
      const b=document.createElement('button'); b.className='opt'; b.type='button';
      b.innerHTML='<span class="lab">'+LAB[oi]+'</span><span>'+esc(o)+'</span>';
      b.onclick=()=>{ if(card.dataset.done) return; card.dataset.done='1';
        card.querySelectorAll('.opt').forEach((x,xi)=>{ x.disabled=true;
          if(xi===ans) x.classList.add('correct');
          else if(xi===oi) x.classList.add('wrong'); });
        const e=card.querySelector('.exp'); if(e) e.classList.add('show'); };
      card.appendChild(b);
    });
    const exp=document.createElement('div'); exp.className='exp';
    exp.innerHTML='<b>答案 '+LAB[ans]+'</b>　'+esc(q.explain||q.explanation||'');
    card.appendChild(exp);
    quizEl.appendChild(card);
  });
} else {
  document.getElementById('quiz-sec').style.display='none';   // 旧文章没有题目则隐藏
}

/* ========== 工具条 ========== */
const tgZh=document.getElementById('tg-zh');
tgZh.onclick=()=>{ const on=tgZh.classList.toggle('on'); tgZh.textContent=on?'显示中文翻译':'隐藏中文翻译';
  document.querySelectorAll('.para').forEach(p=>p.classList.toggle('show-zh',on)); };
const tgIpa=document.getElementById('tg-ipa'); let ipaOn=true;
tgIpa.onclick=()=>{ ipaOn=!ipaOn; applyIpa(ipaOn); tgIpa.textContent=ipaOn?'隐藏音标':'显示音标'; };
/* 夜间模式切换 */
const tgTheme=document.getElementById('tg-theme');
function syncThemeBtn(){ const dark=document.documentElement.getAttribute('data-theme')==='dark';
  tgTheme.textContent=dark?'☀️ 日间':'🌙 夜间'; tgTheme.classList.toggle('on',dark); }
syncThemeBtn();
tgTheme.onclick=()=>{ const dark=document.documentElement.getAttribute('data-theme')==='dark';
  const next=dark?'light':'dark'; document.documentElement.setAttribute('data-theme',next);
  try{ localStorage.setItem('theme',next); }catch(e){} syncThemeBtn(); };
document.getElementById('play-all').onclick=()=>{ const full=ARTICLE.paragraphs.map(p=>{
  const t=document.createElement('div'); t.innerHTML=p.en; return t.textContent; }).join(' ');
  play(full,null); };
document.getElementById('stop').onclick=stopAll;
const rEl=document.getElementById('rate'),rv=document.getElementById('rateval');
rEl.oninput=()=>{ rate=parseFloat(rEl.value); rv.textContent=rate.toFixed(2)+'×'; if(curAudio)curAudio.playbackRate=rate; };
const vEl=document.getElementById('voice'); vEl.value=String(voice);
vEl.onchange=()=>{ voice=parseInt(vEl.value,10); localStorage.setItem('ttsVoice',vEl.value); };

/* ========== toast ========== */
let toastT=null;
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),1600); }
async function doAdd(text){ text=(text||'').trim(); if(!text) return;
  if(!cloudOn){ toast('需云函数支持'); return; }
  toast('正在加入墨墨…');
  try{
    const r=await fetch(TTS_API,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({op:'maimemo',text})});
    const j=await r.json();
    if(j.ok){ toast(j.dup?'已经在墨墨里了':('已加入墨墨 ✓ 共 '+(j.total||'?')+' 词')); }
    else { toast('加入失败'+(j.error?'：'+j.error:'')); }
  }catch(e){ toast('加入失败，请重试'); } }

/* ========== 双击加生词，其他选词行为交给系统默认菜单 ========== */
const selbar=document.getElementById('selbar');
let selText='';
const artEl=document.getElementById('article');

function tokenize(){
  artEl.querySelectorAll('.en').forEach(en=>{
    en.querySelectorAll('.kw').forEach(k=>{ k.classList.add('tok');
      k.dataset.w=(k.firstChild.textContent||k.textContent).trim(); });
    const tw=document.createTreeWalker(en, NodeFilter.SHOW_TEXT, null);
    const nodes=[]; let n;
    while(n=tw.nextNode()){ const p=n.parentNode;
      if(p.classList&&(p.classList.contains('ipa')||p.classList.contains('tok'))) continue;
      if(p.closest&&p.closest('.kw')) continue;
      if(n.nodeValue.trim()) nodes.push(n); }
    nodes.forEach(tn=>{
      const frag=document.createDocumentFragment();
      tn.nodeValue.split(/(\s+)/).forEach(part=>{
        if(part==='') return;
        if(/^\s+$/.test(part)) frag.appendChild(document.createTextNode(part));
        else { const s=document.createElement('span'); s.className='tok';
          s.dataset.w=part; s.textContent=part; frag.appendChild(s); }
      });
      tn.parentNode.replaceChild(frag, tn);
    });
  });
}
tokenize();
let TOKENS=[];
function indexTokens(){ TOKENS=[...artEl.querySelectorAll('.tok')]; TOKENS.forEach((t,i)=>t.dataset.i=i); }
indexTokens();

function cleanToken(text){ return (text||'').trim().replace(/^[^A-Za-z]+|[^A-Za-z]+$/g,''); }
function clearSel(){ selbar.style.display='none'; selText=''; }
function showBar(tok){ selbar.style.display='flex';
  const r=tok.getBoundingClientRect();
  const bw=selbar.offsetWidth, bh=selbar.offsetHeight;
  let cx=Math.min(Math.max(r.left+r.width/2, bw/2+8), window.innerWidth-bw/2-8);  // 收拢进屏幕
  let top=r.top-8; if(top<bh+8) top=r.bottom+bh+12;          // 离顶太近则移到下方
  selbar.style.left=cx+'px'; selbar.style.top=top+'px'; }

artEl.addEventListener('dblclick', e=>{
  const tok=e.target.closest&&e.target.closest('.tok');
  if(!tok||!artEl.contains(tok)){ clearSel(); return; }
  selText=cleanToken(tok.dataset.w||tok.textContent);
  if(!selText){ clearSel(); return; }
  showBar(tok);
}, true);
document.getElementById('sel-add').onclick=()=>{ if(selText){ doAdd(selText); clearSel(); } };
document.addEventListener('click', e=>{ if(e.target.closest&&!e.target.closest('#selbar')) clearSel(); }, true);
document.addEventListener('scroll',()=>{ selbar.style.display='none'; }, true);

</script>
