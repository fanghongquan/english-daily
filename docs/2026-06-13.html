<script>
const ARTICLE = {"date": "2026-06-13", "level": "CET-4", "title": "Why We Procrastinate and How to Beat It", "title_zh": "我们为什么拖延，又该如何战胜它", "intro_zh": "本文约 1000 词，CET-4 难度。每段后附中文翻译，选中任意单词或句子可点击播放美式发音，加粗词为重点词汇并标注美式音标。", "paragraphs": [{"en": "Almost everyone is familiar with the strange pull of <span class=\"kw\" data-ipa=\"/prəˌkræstɪˈneɪʃn/\" data-def=\"拖延\">procrastination</span>. You sit down to finish an important task, and within a few minutes you find yourself checking your phone, tidying your desk, or watching just one more short video. The <span class=\"kw\" data-ipa=\"/ˈdedlaɪn/\" data-def=\"截止日期\">deadline</span> is drawing closer, and yet you keep putting off the work that matters most. Many people assume that procrastination is simply a form of laziness, but <span class=\"kw\" data-ipa=\"/saɪˈkɑːlədʒɪsts/\" data-def=\"心理学家\">psychologists</span> argue that the two are completely different. A lazy person has no desire to act at all, while a procrastinator <span class=\"kw\" data-ipa=\"/ˈdʒenjuɪnli/\" data-def=\"真正地\">genuinely</span> intends to work and still struggles to begin.", "zh": "几乎每个人都熟悉拖延那种奇怪的牵引力。你坐下来准备完成一项重要任务，可没过几分钟，就发现自己在刷手机、整理桌子，或者再看一个短视频。截止日期越来越近，你却仍在拖延那件最重要的事。很多人以为拖延不过是懒惰的一种表现，但心理学家指出，二者其实完全不同：懒惰的人根本就不想行动，而拖延者是真心想做事，却迟迟无法开始。"}, {"en": "To understand why this happens, researchers have looked closely at human emotions. Procrastination, they suggest, is not really a problem of poor time management; it is a problem of mood. When a task makes us feel <span class=\"kw\" data-ipa=\"/ˈæŋkʃəs/\" data-def=\"焦虑的\">anxious</span>, bored, or uncertain, the brain searches for a quick escape. Checking social media or making a cup of coffee offers an immediate sense of relief. In other words, we delay the task in order to avoid the unpleasant feelings attached to it, even though this choice almost always creates greater stress a short while later.", "zh": "为了弄清这一切是如何发生的，研究者仔细研究了人的情绪。他们认为，拖延其实并不是时间管理糟糕的问题，而是情绪的问题。当一项任务让我们感到焦虑、无聊或不确定时，大脑就会去寻找一条快速的逃避之路。刷社交媒体、泡杯咖啡，都能带来即时的轻松感。换句话说，我们拖延任务，是为了逃避与之相伴的不快情绪——尽管这种选择几乎总会在稍后制造出更大的压力。"}, {"en": "This pattern is closely linked to the way the human brain evaluates time. We tend to care far more about the present than about the future, a tendency that scientists call \"present <span class=\"kw\" data-ipa=\"/ˈbaɪəs/\" data-def=\"偏向；偏见\">bias</span>.\" The reward of relaxing right now feels concrete and powerful, while the <span class=\"kw\" data-ipa=\"/ˈkɑːnsɪkwens/\" data-def=\"后果\">consequence</span> of a missed deadline seems distant and abstract. As a result, the part of us that wants immediate comfort usually defeats the part that values long-term goals. The <span class=\"kw\" data-ipa=\"/tempˈteɪʃn/\" data-def=\"诱惑\">temptation</span> to relax wins, and the important work is quietly pushed aside once again.", "zh": "这种模式与人脑衡量时间的方式密切相关。我们往往更在乎当下，而非未来，科学家把这种倾向称为“现时偏向”。此刻放松所带来的奖赏显得具体而有力，而错过截止日期的后果却显得遥远又抽象。结果，渴望即时舒适的那一部分自我，往往会击败重视长远目标的那一部分。放松的诱惑获胜，重要的工作于是又一次被悄悄搁置。"}, {"en": "Brain scientists have discovered that this inner <span class=\"kw\" data-ipa=\"/ˈkɑːnflɪkt/\" data-def=\"冲突\">conflict</span> has a physical basis. Deep inside the brain lies the limbic system, an ancient region that craves <span class=\"kw\" data-ipa=\"/ˈɪnstənt/\" data-def=\"即时的\">instant</span> pleasure and reacts strongly to discomfort. Competing with it is the prefrontal cortex, the <span class=\"kw\" data-ipa=\"/ˈræʃnəl/\" data-def=\"理性的\">rational</span> area responsible for planning and self-control. This thoughtful part of the brain knows that the report must be written, but it works slowly and grows tired easily. The emotional brain, by contrast, is fast, loud, and demanding, so whenever we feel stressed it quietly takes the lead, and the wise plans we made earlier in the day are simply forgotten.", "zh": "脑科学家发现，这种内心的冲突有其生理基础。大脑深处藏着边缘系统——一个古老的区域，它渴望即时的快感，对不适反应强烈；与它相抗衡的是前额叶皮层，即负责规划与自控的理性区域。这个善于思考的部分知道报告必须写完，但它运转缓慢、容易疲惫。相比之下，情绪脑快速、喧闹而强势，于是每当我们感到压力，它就会悄悄占据主导，而我们早些时候定下的明智计划也随之被轻易抛在脑后。"}, {"en": "Unfortunately, the habit of delay can be expensive. Students who postpone their studying often perform worse in exams and report higher levels of <span class=\"kw\" data-ipa=\"/æŋˈzaɪəti/\" data-def=\"焦虑\">anxiety</span>. Employees who avoid difficult projects may damage their reputation and miss valuable opportunities. Over time, repeated procrastination can lower a person's confidence, because every broken promise to oneself quietly weakens <span class=\"kw\" data-ipa=\"/ˌself ˈdɪsəplɪn/\" data-def=\"自律\">self-discipline</span>. What begins as a small and harmless escape can gradually grow into a serious <span class=\"kw\" data-ipa=\"/ˈɑːbstəkl/\" data-def=\"障碍\">obstacle</span> to success.", "zh": "遗憾的是，拖延的习惯代价高昂。推迟复习的学生往往考得更差，并报告出更高的焦虑水平；逃避困难项目的员工，可能损害自己的声誉，错失宝贵的机会。久而久之，反复拖延会削弱一个人的自信，因为每一次对自己食言，都会悄悄削弱自律。起初只是一次小小的、看似无害的逃避，却可能逐渐演变成通往成功路上的一道严重障碍。"}, {"en": "Consider a familiar example. A student named Li plans to start a long essay on Monday evening. Feeling tense about the blank page, he decides to relax for just ten minutes first. Those ten minutes quietly turn into an hour of videos, and soon it is almost midnight. Now, tired and guilty, he writes a few careless paragraphs and goes to bed feeling unhappy. The task that once seemed hard has become even harder, and the <span class=\"kw\" data-ipa=\"/ˈpreʃər/\" data-def=\"压力\">pressure</span> he tried to escape has only multiplied. His story is repeated, in countless versions, by millions of people every single day.", "zh": "想一个熟悉的例子。一个叫李明的学生打算周一晚上开始写一篇长文。面对空白的页面，他感到紧张，于是决定先放松“十分钟”。那十分钟悄悄变成了一个小时的刷视频，转眼就快到午夜。此刻，他又累又愧疚，草草写下几段敷衍的文字，带着不快上床。原本就显得困难的任务，如今变得更难，而他想逃避的压力，反而成倍增加。他的故事，每天都在数百万人身上以无数版本重演。"}, {"en": "The good news is that procrastination can be managed once we understand its true cause. Since the problem is emotional rather than logical, the solution must deal with our feelings as well. One effective <span class=\"kw\" data-ipa=\"/ˈstrætədʒi/\" data-def=\"策略\">strategy</span> is to make the very first step as small as possible. Instead of planning to write an entire essay, you might decide simply to open the document and type a single sentence. This tiny action reduces the fear surrounding the task and helps you build <span class=\"kw\" data-ipa=\"/moʊˈmentəm/\" data-def=\"势头；动力\">momentum</span>, which often carries you much further than you expected.", "zh": "好消息是，一旦我们理解了拖延的真正原因，它就是可以被管理的。既然问题源于情绪而非逻辑，解决办法也必须照顾到我们的感受。一个有效的策略，是把第一步做得尽可能小。与其计划写完整篇文章，不如干脆决定：先打开文档，敲下一句话。这个微小的动作能减轻笼罩在任务上的恐惧，帮你积累势头，而这种势头往往会把你带得比预想的更远。"}, {"en": "Another useful method is to remove <span class=\"kw\" data-ipa=\"/dɪˈstrækʃnz/\" data-def=\"干扰物\">distractions</span> from your environment. Because willpower is limited, relying on it alone is rarely enough. If your phone sits on the desk, the <span class=\"kw\" data-ipa=\"/ˈɪmpʌls/\" data-def=\"冲动\">impulse</span> to check it will keep returning. Turning off notifications, leaving the phone in another room, or using a website blocker can make focus far easier to achieve. By designing a space that supports concentration, you no longer have to fight every single temptation on your own willpower.", "zh": "另一个有用的方法，是把干扰从你的环境中移除。由于意志力是有限的，单靠它几乎总是不够的。如果手机就放在桌上，查看它的冲动就会不断地回来。关掉通知、把手机放到另一个房间，或使用网站拦截工具，都能让专注变得容易得多。通过设计一个支持专注的空间，你就不必再凭一己的意志力去对抗每一个诱惑。"}, {"en": "Setting clear and realistic goals also makes a noticeable difference. A large project can feel <span class=\"kw\" data-ipa=\"/ˌoʊvərˈwelmɪŋ/\" data-def=\"令人不知所措的\">overwhelming</span>, which is exactly why we avoid it. Breaking it into smaller parts, each with its own short deadline, turns a frightening mountain into a series of manageable steps. Rewarding yourself after finishing each part adds <span class=\"kw\" data-ipa=\"/ˌmoʊtɪˈveɪʃn/\" data-def=\"动力；积极性\">motivation</span> and makes the whole process more enjoyable. Progress, however small it may seem, gently encourages us to keep going.", "zh": "设定清晰而现实的目标，同样会带来明显的不同。一个庞大的项目会让人感到难以招架，而这恰恰是我们回避它的原因。把它拆成更小的部分，每一部分都配上各自的短期截止日期，就能把一座吓人的大山，变成一连串可控的小台阶。每完成一部分就奖励自己，能增添动力，让整个过程更愉快。无论进展看起来多么微小，它都会温柔地鼓励我们继续前行。"}, {"en": "It can also be surprisingly powerful to involve other people. Telling a friend about your goal, studying beside a classmate, or joining an online group creates a gentle sense of <span class=\"kw\" data-ipa=\"/əˌkaʊntəˈbɪləti/\" data-def=\"责任感；担责\">accountability</span>. When we know that someone may ask about our progress, we are far more likely to follow through. Some learners also rely on a simple timer, working in focused blocks of twenty-five minutes followed by a short rest. This well-known <span class=\"kw\" data-ipa=\"/tekˈniːk/\" data-def=\"方法；技巧\">technique</span>, often called the Pomodoro method, makes starting feel far less frightening and keeps the mind fresh and alert.", "zh": "把别人“卷”进来，往往也有意想不到的力量。把目标告诉朋友、和同学并肩学习，或加入一个线上小组，都会带来一种温和的责任感。当我们知道有人可能会问起进展时，就更有可能坚持把事情做完。也有人借助一个简单的计时器：专注工作二十五分钟，再休息片刻。这个广为人知的方法，常被称作“番茄工作法”，能让“开始”变得没那么可怕，也让头脑保持清醒和敏锐。"}, {"en": "Finally, it helps to treat yourself with kindness rather than harsh criticism. Studies show that people who forgive themselves for procrastinating are actually less likely to <span class=\"kw\" data-ipa=\"/prəˈkræstɪneɪt/\" data-def=\"拖延\">procrastinate</span> in the future. Guilt and self-blame only increase the very negative emotions that caused the delay in the first place. Procrastination is a common human weakness, not a sign of a hopeless character. With patience, a little self-understanding, and a few practical habits, almost anyone can learn to <span class=\"kw\" data-ipa=\"/əˈkɑːmplɪʃ/\" data-def=\"完成；实现\">accomplish</span> more and worry far less.", "zh": "最后，善待自己、而非苛责自己，会很有帮助。研究表明，那些原谅自己拖延的人，反而在未来更不容易拖延。内疚和自责只会加重最初导致拖延的那些负面情绪。拖延是人类常见的弱点，并不意味着一个人性格无可救药。只要有耐心、有一点自我理解，再加上几个切实可行的习惯，几乎任何人都能学会完成更多，而焦虑更少。"}], "vocab": [{"w": "procrastination", "ipa": "/prəˌkræstɪˈneɪʃn/", "def": "n. 拖延"}, {"w": "deadline", "ipa": "/ˈdedlaɪn/", "def": "n. 截止日期"}, {"w": "psychologist", "ipa": "/saɪˈkɑːlədʒɪst/", "def": "n. 心理学家"}, {"w": "genuinely", "ipa": "/ˈdʒenjuɪnli/", "def": "adv. 真正地"}, {"w": "anxious", "ipa": "/ˈæŋkʃəs/", "def": "adj. 焦虑的"}, {"w": "bias", "ipa": "/ˈbaɪəs/", "def": "n. 偏向；偏见"}, {"w": "conflict", "ipa": "/ˈkɑːnflɪkt/", "def": "n. 冲突"}, {"w": "instant", "ipa": "/ˈɪnstənt/", "def": "adj. 即时的"}, {"w": "rational", "ipa": "/ˈræʃnəl/", "def": "adj. 理性的"}, {"w": "accountability", "ipa": "/əˌkaʊntəˈbɪləti/", "def": "n. 责任感；担责"}, {"w": "technique", "ipa": "/tekˈniːk/", "def": "n. 方法；技巧"}, {"w": "consequence", "ipa": "/ˈkɑːnsɪkwens/", "def": "n. 后果"}, {"w": "temptation", "ipa": "/tempˈteɪʃn/", "def": "n. 诱惑"}, {"w": "anxiety", "ipa": "/æŋˈzaɪəti/", "def": "n. 焦虑"}, {"w": "self-discipline", "ipa": "/ˌself ˈdɪsəplɪn/", "def": "n. 自律"}, {"w": "obstacle", "ipa": "/ˈɑːbstəkl/", "def": "n. 障碍"}, {"w": "pressure", "ipa": "/ˈpreʃər/", "def": "n. 压力"}, {"w": "strategy", "ipa": "/ˈstrætədʒi/", "def": "n. 策略"}, {"w": "momentum", "ipa": "/moʊˈmentəm/", "def": "n. 势头；动力"}, {"w": "distraction", "ipa": "/dɪˈstrækʃn/", "def": "n. 干扰物"}, {"w": "impulse", "ipa": "/ˈɪmpʌls/", "def": "n. 冲动"}, {"w": "overwhelming", "ipa": "/ˌoʊvərˈwelmɪŋ/", "def": "adj. 令人不知所措的"}, {"w": "motivation", "ipa": "/ˌmoʊtɪˈveɪʃn/", "def": "n. 动力；积极性"}, {"w": "procrastinate", "ipa": "/prəˈkræstɪneɪt/", "def": "v. 拖延"}, {"w": "accomplish", "ipa": "/əˈkɑːmplɪʃ/", "def": "v. 完成；实现"}], "audio": {"full": "audio/2026-06-13/full.mp3", "paras": ["audio/2026-06-13/p0.mp3", "audio/2026-06-13/p1.mp3", "audio/2026-06-13/p2.mp3", "audio/2026-06-13/p3.mp3", "audio/2026-06-13/p4.mp3", "audio/2026-06-13/p5.mp3", "audio/2026-06-13/p6.mp3", "audio/2026-06-13/p7.mp3", "audio/2026-06-13/p8.mp3", "audio/2026-06-13/p9.mp3", "audio/2026-06-13/p10.mp3"], "vocab": {"procrastination": "audio/2026-06-13/v_procrastination.mp3", "deadline": "audio/2026-06-13/v_deadline.mp3", "psychologist": "audio/2026-06-13/v_psychologist.mp3", "genuinely": "audio/2026-06-13/v_genuinely.mp3", "anxious": "audio/2026-06-13/v_anxious.mp3", "bias": "audio/2026-06-13/v_bias.mp3", "conflict": "audio/2026-06-13/v_conflict.mp3", "instant": "audio/2026-06-13/v_instant.mp3", "rational": "audio/2026-06-13/v_rational.mp3", "accountability": "audio/2026-06-13/v_accountability.mp3", "technique": "audio/2026-06-13/v_technique.mp3", "consequence": "audio/2026-06-13/v_consequence.mp3", "temptation": "audio/2026-06-13/v_temptation.mp3", "anxiety": "audio/2026-06-13/v_anxiety.mp3", "self-discipline": "audio/2026-06-13/v_self-discipline.mp3", "obstacle": "audio/2026-06-13/v_obstacle.mp3", "pressure": "audio/2026-06-13/v_pressure.mp3", "strategy": "audio/2026-06-13/v_strategy.mp3", "momentum": "audio/2026-06-13/v_momentum.mp3", "distraction": "audio/2026-06-13/v_distraction.mp3", "impulse": "audio/2026-06-13/v_impulse.mp3", "overwhelming": "audio/2026-06-13/v_overwhelming.mp3", "motivation": "audio/2026-06-13/v_motivation.mp3", "procrastinate": "audio/2026-06-13/v_procrastinate.mp3", "accomplish": "audio/2026-06-13/v_accomplish.mp3"}}};

/* ---------- speech engine ---------- */
let usVoice = null, rate = 0.95, enVoices = [];
// 高音质嗓音关键词（增强版 / 神经 / Siri / Google 等），优先选用
const GOOD = /(Siri|Natural|Neural|Enhanced|Premium|Online|Ava|Zoe|Allison|Evan|Nathan|Joelle|Google US English|Microsoft)/i;
// 低音质“紧凑版”特征，尽量避开
const POOR = /(compact|eloquence|fred|albert|junior|organ|bells|bahh|trinoids|whisper|zarvox|cellos|bad news|good news|deranged|boing|wobble|superstar)/i;

function rankVoice(v){
  let s = 0;
  if(/^en[-_]US/i.test(v.lang)) s += 6;
  else if(/^en[-_](GB|AU|CA)/i.test(v.lang)) s += 3;
  else if(/^en/i.test(v.lang)) s += 1;
  if(GOOD.test(v.name)) s += 6;
  if(/google/i.test(v.name)) s += 4;       // Chrome 的 Google US 比苹果紧凑版自然
  if(/enhanced|premium|siri|neural|natural/i.test(v.name)) s += 5;
  if(v.localService === false) s += 2;      // 云端嗓音通常更自然
  if(POOR.test(v.name)) s -= 8;
  if(/compact/i.test(v.voiceURI||'')) s -= 5;
  return s;
}

function loadVoices(){
  const all = speechSynthesis.getVoices();
  enVoices = all.filter(v=>/^en/i.test(v.lang)).sort((a,b)=>rankVoice(b)-rankVoice(a));
  // 还原上次的选择
  const saved = localStorage.getItem('voiceURI');
  usVoice = (saved && enVoices.find(v=>v.voiceURI===saved)) || enVoices[0] || null;
  buildVoiceSelect();
}

function buildVoiceSelect(){
  const sel = document.getElementById('voice');
  if(!sel || !enVoices.length) return;
  sel.innerHTML = '';
  enVoices.forEach(v=>{
    const o = document.createElement('option');
    o.value = v.voiceURI;
    const nice = /enhanced|premium|siri|neural|natural/i.test(v.name) ? ' ⭐' : '';
    o.textContent = v.name + ' (' + v.lang + ')' + nice;
    if(usVoice && v.voiceURI===usVoice.voiceURI) o.selected = true;
    sel.appendChild(o);
  });
  sel.onchange = ()=>{
    usVoice = enVoices.find(v=>v.voiceURI===sel.value) || usVoice;
    localStorage.setItem('voiceURI', sel.value);
  };
}

loadVoices();
speechSynthesis.onvoiceschanged = loadVoices;

let curUtter = null;
function speak(text, onword, onend){
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang='en-US'; u.rate=rate; if(usVoice) u.voice=usVoice;
  if(onword) u.onboundary = onword;
  u.onend = ()=>{ curUtter=null; if(onend) onend(); };
  curUtter = u;
  speechSynthesis.speak(u);
}
function stopAll(){ speechSynthesis.cancel(); curUtter=null;
  if(curAudio){ curAudio.pause(); curAudio=null; }
  document.querySelectorAll('.speaking').forEach(e=>e.classList.remove('speaking')); }

/* ---------- 优先播放预生成的自然音频(腾讯云 TTS)，否则回退浏览器实时合成 ---------- */
const AUDIO = ARTICLE.audio || null;
let curAudio = null;
function playUnit(src, fallbackText, hiEl){
  stopAll();
  if(src){
    if(hiEl) hiEl.classList.add('speaking');
    const a = new Audio(src);
    a.playbackRate = rate;
    curAudio = a;
    a.onended = ()=>{ curAudio=null; if(hiEl) hiEl.classList.remove('speaking'); };
    a.onerror = ()=>{ if(hiEl) hiEl.classList.remove('speaking');
                      if(fallbackText) speak(fallbackText); };   // 音频缺失则回退
    a.play().catch(()=>{ if(hiEl) hiEl.classList.remove('speaking');
                         if(fallbackText) speak(fallbackText); });
  } else {
    if(hiEl) hiEl.classList.add('speaking');
    speak(fallbackText, null, ()=>{ if(hiEl) hiEl.classList.remove('speaking'); });
  }
}
const vAudio = w => (AUDIO && AUDIO.vocab && AUDIO.vocab[w]) || null;

/* ---------- render ---------- */
document.getElementById('m-level').textContent = ARTICLE.level||'CET-4';
document.getElementById('m-date').textContent  = ARTICLE.date||'';
document.getElementById('m-title').textContent = ARTICLE.title||'';
document.getElementById('m-titlezh').textContent = ARTICLE.title_zh||'';
document.getElementById('m-intro').textContent = ARTICLE.intro_zh||'';

const art = document.getElementById('article');
ARTICLE.paragraphs.forEach((p,i)=>{
  const div = document.createElement('div');
  div.className='para show-zh';
  div.innerHTML =
    '<div class="en">'+p.en+'</div>'+
    '<div class="ptools">'+
      '<button class="icbtn pl">🔊 朗读本段</button>'+
      '<button class="icbtn tz">中/英</button>'+
    '</div>'+
    '<div class="zh">'+p.zh+'</div>';
  art.appendChild(div);
  // plain text for paragraph speech
  const plain = div.querySelector('.en').textContent;
  div.querySelector('.pl').onclick = ()=>{
    const src = AUDIO && AUDIO.paras && AUDIO.paras[i];
    playUnit(src, plain, div.querySelector('.en'));
  };
  div.querySelector('.tz').onclick = ()=>div.classList.toggle('show-zh');
});

/* key-word IPA badges + click to speak the word */
function applyIpa(show){
  document.querySelectorAll('.en .kw').forEach(k=>{
    let badge = k.querySelector('.ipa');
    if(show){
      if(!badge){
        badge = document.createElement('span');
        badge.className='ipa';
        badge.textContent = k.dataset.ipa||'';
        k.appendChild(badge);
      }
      badge.style.display='';
    } else if(badge){ badge.style.display='none'; }
  });
}
applyIpa(true);
document.querySelectorAll('.en .kw').forEach(k=>{
  k.addEventListener('click',e=>{
    e.stopPropagation();
    const word = (k.firstChild.textContent||k.textContent).trim();
    playUnit(vAudio(word), word, k);
  });
});

/* vocab list */
const vl = document.getElementById('vlist');
(ARTICLE.vocab||[]).forEach(v=>{
  const row=document.createElement('div'); row.className='vrow';
  row.innerHTML='<span class="w">'+v.w+'</span><span class="vipa">'+v.ipa+
    '</span><span class="vdef">'+v.def+'</span><span class="play">🔊</span>';
  row.onclick=()=>playUnit(vAudio(v.w), v.w, null);
  vl.appendChild(row);
});

/* ---------- toolbar ---------- */
const tgZh=document.getElementById('tg-zh');
tgZh.onclick=()=>{
  const on=tgZh.classList.toggle('on');
  tgZh.textContent = on?'显示中文翻译':'隐藏中文翻译';
  document.querySelectorAll('.para').forEach(p=>p.classList.toggle('show-zh',on));
};
const tgIpa=document.getElementById('tg-ipa'); let ipaOn=true;
tgIpa.onclick=()=>{ ipaOn=!ipaOn; applyIpa(ipaOn);
  tgIpa.textContent = ipaOn?'隐藏音标':'显示音标'; };

document.getElementById('play-all').onclick=()=>{
  const full = ARTICLE.paragraphs.map(p=>{
    const t=document.createElement('div'); t.innerHTML=p.en; return t.textContent;
  }).join(' ');
  playUnit(AUDIO && AUDIO.full, full, null);
};
document.getElementById('stop').onclick=stopAll;
if(AUDIO){ document.querySelector('.tip').insertAdjacentHTML('beforeend',
  '<br><b style="color:var(--accent)">✅ 已启用云端自然语音</b>：朗读全文 / 本段 / 重点词为预生成的高自然度发音；选中任意文字仍用浏览器实时合成。'); }
const rEl=document.getElementById('rate'), rv=document.getElementById('rateval');
rEl.oninput=()=>{ rate=parseFloat(rEl.value); rv.textContent=rate.toFixed(2)+'×'; };

/* ---------- selection player ---------- */
const selbtn=document.getElementById('selbtn');
function showSel(){
  const s=window.getSelection();
  const txt=s.toString().trim();
  if(txt && /[a-zA-Z]/.test(txt) && s.rangeCount){
    const r=s.getRangeAt(0).getBoundingClientRect();
    selbtn.style.left=(r.left+r.width/2)+'px';
    selbtn.style.top=(r.top-8)+'px';
    selbtn.style.display='block';
    selbtn.dataset.txt=txt;
  } else { selbtn.style.display='none'; }
}
document.addEventListener('mouseup',()=>setTimeout(showSel,10));
document.addEventListener('touchend',()=>setTimeout(showSel,10));
selbtn.addEventListener('mousedown',e=>e.preventDefault());
selbtn.onclick=()=>{ if(selbtn.dataset.txt) speak(selbtn.dataset.txt); };
document.addEventListener('scroll',()=>{ selbtn.style.display='none'; },true);
</script>
</body>
