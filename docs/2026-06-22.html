scattered less. That is why the sun itself looks yellowish-white; the blue light has been removed from the direct sunlight, leaving a mix of other colors.", "zh": "为了更好地理解这一点，想象一下打台球。当你用主球撞击一堆球时，较小的球往往更容易散开。类似地，蓝光由于其较短的波长，更频繁地与大气的微小气体分子相互作用，向各个方向散射。这些散射的蓝光从天空的各个部分进入我们的眼睛，使整个穹顶看起来是蓝色的。另一方面，红光波长较长，传播更直接，散射较少。这就是为什么太阳本身看起来是黄白色的；蓝光从直射阳光中被移除，留下了其他颜色的混合光。"}, {"en": "Now, have you noticed that the sky is not always blue? During sunrise and sunset, the sky often turns red, orange, or pink. This happens because the sun is lower in the sky, and its light has to pass through a thicker layer of the <span class=\"kw\" data-ipa=\"/ˈætməsˌfɪr/\" data-def=\"n. 大气层\">atmosphere</span> to reach our eyes. As a result, almost all of the blue light is scattered away before it gets to us, leaving the longer wavelength colors like red and orange <span class=\"kw\" data-ipa=\"/dəˈmɪnənt/\" data-def=\"adj. 主要的\">dominant</span>. The same <span class=\"kw\" data-ipa=\"/ˈfenəmənən/\" data-def=\"n. 现象\">phenomenon</span> is responsible for the reddish colors we see in the smoke from fires or in the dust of a desert sky.", "zh": "那么，你是否注意到天空并不总是蓝色的呢？在日出和日落时，天空常常变成红色、橙色或粉色。这是因为太阳位置较低，其光线必须穿过更厚的大气层才能到达我们眼中。结果，几乎所有的蓝光都在到达我们之前被散射掉了，留下波长较长的颜色如红色和橙色占据主导。同样的现象也解释了为什么我们在火灾的烟雾中或沙漠天空的尘土中会看到偏红的颜色。"}, {"en": "What about clouds? They are white because the water <span class=\"kw\" data-ipa=\"/ˈdrɒplɪt/\" data-def=\"n. 小滴\">droplets</span> or ice crystals inside them are much larger than the molecules of air. For these larger particles, all colors of light are scattered equally—a process called Mie scattering. So when sunlight hits a cloud, all the colors are reflected toward our eyes at once, resulting in white. However, if a cloud is thick enough, it can block most of the sunlight, making it appear gray or dark. The <span class=\"kw\" data-ipa=\"/ˈsaɪz/\" data-def=\"n. 大小\">size</span> of the particles determines which scattering process occurs.", "zh": "那么云朵呢？它们是白色的，因为云中的水滴或冰晶比空气分子大得多。对于这些较大的颗粒，所有颜色的光都被等量地散射——这个过程称为米氏散射。所以当阳光照射到云朵上时，所有颜色同时被反射到我们眼中，结果呈现白色。然而，如果云层很厚，它可能会阻挡大部分阳光，使其看起来是灰色或暗色。颗粒的大小决定了哪种散射过程会发生。"}, {"en": "The blue sky we see is actually a result of a <span class=\"kw\" data-ipa=\"/ˈkɒmplɪkətɪd/\" data-def=\"adj. 复杂的\">complicated</span> interplay of light and matter. Without the atmosphere, the sky would be black, like it is on the moon. During the day, the moon's sky remains dark because there is no air to scatter sunlight. This <span class=\"kw\" data-ipa=\"/kənˈtræst/\" data-def=\"n. 对比\">contrast</span> highlights the importance of Earth's gaseous envelope in creating the colorful world we live in. Interestingly, the same Rayleigh scattering also explains why the sky appears <span class=\"kw\" data-ipa=\"/ˈlævəndər/\" data-def=\"adj. 淡紫色的\">lavender</span> or purple under certain conditions, though our eyes are less sensitive to those wavelengths.", "zh": "我们看到的蓝天实际上是光与物质复杂相互作用的结果。如果没有大气层，天空会是黑色的，就像月球上那样。在白天，月球的天空仍然是黑暗的，因为没有空气来散射阳光。这种对比突显了地球气态外壳在创造我们生活的多彩世界中的重要性。有趣的是，同样的瑞利散射也解释了为什么在某些条件下天空会呈现淡紫色或紫色，尽管我们的眼睛对这些波长不那么敏感。"}, {"en": "This knowledge is not just for <span class=\"kw\" data-ipa=\"/ˈθɪəri/\" data-def=\"n. 理论\">theory</span>; it has practical applications. For example, scientists use Rayleigh scattering to study the composition of <span class=\"kw\" data-ipa=\"/ˈætməsfɪrz/\" data-def=\"n. 大气层（复数）\">atmospheres</span> of other planets. By analyzing the colors of light scattered from a planet's atmosphere, they can deduce what gases are present. Similarly, meteorologists use the colors of the sky to predict weather. A red sky at night might indicate clear weather, while a red sky in the morning could mean storms are coming. These <span class=\"kw\" data-ipa=\"/ˈpræktɪkəl/\" data-def=\"adj. 实际的\">practical</span> observations have been used for centuries.", "zh": "这一知识不仅仅是理论，它还有实际应用。例如，科学家利用瑞利散射来研究其他行星大气层的成分。通过分析从行星大气中散射出来的光的颜色，他们可以推断出存在哪些气体。同样，气象学家利用天空的颜色来预测天气。晚上天边泛红可能预示晴朗天气，而早晨天边泛红则可能意味着风暴即将来临。这些实际的观测方法已经被使用了几个世纪。"}, {"en": "Next time you gaze at the sky, remember that the beautiful blue you see is a <span class=\"kw\" data-ipa=\"/ˈmɪrəkl/\" data-def=\"n. 奇迹\">miracle</span> of physics. It is a daily <span class=\"kw\" data-ipa=\"/rɪˈmaɪndər/\" data-def=\"n. 提醒物\">reminder</span> of the invisible processes that shape our world. From the scattering of light to the composition of the air, every element plays a role. So, the next time someone asks, 'Why is the sky blue?', you can explain it with confidence, and maybe even spark a curiosity for science in them.", "zh": "下次当你凝视天空时，请记住你看到的美丽蓝色是物理学的奇迹。它每天提醒着我们那些塑造世界的无形过程。从光的散射到空气的组成，每一个元素都在发挥作用。所以，当下次有人问“为什么天空是蓝色的？”时，你可以自信地解释，甚至可能在他们的心中点燃对科学的好奇心。"}], "vocab": [{"w": "atmosphere", "ipa": "/ˈætməsˌfɪr/", "def": "n. 大气层"}, {"w": "scatter", "ipa": "/ˈskætər/", "def": "v. 散射，分散"}, {"w": "characteristic", "ipa": "/ˌkɛrəktəˈrɪstɪk/", "def": "adj. 特有的，典型的"}, {"w": "atmospheric", "ipa": "/ˌætməsˈfɛrɪk/", "def": "adj. 大气的"}, {"w": "straightly", "ipa": "/ˈstreɪtli/", "def": "adv. 径直地，直接地"}, {"w": "dominant", "ipa": "/ˈdɑmənənt/", "def": "adj. 主要的，占优势的"}, {"w": "phenomenon", "ipa": "/fəˈnɑmənɑn/", "def": "n. 现象"}, {"w": "droplet", "ipa": "/ˈdrɑplət/", "def": "n. 小滴，微滴"}, {"w": "size", "ipa": "/saɪz/", "def": "n. 大小，尺寸"}, {"w": "complicated", "ipa": "/ˈkɑmplɪkeɪtɪd/", "def": "adj. 复杂的"}, {"w": "contrast", "ipa": "/ˈkɑntræst/", "def": "n. 对比，差异"}, {"w": "lavender", "ipa": "/ˈlævəndər/", "def": "adj. 淡紫色的"}, {"w": "theory", "ipa": "/ˈθɪri/", "def": "n. 理论"}, {"w": "atmospheres", "ipa": "/ˈætməsfɪrz/", "def": "n. 大气层（复数）"}, {"w": "practical", "ipa": "/ˈpræktɪkəl/", "def": "adj. 实际的，实用的"}, {"w": "miracle", "ipa": "/ˈmɪrəkəl/", "def": "n. 奇迹"}, {"w": "reminder", "ipa": "/rɪˈmaɪndər/", "def": "n. 提醒物，提示"}]};

function pickFallback(){ const vs=speechSynthesis.getVoices();
  usVoice=vs.find(v=>/en-US/i.test(v.lang)&&/Google|Natural|Neural|Enhanced|Siri|Premium/i.test(v.name))
        ||vs.find(v=>v.lang==='en-US')||vs.find(v=>/^en/i.test(v.lang))||null; }
pickFallback(); speechSynthesis.onvoiceschanged=pickFallback;
function speakFallback(text){ speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text); u.lang='en-US'; u.rate=rate;
  if(usVoice)u.voice=usVoice; speechSynthesis.speak(u); }

const clipCache=new Map(); let curAudio=null, token=0;
function stopAll(){ token++; if(curAudio){curAudio.pause();curAudio=null;} speechSynthesis.cancel();
  document.querySelectorAll('.speaking').forEach(e=>e.classList.remove('speaking')); }
function splitClient(text){ const parts=text.trim().split(/(?<=[.!?;:])\s+/); const out=[]; let buf='';
  for(let s of parts){ while(s.length>180){ let c=s.lastIndexOf(' ',180); if(c<=0)c=180;
    out.push(s.slice(0,c)); s=s.slice(c).trim(); }
    if((buf+' '+s).trim().length<=180) buf=(buf+' '+s).trim();
    else { if(buf)out.push(buf); buf=s; } }
  if(buf)out.push(buf); return out.length?out:[text.trim()]; }
async function fetchClip(text){ const key=voice+'|'+text;
  if(clipCache.has(key))return clipCache.get(key);
  const r=await fetch(TTS_API,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({text,voice})});
  if(!r.ok)throw new Error('http'+r.status); const j=await r.json();
  if(!j.audio)throw new Error(j.error||'no audio');
  const url='data:audio/mp3;base64,'+j.audio; clipCache.set(key,url); return url; }
function playClip(url){ return new Promise((res,rej)=>{ const a=new Audio(url);
  a.playbackRate=rate; curAudio=a; a.onended=res; a.onerror=()=>rej(new Error('audio'));
  a.play().catch(rej); }); }
async function play(text, hiEl){
  if(!text) return; stopAll(); const my=token;
  if(hiEl)hiEl.classList.add('speaking');
  try{
    if(!cloudOn){ speakFallback(text); return; }
    const parts=splitClient(text);
    for(let i=0;i<parts.length;i++){ if(my!==token)return;
      const cur=fetchClip(parts[i]); if(i+1<parts.length)fetchClip(parts[i+1]).catch(()=>{});
      let url; try{ url=await cur; }catch(e){ speakFallback(parts.slice(i).join(' ')); return; }
      if(my!==token)return; await playClip(url); }
  } finally { if(my===token&&hiEl)hiEl.classList.remove('speaking'); }
}

/* 生词直接存入墨墨背单词，见下方 doAdd() */

/* ========== 渲染文章 ========== */
document.getElementById('m-level').textContent=ARTICLE.level||'CET-4';
document.getElementById('m-date').textContent=ARTICLE.date||'';
document.getElementById('m-title').textContent=ARTICLE.title||'';
document.getElementById('m-titlezh').textContent=ARTICLE.title_zh||'';
document.getElementById('m-intro').textContent=ARTICLE.intro_zh||'';
document.getElementById('engine-note').textContent=
  cloudOn?'（腾讯云自然发音）':'（当前用浏览器语音）';

const art=document.getElementById('article');
ARTICLE.paragraphs.forEach((p,i)=>{
  const div=document.createElement('div'); div.className='para show-zh';
  div.innerHTML='<div class="en">'+p.en+'</div>'+
    '<div class="ptools"><button class="icbtn tz">中/英</button></div>'+
    '<div class="zh">'+p.zh+'</div>';

  div.querySelector('.tz').onclick=()=>div.classList.toggle('show-zh');
});
function applyIpa(show){ document.querySelectorAll('.en .kw').forEach(k=>{
  let b=k.querySelector('.ipa');
  if(show){ if(!b){ b=document.createElement('span'); b.className='ipa'; b.textContent=k.dataset.ipa||''; k.appendChild(b);} b.style.display=''; }
  else if(b){ b.style.display='none'; } }); }
applyIpa(true);

/* 词汇表(播放 + 加入遗忘库) */
const vl=document.getElementById('vlist');
(ARTICLE.vocab||[]).forEach(v=>{ const row=document.createElement('div'); row.className='vrow';
  row.innerHTML='<span class="w">'+v.w+'</span><span class="vipa">'+v.ipa+

/* ========== 工具条 ========== */
const tgZh=document.getElementById('tg-zh');
tgZh.onclick=()=>{ const on=tgZh.classList.toggle('on'); tgZh.textContent=on?'显示中文翻译':'隐藏中文翻译';

tgIpa.onclick=()=>{ ipaOn=!ipaOn; applyIpa(ipaOn); tgIpa.textContent=ipaOn?'隐藏音标':'显示音标'; };

  play(full,null); };
document.getElementById('stop').onclick=stopAll;
const rEl=document.getElementById('rate'),rv=document.getElementById('rateval');
rEl.oninput=()=>{ rate=parseFloat(rEl.value); rv.textContent=rate.toFixed(2)+'×'; if(curAudio)curAudio.playbackRate=rate; };
const vEl=document.getElementById('voice'); vEl.value=String(voice);
vEl.onchange=()=>{ voice=parseInt(vEl.value,10); localStorage.setItem('ttsVoice',vEl.value); };

/* ========== toast ========== */
let toastT=null;
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),1600); }
async function doAdd(text){ text=(text||'').trim(); if(!text) return;
  if(!cloudOn){ toast('需云函数支持'); return; }
  toast('正在加入墨墨…');
  try{
    const r=await fetch(TTS_API,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({op:'maimemo',text})});
    const j=await r.json();
    if(j.ok){ toast(j.dup?'已经在墨墨里了':('已加入墨墨 ✓ 共 '+(j.total||'?')+' 词')); }
    else { toast('加入失败'+(j.error?'：'+j.error:'')); }
  }catch(e){ toast('加入失败，请重试'); } }

/* ========== 自定义选择(禁用系统翻译/查询菜单) ========== */
const selbar=document.getElementById('selbar');
let selText='';
const artEl=document.getElementById('article');

function tokenize(){
  artEl.querySelectorAll('.en').forEach(en=>{
    en.querySelectorAll('.kw').forEach(k=>{ k.classList.add('tok');
      k.dataset.w=(k.firstChild.textContent||k.textContent).trim(); });
    const tw=document.createTreeWalker(en, NodeFilter.SHOW_TEXT, null);
    const nodes=[]; let n;
    while(n=tw.nextNode()){ const p=n.parentNode;
      if(p.classList&&(p.classList.contains('ipa')||p.classList.contains('tok'))) continue;
      if(p.closest&&p.closest('.kw')) continue;
      if(n.nodeValue.trim()) nodes.push(n); }
    nodes.forEach(tn=>{
      const frag=document.createDocumentFragment();
      tn.nodeValue.split(/(\s+)/).forEach(part=>{
        if(part==='') return;
        if(/^\s+$/.test(part)) frag.appendChild(document.createTextNode(part));
        else { const s=document.createElement('span'); s.className='tok';
          s.dataset.w=part; s.textContent=part; frag.appendChild(s); }
      });
      tn.parentNode.replaceChild(frag, tn);
    });
  });
}
tokenize();
let TOKENS=[];
function indexTokens(){ TOKENS=[...artEl.querySelectorAll('.tok')]; TOKENS.forEach((t,i)=>t.dataset.i=i); }
indexTokens();

function tokAt(x,y){ const e=document.elementFromPoint(x,y);
  if(!e||!e.closest) return -1; const t=e.closest('.tok'); return t?+t.dataset.i:-1; }
function hl(a,b){ const lo=Math.min(a,b),hi=Math.max(a,b);
  TOKENS.forEach((t,i)=>t.classList.toggle('sel', i>=lo&&i<=hi)); }
function selOf(a,b){ const lo=Math.min(a,b),hi=Math.max(a,b);
  return TOKENS.slice(lo,hi+1).map(t=>(t.dataset.w||t.textContent).trim()).filter(Boolean)
    .join(' ').replace(/\s+([,.;:!?])/g,'$1').trim(); }
function clearSel(){ TOKENS.forEach(t=>t.classList.remove('sel')); selbar.style.display='none';
  document.getElementById('transbox').style.display='none'; selText=''; }
function showBar(a,b){ selbar.style.display='flex';
  const r=TOKENS[Math.max(a,b)].getBoundingClientRect();
  const bw=selbar.offsetWidth, bh=selbar.offsetHeight;
  let cx=Math.min(Math.max(r.left+r.width/2, bw/2+8), window.innerWidth-bw/2-8);  // 收拢进屏幕
  let top=r.top-8; if(top<bh+8) top=r.bottom+bh+12;          // 离顶太近则移到下方
  selbar.style.left=cx+'px'; selbar.style.top=top+'px'; }

let selecting=false, anchor=-1, head=-1, sx=0, sy=0, moved=false;
artEl.addEventListener('pointerdown', e=>{
  sx=e.clientX; sy=e.clientY; moved=false;
  if(e.pointerType==='mouse'){          // 电脑:按下即可拖选
    const i=tokAt(e.clientX,e.clientY); clearSel(); if(i<0) return;
    selecting=true; anchor=head=i; hl(i,i);
  }
  /* 手机:按下不动作，松手时再判定(点选 / 扩选 / 滚动) */
}, true);
artEl.addEventListener('pointermove', e=>{
  if(Math.abs(e.clientX-sx)+Math.abs(e.clientY-sy)>8) moved=true;
  if(!selecting) return;                // 手机或未选中:允许页面正常滚动
  const i=tokAt(e.clientX,e.clientY); if(i<0) return; head=i; hl(anchor,i); e.preventDefault();
}, {passive:false});
window.addEventListener('pointerup', e=>{
  if(e.target.closest && (e.target.closest('#selbar') || e.target.closest('#transbox'))) return;
  if(selecting){ selecting=false; const t=selOf(anchor,head); if(t){ selText=t; showBar(anchor,head);} return; }
  if(moved) return;                     // 手机上是滚动手势，忽略
  const i=tokAt(e.clientX,e.clientY);
  if(i<0){ clearSel(); return; }        // 点空白=取消选择
  if(selText && anchor>=0 && i!==anchor){ head=i; }   // 已选中再点另一个词 = 扩展成整句
  else { anchor=head=i; }               // 否则 = 选这个词
  hl(anchor,head); selText=selOf(anchor,head); showBar(anchor,head); });
document.getElementById('sel-play').onclick=()=>{ if(selText) play(selText,null); };
document.getElementById('sel-add').onclick=()=>{ if(selText){ doAdd(selText); clearSel(); } };
function selRect(){ if(anchor<0||!TOKENS[anchor])return null;
  const lo=Math.min(anchor,head),hi=Math.max(anchor,head);
  const a=TOKENS[lo].getBoundingClientRect(), b=TOKENS[hi].getBoundingClientRect();
  return {cx:(a.left+b.right)/2, bottom:Math.max(a.bottom,b.bottom)}; }
function showTransbox(enText, zhHtml){
  const tb=document.getElementById('transbox'); const r=selRect();
  tb.innerHTML='<div class="tb-en">'+(enText||'').replace(/</g,'&lt;')+
    '</div><div class="tb-zh">'+zhHtml+'</div>';
  if(r){ tb.style.left=Math.min(Math.max(r.cx,150),window.innerWidth-150)+'px';
    tb.style.top=(r.bottom+8)+'px'; }
  tb.style.display='block'; }
async function translate(text){
  if(!text) return;
  if(!cloudOn){ showTransbox(text,'需云函数支持'); return; }
  showTransbox(text,'翻译中…');
  try{
    const r=await fetch(TTS_API,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({op:'translate',text})});
    const j=await r.json();
    showTransbox(text, j.zh || ('翻译失败'+(j.error?'：'+j.error:'')));
  }catch(e){ showTransbox(text,'翻译失败，请重试'); }
}
document.getElementById('sel-translate').onclick=()=>{ if(selText){ const t=selText;
  selbar.style.display='none'; translate(t); } };
document.addEventListener('scroll',()=>{ if(!selecting){ selbar.style.display='none';
  document.getElementById('transbox').style.display='none'; } }, true);

</script>
