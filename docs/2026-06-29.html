<script>
const ARTICLE = {"date": "2026-06-29", "level": "CET-4", "title": "Spices and Silk: Stories from the Silk Road", "title_zh": "香料与丝绸：丝绸之路上的故事", "intro_zh": "本文约1000词，介绍丝绸之路上香料和丝绸贸易的生动故事，包括骆驼商队、沿途城市和不同文化的交流。", "paragraphs": [{"en": "The <span class=\"kw\" data-ipa=\"/ˈspaɪsiz/\" data-def=\"香料\">spices</span> we use today have traveled long distances. Over a thousand years ago, the Silk Road was not just a single path but a <span class=\"kw\" data-ipa=\"/ˈnetˌwɜːrk/\" data-def=\"网络\">network</span> of routes connecting East and West. It got its name from the precious silk that Chinese merchants traded, but many other goods were also <span class=\"kw\" data-ipa=\"/ˈeksˌtʃeɪndʒd/\" data-def=\"交换\">exchanged</span>. Among them, spices like cinnamon, pepper, and ginger were highly valued.", "zh": "我们今天使用的香料经历了漫长的旅程。一千多年前，丝绸之路不仅仅是一条单一的道路，而是一个连接东西方的路线网络。它因中国商人交易的珍贵丝绸而得名，但许多其他商品也被交换。其中，肉桂、胡椒和生姜等香料非常珍贵。"}, {"en": "Camels were the main <span class=\"kw\" data-ipa=\"/ˈviːɪklz/\" data-def=\"交通工具\">vehicles</span> for traveling across deserts. A typical caravan could have hundreds of camels carrying heavy loads. The journey was <span class=\"kw\" data-ipa=\"/ˈdeɪndʒərəs/\" data-def=\"危险的\">dangerous</span> due to extreme weather, thieves, and lack of water. Yet, traders were willing to take risks because the profits were enormous. A small bag of pepper could be worth a fortune in Europe.", "zh": "骆驼是穿越沙漠的主要交通工具。一个典型的商队可能有数百头骆驼驮着沉重的货物。由于极端天气、盗贼和缺水，旅程十分危险。然而，商人愿意冒险，因为利润巨大。一小袋胡椒在欧洲可能价值连城。"}, {"en": "One important stop on the Silk Road was the city of Samarkand. Located in present-day Uzbekistan, it was a <span class=\"kw\" data-ipa=\"/ˈhʌb/\" data-def=\"中心\">hub</span> where merchants from China, India, Persia, and Rome met. They not only traded goods but also shared ideas, religions, and technologies. For instance, the Chinese brought papermaking, while the Indians introduced Buddhism. This cultural <span class=\"kw\" data-ipa=\"/ɪkˈstʃeɪndʒ/\" data-def=\"交流\">exchange</span> changed the world.", "zh": "丝绸之路上的一个重要站点是撒马尔罕。位于今天的乌兹别克斯坦，它是中国、印度、波斯和罗马商人会面的中心。他们不仅交易商品，还分享思想、宗教和技术。例如，中国人带来了造纸术，而印度人介绍了佛教。这种文化交流改变了世界。"}, {"en": "Silk was not just a fabric; it was a symbol of wealth and power. Roman <span class=\"kw\" data-ipa=\"/ˈempərərz/\" data-def=\"皇帝\">emperors</span> wore silk robes, and the demand was so high that the Roman Senate tried to ban it because too much gold was flowing out. Chinese officials kept the secret of silk production for centuries. According to legend, a Chinese princess <span class=\"kw\" data-ipa=\"/ˈsmʌɡld/\" data-def=\"走私\">smuggled</span> silkworm eggs in her headdress, thus spreading sericulture to other lands.", "zh": "丝绸不仅仅是一种布料；它是财富和权力的象征。罗马皇帝穿着丝绸长袍，需求如此之高，以至于罗马元老院试图禁止它，因为太多黄金流出了。中国官员几个世纪都保守着丝绸生产的秘密。根据传说，一位中国公主将蚕卵藏在头饰中走私，从而将养蚕业传播到了其他地方。"}, {"en": "Spices were used not only for flavor but also for preserving food and making medicine. Before <span class=\"kw\" data-ipa=\"/rɪˈfrɪdʒəˌreɪtər/\" data-def=\"冰箱\">refrigeration</span>, people relied on salt and spices to keep meat from spoiling. Pepper was so valuable that it was sometimes used as money. The search for new spice routes led to the Age of Exploration. Christopher Columbus was actually trying to find a shorter way to the Spice Islands when he <span class=\"kw\" data-ipa=\"/dɪsˈkʌvərd/\" data-def=\"发现\">discovered</span> America.", "zh": "香料不仅用于调味，还用于保存食物和制药。在冰箱发明之前，人们依靠盐和香料防止肉类变质。胡椒非常珍贵，有时被用作货币。寻找新的香料路线导致了地理大发现时代。克里斯托弗·哥伦布实际上是在试图找到通往香料群岛的更短路线时发现了美洲。"}, {"en": "The Silk Road was not always peaceful. Wars and political changes often <span class=\"kw\" data-ipa=\"/ˌɪntəˈrʌptɪd/\" data-def=\"打断\">interrupted</span> trade. However, the connections it created lasted long after the routes themselves declined. Today, we can still see the influence in languages, food, and art. For example, the word 'pepper' comes from the Sanskrit 'pippali', showing how trade <span class=\"kw\" data-ipa=\"/ˈspreɪd/\" data-def=\"传播\">spread</span> words across continents.", "zh": "丝绸之路并非总是和平的。战争和政治变化常常中断贸易。然而，它所建立的连接在路线本身衰落之后仍然长期存在。今天，我们仍然可以在语言、食物和艺术中看到其影响。例如，'pepper'这个词来自梵语'pippali'，表明贸易如何将词汇传播到各大洲。"}, {"en": "One fascinating story involves a Chinese monk named Xuanzang. He traveled along the Silk Road to India to study Buddhism, facing many <span class=\"kw\" data-ipa=\"/ˈhɑːrdʃɪps/\" data-def=\"艰难\">hardships</span>. His journey took 17 years, and he brought back many Buddhist scriptures. His records provide valuable information about the regions he passed through. Today, his story is still told and even adapted into movies and TV shows.", "zh": "一个引人入胜的故事涉及一位名叫玄奘的中国僧人。他沿着丝绸之路前往印度学习佛教，面临许多艰难困苦。他的旅程历时17年，带回了许多佛经。他的记录提供了关于他经过地区的宝贵信息。今天，他的故事仍在流传，甚至被改编成电影和电视剧。"}, {"en": "In conclusion, the Silk Road was more than a trade route. It was a bridge between civilizations. The <span class=\"kw\" data-ipa=\"/ɪnˈkaʊntərz/\" data-def=\"相遇\">encounters</span> between different peoples led to <span class=\"kw\" data-ipa=\"/ɪnˈnoʊveɪʃənz/\" data-def=\"创新\">innovations</span> in science, art, and culture. Understanding this history helps us appreciate the connected world we live in today. Next time you use a spice or wear silk, remember the long journey it took to reach you.", "zh": "总之，丝绸之路不仅仅是一条贸易路线。它是文明之间的桥梁。不同民族之间的相遇导致了科学、艺术和文化的创新。理解这段历史有助于我们欣赏今天这个相互联系的世界。下次你使用香料或穿丝绸时，请记住它走过的那段漫长旅程。"}], "questions": [{"q": "What is the main idea of this passage?", "options": ["The Silk Road only traded silk and spices.", "The Silk Road was a network that facilitated trade and cultural exchange.", "Merchants on the Silk Road faced no dangers.", "The Silk Road declined because of wars."], "answer": 1, "explain": "文章主要讲述了丝绸之路作为连接东西方的贸易网络，不仅交易丝绸和香料，还促进了文化交流。选项A太片面，选项C与文中描述的dangerous不符，选项D不是主旨。"}, {"q": "According to the passage, why were spices highly valued?", "options": ["They were used only for flavor.", "They could preserve food and were used as medicine.", "They were easy to grow in Europe.", "They had no practical use."], "answer": 1, "explain": "文中提到‘Spices were used not only for flavor but also for preserving food and making medicine.’，因此选项B正确。选项A不完整，选项C和D错误。"}, {"q": "What can be inferred about the demand for silk in ancient Rome?", "options": ["It was low because silk was cheap.", "It was high enough to cause economic concerns.", "Roman emperors did not wear silk.", "The Roman Senate encouraged silk imports."], "answer": 1, "explain": "文中说‘the demand was so high that the Roman Senate tried to ban it because too much gold was flowing out’，可推断出需求高导致经济担忧。选项A、C、D与原文相反。"}, {"q": "The word 'smuggled' in paragraph 4 is closest in meaning to:", "options": ["bought legally", "carried secretly", "sold openly", "destroyed"], "answer": 1, "explain": "‘smuggled’意为‘走私’，即秘密携带。选项B‘秘密携带’符合。选项A‘合法购买’、C‘公开出售’、D‘破坏’都不对。"}]};
const TTS_API = "https://1300942703-hhwd575mtt.ap-guangzhou.tencentscf.com";
let rate = 0.95;
let voice = parseInt(localStorage.getItem('ttsVoice') || '101051', 10);
const cloudOn = TTS_API && TTS_API.indexOf('__') !== 0;

/* ========== 发音引擎(腾讯云按需 + 浏览器回退) ========== */
let usVoice=null;
function pickFallback(){ const vs=speechSynthesis.getVoices();
  usVoice=vs.find(v=>/en-US/i.test(v.lang)&&/Google|Natural|Neural|Enhanced|Siri|Premium/i.test(v.name))
        ||vs.find(v=>v.lang==='en-US')||vs.find(v=>/^en/i.test(v.lang))||null; }
pickFallback(); speechSynthesis.onvoiceschanged=pickFallback;

  if(usVoice)u.voice=usVoice; speechSynthesis.speak(u); }

const clipCache=new Map(); let curAudio=null, token=0;
function stopAll(){ token++; if(curAudio){curAudio.pause();curAudio=null;} speechSynthesis.cancel();
  document.querySelectorAll('.speaking').forEach(e=>e.classList.remove('speaking')); }
function splitClient(text){ const parts=text.trim().split(/(?<=[.!?;:])\s+/); const out=[]; let buf='';
  for(let s of parts){ while(s.length>180){ let c=s.lastIndexOf(' ',180); if(c<=0)c=180;
    out.push(s.slice(0,c)); s=s.slice(c).trim(); }
    if((buf+' '+s).trim().length<=180) buf=(buf+' '+s).trim();
    else { if(buf)out.push(buf); buf=s; } }
  if(buf)out.push(buf); return out.length?out:[text.trim()]; }
async function fetchClip(text){ const key=voice+'|'+text;
  if(clipCache.has(key))return clipCache.get(key);
  const r=await fetch(TTS_API,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({text,voice})});
  if(!r.ok)throw new Error('http'+r.status); const j=await r.json();
  if(!j.audio)throw new Error(j.error||'no audio');
  const url='data:audio/mp3;base64,'+j.audio; clipCache.set(key,url); return url; }
function playClip(url){ return new Promise((res,rej)=>{ const a=new Audio(url);
  a.playbackRate=rate; curAudio=a; a.onended=res; a.onerror=()=>rej(new Error('audio'));
  a.play().catch(rej); }); }
async function play(text, hiEl){
  if(!text) return; stopAll(); const my=token;
  if(hiEl)hiEl.classList.add('speaking');
  try{
    if(!cloudOn){ speakFallback(text); return; }
    const parts=splitClient(text);
    for(let i=0;i<parts.length;i++){ if(my!==token)return;
      const cur=fetchClip(parts[i]); if(i+1<parts.length)fetchClip(parts[i+1]).catch(()=>{});
      let url; try{ url=await cur; }catch(e){ speakFallback(parts.slice(i).join(' ')); return; }
      if(my!==token)return; await playClip(url); }
  } finally { if(my===token&&hiEl)hiEl.classList.remove('speaking'); }
}

/* 理解自测：渲染 CET-4 选择题，点选后判分并显示答案+解析 */
function esc(s){ return (s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
const LAB=['A','B','C','D','E','F'];
const quizEl=document.getElementById('quiz');
const QS=Array.isArray(ARTICLE.questions)?ARTICLE.questions:[];
if(QS.length){
  QS.forEach((q,qi)=>{
    const opts=Array.isArray(q.options)?q.options:[];
    let ans=q.answer;
    if(typeof ans==='string'){ ans='ABCDEF'.indexOf(ans.trim().toUpperCase()); }
    if(typeof ans!=='number'||ans<0||ans>=opts.length) ans=0;
    const card=document.createElement('div'); card.className='q';
    card.innerHTML='<div class="stem"><span class="num">Q'+(qi+1)+'.</span>'+esc(q.q||q.question||'')+'</div>';
    opts.forEach((o,oi)=>{
      const b=document.createElement('button'); b.className='opt'; b.type='button';
      b.innerHTML='<span class="lab">'+LAB[oi]+'</span><span>'+esc(o)+'</span>';
      b.onclick=()=>{ if(card.dataset.done) return; card.dataset.done='1';
        card.querySelectorAll('.opt').forEach((x,xi)=>{ x.disabled=true;
          if(xi===ans) x.classList.add('correct');
          else if(xi===oi) x.classList.add('wrong'); });
        const e=card.querySelector('.exp'); if(e) e.classList.add('show'); };
      card.appendChild(b);
    });
    const exp=document.createElement('div'); exp.className='exp';
    exp.innerHTML='<b>答案 '+LAB[ans]+'</b>　'+esc(q.explain||q.explanation||'');
    card.appendChild(exp);
    quizEl.appendChild(card);
  });
} else {
  document.getElementById('quiz-sec').style.display='none';   // 旧文章没有题目则隐藏
}

/* ========== toast ========== */
let toastT=null;
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),1600); }
async function doAdd(text){ text=(text||'').trim(); if(!text) return;
  if(!cloudOn){ toast('需云函数支持'); return; }
  toast('正在加入墨墨…');
  try{
    const r=await fetch(TTS_API,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({op:'maimemo',text})});
    const j=await r.json();
    if(j.ok){ toast(j.dup?'已经在墨墨里了':('已加入墨墨 ✓ 共 '+(j.total||'?')+' 词')); }
    else { toast('加入失败'+(j.error?'：'+j.error:'')); }
  }catch(e){ toast('加入失败，请重试'); } }

/* ========== 双击加生词，其他选词行为交给系统默认菜单 ========== */
const selbar=document.getElementById('selbar');
let selText='';
const artEl=document.getElementById('article');

function tokenize(){
  artEl.querySelectorAll('.en').forEach(en=>{
    en.querySelectorAll('.kw').forEach(k=>{ k.classList.add('tok');
      k.dataset.w=(k.firstChild.textContent||k.textContent).trim(); });
    const tw=document.createTreeWalker(en, NodeFilter.SHOW_TEXT, null);
    const nodes=[]; let n;
    while(n=tw.nextNode()){ const p=n.parentNode;
      if(p.classList&&(p.classList.contains('ipa')||p.classList.contains('tok'))) continue;
      if(p.closest&&p.closest('.kw')) continue;
      if(n.nodeValue.trim()) nodes.push(n); }
    nodes.forEach(tn=>{
      const frag=document.createDocumentFragment();
      tn.nodeValue.split(/(\s+)/).forEach(part=>{
        if(part==='') return;
        if(/^\s+$/.test(part)) frag.appendChild(document.createTextNode(part));
        else { const s=document.createElement('span'); s.className='tok';
          s.dataset.w=part; s.textContent=part; frag.appendChild(s); }
      });
      tn.parentNode.replaceChild(frag, tn);
    });
  });
}
tokenize();
let TOKENS=[];
function indexTokens(){ TOKENS=[...artEl.querySelectorAll('.tok')]; TOKENS.forEach((t,i)=>t.dataset.i=i); }
indexTokens();

function cleanToken(text){ return (text||'').trim().replace(/^[^A-Za-z]+|[^A-Za-z]+$/g,''); }
function clearSel(){ selbar.style.display='none'; selText=''; }
function showBar(tok){ selbar.style.display='flex';
  const r=tok.getBoundingClientRect();
  const bw=selbar.offsetWidth, bh=selbar.offsetHeight;
  let cx=Math.min(Math.max(r.left+r.width/2, bw/2+8), window.innerWidth-bw/2-8);  // 收拢进屏幕
  let top=r.top-8; if(top<bh+8) top=r.bottom+bh+12;          // 离顶太近则移到下方
  selbar.style.left=cx+'px'; selbar.style.top=top+'px'; }

artEl.addEventListener('dblclick', e=>{
  const tok=e.target.closest&&e.target.closest('.tok');
  if(!tok||!artEl.contains(tok)){ clearSel(); return; }
  selText=cleanToken(tok.dataset.w||tok.textContent);
  if(!selText){ clearSel(); return; }
  showBar(tok);
}, true);
document.getElementById('sel-add').onclick=()=>{ if(selText){ doAdd(selText); clearSel(); } };
document.addEventListener('click', e=>{ if(e.target.closest&&!e.target.closest('#selbar')) clearSel(); }, true);
document.addEventListener('scroll',()=>{ selbar.style.display='none'; }, true);

</script>
