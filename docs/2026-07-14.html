<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https:; media-src 'self' data: blob:; img-src 'self' data:; object-src 'none'; base-uri 'self'">
<title>每日英语 · Smartphones: The Remote Control for Modern Life</title>
<script>
/* 尽早设置主题，避免刷新时白屏闪烁：优先用户选择，否则跟随系统 */
(function(){try{var t=localStorage.getItem('theme');
  if(t!=='light'&&t!=='dark') t=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
  document.documentElement.setAttribute('data-theme',t);}catch(e){}})();
</script>
<style>
  :root{
    --bg:#f6f7f9; --card:#fff; --ink:#1f2329; --sub:#646a73;
    --line:#e5e6eb; --accent:#3370ff; --accent-soft:#eaf0ff; --accent-soft2:#dce7ff;
    --kw:#1456f0; --zh:#8a5a00; --zhbg:#fff8ec;
    --know:#2ea043; --fuzzy:#d29302; --forget:#e5484d;
    --selbg:#cfe0ff; --speakbg:#fff3cd; --shadow:rgba(0,0,0,.18);
    --ok-bg:#eaf7ee; --no-bg:#fdecec;
  }
  html[data-theme="dark"]{
    --bg:#15171a; --card:#22262b; --ink:#e6e8eb; --sub:#9aa0a6;
    --line:#343a42; --accent:#6b97ff; --accent-soft:#22304d; --accent-soft2:#2c3f63;
    --kw:#86a9ff; --zh:#e3b877; --zhbg:#2a2620;
    --know:#3fb950; --fuzzy:#e3a72f; --forget:#f06b70;
    --selbg:#33507e; --speakbg:#4a431f; --shadow:rgba(0,0,0,.5);
    --ok-bg:#1f3a28; --no-bg:#3a2222;
  }
  *{box-sizing:border-box}
  :focus-visible{outline:3px solid var(--accent);outline-offset:2px}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Segoe UI,Roboto,sans-serif;
    line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:720px;margin:0 auto;padding:18px 16px 120px}
  header{padding:6px 2px 14px;border-bottom:1px solid var(--line);margin-bottom:18px}
  .meta{font-size:12px;color:var(--sub);letter-spacing:.5px;text-transform:uppercase}
  h1{font-size:24px;margin:8px 0 4px;line-height:1.3}
  .h1zh{font-size:15px;color:var(--sub);margin:0}
  .intro{font-size:13px;color:var(--sub);background:var(--card);border:1px solid var(--line);
    border-radius:10px;padding:10px 12px;margin-top:14px}
  .toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:16px 0 4px}
  .btn{border:1px solid var(--line);background:var(--card);color:var(--ink);
    border-radius:20px;padding:6px 13px;font-size:13px;cursor:pointer;transition:.15s}
  .btn:hover{border-color:var(--accent);color:var(--accent)}
  .btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .speed{font-size:12px;color:var(--sub);display:flex;align-items:center;gap:6px}
  .vsel{font-size:12px;border:1px solid var(--line);border-radius:8px;padding:4px 6px;
    background:var(--card);color:var(--ink)}
  .para{background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:14px 16px;margin:14px 0;box-shadow:0 1px 2px rgba(0,0,0,.02)}
  .en{font-size:17px;line-height:1.85}
  .en .kw{color:var(--kw);font-weight:700;cursor:pointer;border-bottom:1px dashed rgba(20,86,240,.4)}
  .en .kw .ipa{font-size:.72em;font-weight:500;color:var(--sub);margin-left:2px;white-space:nowrap}
  .en .kw:hover{background:var(--accent-soft);border-radius:3px}
  .ptools{display:flex;gap:10px;margin-top:10px}
  .icbtn{border:none;background:var(--accent-soft);color:var(--accent);border-radius:8px;
    padding:5px 11px;font-size:12.5px;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
  .icbtn:hover{background:var(--accent-soft2)}
  .zh{display:none;margin-top:11px;padding-top:11px;border-top:1px dashed var(--line);
    font-size:14.5px;color:var(--zh);background:var(--zhbg);margin-left:-16px;margin-right:-16px;
    margin-bottom:-14px;padding:11px 16px 14px;border-radius:0 0 12px 12px}
  .para.show-zh .zh{display:block}
  h2.vh{font-size:18px;margin:30px 0 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  h2.vh .cnt{font-size:13px;color:var(--sub);font-weight:400}
  /* 复习模块 */
  #review{margin-top:30px}
  .rvcard{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:26px 18px;text-align:center;box-shadow:0 1px 2px rgba(0,0,0,.03)}
  .rv-type{font-size:12px;color:var(--sub);margin-bottom:10px}
  .rv-text{font-size:24px;font-weight:600;line-height:1.5;margin:6px 0 16px;word-break:break-word}
  .rv-text.sent{font-size:19px;font-weight:500}
  .rv-play{border:1px solid var(--line);background:var(--card);color:var(--accent);
    border-radius:20px;padding:7px 18px;font-size:14px;cursor:pointer;margin-bottom:20px}
  .rv-play:hover{border-color:var(--accent)}
  .rv-grade{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .rv-grade button{border:none;border-radius:10px;padding:11px 22px;font-size:15px;
    font-weight:600;color:#fff;cursor:pointer;transition:.15s;min-width:92px}
  .rv-grade button:active{transform:scale(.96)}
  .g-know{background:var(--know)}
  .g-fuzzy{background:var(--fuzzy)}
  .g-forget{background:var(--forget)}
  .rv-progress{font-size:12px;color:var(--sub);margin-top:16px}
  .rv-empty{font-size:15px;color:var(--sub);padding:18px 0}
  .rv-empty .big{font-size:30px;display:block;margin-bottom:8px}
  .syncbar{display:flex;align-items:center;justify-content:space-between;gap:10px;
    margin-top:12px;font-size:13px;color:var(--sub);flex-wrap:wrap}
  /* 选中弹出条 */
  #selbar{position:fixed;z-index:50;display:none;transform:translate(-50%,-100%);
    background:#1f2329;border-radius:12px;padding:5px;box-shadow:0 4px 14px rgba(0,0,0,.28);
    white-space:nowrap;gap:4px}
  #selbar button{background:transparent;border:none;color:#fff;font-size:13px;
    padding:7px 12px;border-radius:8px;cursor:pointer}
  #selbar button:hover{background:rgba(255,255,255,.15)}
  .tok.phrase-selected{background:var(--selbg);border-radius:4px}
  #phrase-preview,#phrase-hint,#phrase-add,#phrase-cancel{display:none}
  #selbar.phrase-mode{left:50%!important;top:auto!important;
    bottom:calc(12px + env(safe-area-inset-bottom));transform:translateX(-50%);
    width:min(calc(100vw - 24px),520px);flex-wrap:wrap;justify-content:center;
    align-items:center;white-space:normal}
  #selbar.phrase-mode #sel-add,#selbar.phrase-mode #sel-phrase{display:none}
  #selbar.phrase-mode #phrase-hint,#selbar.phrase-mode #phrase-cancel{display:inline-flex}
  #selbar.phrase-ready #phrase-hint{display:none}
  #selbar.phrase-ready #phrase-preview,#selbar.phrase-ready #phrase-add{display:inline-flex}
  #phrase-preview,#phrase-hint{color:#fff;font-size:13px}
  #phrase-preview{max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    color:#fff;font-size:13px;padding:7px 10px;flex:1 1 100%;justify-content:center}
  /* toast */
  #toast{position:fixed;left:50%;bottom:40px;transform:translateX(-50%) translateY(20px);
    background:#1f2329;color:#fff;padding:10px 18px;border-radius:22px;font-size:14px;
    opacity:0;pointer-events:none;transition:.25s;z-index:60}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  footer{text-align:center;color:var(--sub);font-size:12px;margin-top:36px}
  .tip{font-size:12px;color:var(--sub);margin:2px 0 0}
  .speaking{background:var(--speakbg) !important;border-radius:3px}
  #read-progress{position:fixed;z-index:90;top:0;left:0;width:0;height:3px;
    background:var(--accent);transition:width .12s linear}
  #continue-reading{display:none;align-items:center;gap:8px;margin:10px 0;padding:9px 11px;
    background:var(--accent-soft);border:1px solid var(--accent);border-radius:10px;font-size:13px}
  #continue-reading.show{display:flex} #continue-reading span{flex:1}
  .advanced{display:contents}
  #toolbar-more{display:none}
  #mobile-float{display:none;position:fixed;z-index:45;left:50%;bottom:calc(12px + env(safe-area-inset-bottom));
    transform:translateX(-50%);background:#1f2329;color:#fff;border-radius:24px;padding:5px;
    box-shadow:0 5px 18px var(--shadow);gap:3px}
  #mobile-float button{border:0;background:transparent;color:#fff;border-radius:18px;padding:8px 13px}
  @media (max-width:640px){
    .wrap{padding-bottom:calc(105px + env(safe-area-inset-bottom))}
    #toolbar-more{display:inline-flex}
    .toolbar .advanced{display:none;flex-basis:100%;padding:9px;border:1px solid var(--line);
      border-radius:12px;background:var(--card);gap:8px;align-items:center;flex-wrap:wrap}
    .toolbar .advanced.open{display:flex;position:fixed;z-index:44;left:12px;right:12px;
      bottom:calc(62px + env(safe-area-inset-bottom));box-shadow:0 5px 18px var(--shadow)}
    #mobile-float.visible{display:flex}
  }
  @media (prefers-reduced-motion:reduce){*{scroll-behavior:auto!important;transition:none!important}}
  /* 理解自测 */
  .quiz .q{background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:14px 16px;margin:14px 0}
  .quiz .stem{font-size:15.5px;font-weight:600;line-height:1.6;margin-bottom:10px}
  .quiz .stem .num{color:var(--accent);margin-right:6px}
  .quiz .opt{display:flex;align-items:flex-start;gap:9px;width:100%;text-align:left;
    border:1px solid var(--line);background:var(--bg);color:var(--ink);border-radius:9px;
    padding:10px 12px;margin:7px 0;font-size:14.5px;line-height:1.5;cursor:pointer;transition:.12s}
  .quiz .opt:hover{border-color:var(--accent)}
  .quiz .opt .lab{font-weight:700;color:var(--sub);flex-shrink:0}
  .quiz .opt.correct{background:var(--ok-bg);border-color:var(--know)}
  .quiz .opt.correct .lab{color:var(--know)}
  .quiz .opt.wrong{background:var(--no-bg);border-color:var(--forget)}
  .quiz .opt.wrong .lab{color:var(--forget)}
  .quiz .opt:disabled{cursor:default}
  .quiz .exp{display:none;margin-top:9px;padding:10px 12px;border-radius:9px;
    background:var(--zhbg);color:var(--zh);font-size:13.5px;line-height:1.6}
  .quiz .exp.show{display:block}
  #quiz-summary{display:none;margin:12px 0;padding:14px;border:1px solid var(--accent);
    background:var(--accent-soft);border-radius:12px;align-items:center;gap:8px;flex-wrap:wrap}
  #quiz-summary.show{display:flex} #quiz-result{font-weight:700;flex:1;min-width:180px}
  .en .tok{cursor:pointer}
  /* ---- 手机端排版优化 ---- */
  @media (max-width:480px){
    .wrap{padding:14px 12px calc(105px + env(safe-area-inset-bottom))}
    h1{font-size:21px}
    .h1zh{font-size:14px}
    .intro{font-size:12.5px}
    .en{font-size:16.5px;line-height:1.8}
    .en .kw .ipa{font-size:.62em;margin-left:1px}
    h2.vh{font-size:16.5px;margin:24px 0 10px}
    .toolbar{gap:6px}
    .btn{padding:6px 11px;font-size:12.5px}
    .rvcard{padding:22px 14px}
    .rv-text{font-size:22px}
    .rv-grade button{padding:10px 16px;font-size:14px;min-width:80px}
  }
</style>
</head>
<body>
<div id="read-progress" role="progressbar" aria-label="阅读进度" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"></div>
<div class="wrap">
  <header>
    <div class="meta">每日英语 · <span id="m-level"></span> · <span id="m-date"></span> · <a href="./" style="color:var(--accent);text-decoration:none">📚 目录</a></div>
    <h1 id="m-title"></h1>
    <p class="h1zh" id="m-titlezh"></p>
    <div class="intro" id="m-intro"></div>
    <div id="continue-reading"><span>继续上次阅读？</span>
      <button class="icbtn" id="resume-reading">继续阅读</button>
      <button class="icbtn" id="restart-reading">从头开始</button></div>
  </header>

  <div class="toolbar">
    <button class="btn on" id="tg-zh" aria-pressed="true">隐藏中文</button>
    <button class="btn on" id="tg-ipa" aria-pressed="true">隐藏音标</button>
    <button class="btn" id="play-all">▶ 朗读全文</button>
    <button class="btn" id="toolbar-more">更多</button>
    <div class="advanced" id="mobile-panel">
    <button class="btn" id="tg-theme" aria-pressed="false">🌙 夜间</button>
    <button class="btn" id="stop">⏹ 停止</button>
    <button class="btn" id="access-key">🔑 访问码</button>
    <span class="speed"><label for="rate">语速</label>
      <input type="range" id="rate" min="0.6" max="1.2" step="0.1" value="0.95">
      <span id="rateval">0.95×</span>
    </span>
    <span class="speed"><label for="voice">嗓音</label>
      <select id="voice" class="vsel">
        <option value="101051">英文女声 WeRose</option>
        <option value="101050">英文男声 WeJack</option>
      </select>
    </span>
    </div>
  </div>
  <p class="tip"><strong>生词</strong>：双击英文单词弹出「＋ 生词」；普通选词、翻译、查询使用浏览器或手机系统默认功能。<span id="engine-note"></span></p>

  <main id="article"></main>

  <section id="quiz-sec">
    <h2 class="vh">📝 理解自测 Comprehension</h2>
    <div class="quiz" id="quiz"></div>
    <div id="quiz-summary" aria-live="polite"><span id="quiz-result"></span>
      <button class="icbtn" id="quiz-wrong">只看错题</button>
      <button class="icbtn" id="quiz-reset">重新作答</button></div>
  </section>

  <footer>美式发音 · 双击加生词 · 系统默认选词/翻译</footer>
</div>

<div id="mobile-float" aria-label="移动阅读工具">
  <button id="mobile-play" aria-pressed="false">▶ 朗读</button>
  <button id="mobile-more" aria-expanded="false">•••</button>
</div>

<div id="selbar" role="toolbar" aria-live="polite">
  <span id="phrase-preview"></span>
  <span id="phrase-hint"></span>
  <button id="sel-add">＋ 单词</button>
  <button id="sel-phrase">选择短语</button>
  <button id="phrase-add">＋ 短语</button>
  <button id="phrase-cancel">取消</button>
</div>
<div id="toast"></div>

<script>
const ARTICLE = {"date": "2026-07-14", "level": "CET-4", "title": "Smartphones: The Remote Control for Modern Life", "title_zh": "智能手机：现代生活的遥控器", "intro_zh": "本文约1000词，探讨智能手机如何从通讯工具演变为生活遥控器，覆盖社交、支付、健康、出行、工作学习等场景，并讨论其利弊。", "paragraphs": [{"en": "Two decades ago, a mobile phone was simply a device to make calls. Today, the \u003cspan class=\"kw\" data-ipa=\"/ˈsmaːrtfoʊn/\" data-def=\"智能手机\"\u003esmartphone\u003c/span\u003e has become an \u003cspan class=\"kw\" data-ipa=\"/ɪnˈspɛnsəbl/\" data-def=\"不可或缺的\"\u003eindispensable\u003c/span\u003e tool that controls nearly every aspect of our lives. From waking us up in the morning to guiding us home at night, it functions like a remote control for the modern world. This \u003cspan class=\"kw\" data-ipa=\"/rɪˈmɑːrkəbl/\" data-def=\"显著的\"\u003eremarkable\u003c/span\u003e transformation has not only changed how we communicate but also reshaped our habits, relationships, and daily routines.", "zh": "二十年前，手机仅仅是一个通话设备。如今，智能手机已成为不可或缺的工具，掌控着我们生活的几乎每个方面。从早晨唤醒我们到夜晚引导我们回家，它就像现代世界的遥控器。这一显著的转变不仅改变了我们的沟通方式，也重塑了我们的习惯、人际关系和日常生活。"}, {"en": "One of the most obvious changes is in social interaction. Before smartphones, people arranged meetups by landline or in person. Now, with \u003cspan class=\"kw\" data-ipa=\"/ˈɪnstənt/\" data-def=\"即时的\"\u003einstant\u003c/span\u003e messaging apps like WeChat, we can \u003cspan class=\"kw\" data-ipa=\"/kəˈmyuːnɪkeɪt/\" data-def=\"交流\"\u003ecommunicate\u003c/span\u003e anytime, anywhere. However, this \u003cspan class=\"kw\" data-ipa=\"/kənˈviːniənt/\" data-def=\"方便的\"\u003econvenient\u003c/span\u003e connectivity has a downside. A 2019 study found that the average person checks their phone 96 times a day. Many people feel anxious if they cannot respond immediately, leading to a phenomenon called 'phubbing' — snubbing someone in favor of your phone.", "zh": "最明显的变化之一是社会交往。在智能手机出现之前，人们通过座机或当面安排聚会。如今，有了微信等即时通讯应用，我们可以随时随地交流。然而，这种便捷的连通性也有弊端。2019年的一项研究发现，普通人每天查看手机96次。许多人如果无法立即回复会感到焦虑，导致一种称为'低头族'的现象——因为手机而冷落他人。"}, {"en": "Smartphones have also revolutionized how we handle money. Mobile payment \u003cspan class=\"kw\" data-ipa=\"/ˌæplɪˈkeɪʃən/\" data-def=\"应用\"\u003eapplications\u003c/span\u003e such as Alipay and WeChat Pay allow users to pay bills, transfer money, and even invest with a few taps. This shift has made transactions faster and more \u003cspan class=\"kw\" data-ipa=\"/ˈsɪkjər/\" data-def=\"安全的\"\u003esecure\u003c/span\u003e, reducing the need to carry cash. In China, mobile payment volume exceeded 347 trillion yuan in 2022, showing how deeply embedded these services are in everyday life. Yet, it also raises concerns about \u003cspan class=\"kw\" data-ipa=\"/ˌpraɪvəˈsiː/\" data-def=\"隐私\"\u003eprivacy\u003c/span\u003e and data security, as every purchase leaves a digital footprint.", "zh": "智能手机也彻底改变了我们处理金钱的方式。支付宝和微信支付等移动支付应用让用户只需轻点几下就能支付账单、转账甚至投资。这一转变使交易更快更安全，减少了携带现金的需要。在中国，2022年移动支付金额超过347万亿元，显示了这些服务在日常生活中的深入程度。然而，这也引发了隐私和数据安全的担忧，因为每笔消费都会留下数字足迹。"}, {"en": "Health and fitness tracking is another area transformed by smartphones. With built-in sensors and dedicated apps, phones can count steps, monitor heart rate, and even analyze sleep patterns. Many people now use their smartphones as personal \u003cspan class=\"kw\" data-ipa=\"/ˈtreɪnər/\" data-def=\"教练\"\u003etrainers\u003c/span\u003e, setting daily exercise goals and receiving reminders to move. A 2020 survey indicated that 45% of smartphone users in the US use health apps. While this encourages a more active \u003cspan class=\"kw\" data-ipa=\"/ˈlaɪfstaɪl/\" data-def=\"生活方式\"\u003elifestyle\u003c/span\u003e, experts warn against over-reliance, as the accuracy of some \u003cspan class=\"kw\" data-ipa=\"/ˈsensərz/\" data-def=\"传感器\"\u003esensors\u003c/span\u003e can be questionable.", "zh": "健康和健身追踪是智能手机改变的另一个领域。借助内置传感器和专用应用，手机可以计步、监测心率甚至分析睡眠模式。许多人现在将智能手机用作私人教练，设定每日运动目标并接收活动提醒。2020年的一项调查显示，45%的美国智能手机用户使用健康应用。虽然这鼓励了更积极的生活方式，但专家警告不要过度依赖，因为某些传感器的准确性可能存疑。"}, {"en": "Navigation has become effortless thanks to smartphones. Gone are the days of folding paper maps; now, \u003cspan class=\"kw\" data-ipa=\"/ˌnævɪˈɡeɪʃən/ \" data-def=\"导航\"\u003enavigation\u003c/span\u003e apps like Gaode or Google Maps provide real-time traffic updates and route suggestions. This technology has not only saved time but also reduced the stress of getting lost. For example, a study by the University of Tokyo found that using GPS-based apps can improve \u003cspan class=\"kw\" data-ipa=\"/ˌspeɪʃəl/\" data-def=\"空间的\"\u003espatial\u003c/span\u003e awareness in unfamiliar environments. However, over-reliance may weaken our natural sense of direction, as our brains no longer need to \u003cspan class=\"kw\" data-ipa=\"/rɪˈmembər/\" data-def=\"记住\"\u003eremember\u003c/span\u003e routes.", "zh": "得益于智能手机，导航变得毫不费力。折叠纸质地图的日子已经一去不复返；现在，高德或谷歌地图等导航应用提供实时交通更新和路线建议。这项技术不仅节省了时间，还减少了迷路的压力。例如，东京大学的一项研究发现，使用基于GPS的应用可以提高在陌生环境中的空间意识。然而，过度依赖可能会削弱我们的自然方向感，因为我们的大脑不再需要记住路线。"}, {"en": "Smartphones have also transformed education and work. With \u003cspan class=\"kw\" data-ipa=\"/ˈməʊbaɪl/\" data-def=\"移动的\"\u003emobile\u003c/span\u003e learning platforms, students can access courses, take quizzes, and collaborate with classmates anytime. Similarly, remote work tools like DingTalk enable employees to hold meetings and share files on the go. This \u003cspan class=\"kw\" data-ipa=\"/flɛksəˈbɪləti/\" data-def=\"灵活性\"\u003eflexibility\u003c/span\u003e has broken traditional boundaries, allowing people to learn and work at their own pace. Yet, the constant connectivity can blur the line between work and personal life, leading to \u003cspan class=\"kw\" data-ipa=\"/ˈbɜːrnaʊt/\" data-def=\"倦怠\"\u003eburnout\u003c/span\u003e if not managed properly.", "zh": "智能手机也改变了教育和工作的方式。借助移动学习平台，学生可以随时访问课程、参加测验并与同学协作。同样，钉钉等远程工作工具使员工能够随时开会和共享文件。这种灵活性打破了传统界限，让人们可以按照自己的节奏学习和工作。然而，持续连接可能会模糊工作与个人生活的界限，如果管理不当会导致倦怠。"}, {"en": "Despite these benefits, the \u003cspan class=\"kw\" data-ipa=\"/dɪˈpendəns/\" data-def=\"依赖\"\u003edependence\u003c/span\u003e on smartphones has its dark side. Studies show that excessive use can lead to sleep disorders, eye strain, and reduced face-to-face interaction. A 2021 report indicated that teenagers who spend more than three hours a day on their phones are more likely to report symptoms of depression. It is important to find a \u003cspan class=\"kw\" data-ipa=\"/ˈbæləns/\" data-def=\"平衡\"\u003ebalance\u003c/span\u003e between utilizing technology and maintaining real-world connections. Setting screen time limits and having phone-free zones can help \u003cspan class=\"kw\" data-ipa=\"/ˈmɪtɪɡeɪt/\" data-def=\"缓解\"\u003emitigate\u003c/span\u003e these negative effects.", "zh": "尽管有这些好处，对智能手机的依赖也有其阴暗面。研究表明，过度使用会导致睡眠障碍、眼睛疲劳和面对面交流减少。2021年的一份报告指出，每天在手机上花费超过三小时的青少年更有可能报告抑郁症状。在利用技术和保持真实世界联系之间找到平衡非常重要。设置屏幕使用时间和无手机区域有助于缓解这些负面影响。"}, {"en": "In conclusion, the smartphone has truly become the remote control of modern life, offering unprecedented \u003cspan class=\"kw\" data-ipa=\"/kənˈviːniəns/\" data-def=\"便利\"\u003econvenience\u003c/span\u003e and efficiency. From communication and payment to health and navigation, its impact is profound. However, as we embrace this technology, we must remain aware of its potential drawbacks and strive for a healthy \u003cspan class=\"kw\" data-ipa=\"/ɪnˈtɛɡreɪʃən/\" data-def=\"整合\"\u003eintegration\u003c/span\u003e into our lives. The key lies in using smartphones as tools, not allowing them to control us.", "zh": "总之，智能手机确实已成为现代生活的遥控器，提供了前所未有的便利和效率。从通讯和支付到健康和导航，其影响深远。然而，在拥抱这项技术时，我们必须意识到其潜在弊端，并努力将其健康地融入我们的生活。关键在于将智能手机作为工具使用，而不是让它们控制我们。"}], "questions": [{"q": "What is the main idea of the passage?", "options": ["Smartphones have completely replaced traditional communication devices.", "Smartphones bring both convenience and challenges to modern life.", "People should stop using smartphones to avoid negative effects.", "Smartphones are mainly used for entertainment purposes."], "answer": 1, "explain": "文章主旨：智能手机带来便利（社交、支付、健康等）但也带来挑战（依赖、隐私、健康问题），因此B项准确概括了正反两方面。A过于绝对，C偏激，D片面。"}, {"q": "According to the passage, what is 'phubbing'?", "options": ["Checking your phone 96 times a day.", "Using a smartphone to pay for goods.", "Ignoring someone in favor of your phone.", "Feeling anxious when not using your phone."], "answer": 2, "explain": "细节题。第二段末尾解释phubbing为'snubbing someone in favor of your phone'，即冷落他人而关注手机，故选C。A是检查频率，B是移动支付，D是焦虑情绪，均不符。"}, {"q": "What concern about mobile payment does the author mention?", "options": ["It is too slow compared to cash.", "It may lead to overspending.", "It raises privacy and data security issues.", "It requires carrying a phone at all times."], "answer": 2, "explain": "细节题。第三段最后一句：'it also raises concerns about privacy and data security'，故选C。A与文中'faster'矛盾，B未提及，D不是担忧而是事实。"}, {"q": "What does the word 'mitigate' in paragraph 7 most likely mean?", "options": ["Increase", "Reduce", "Cause", "Ignore"], "answer": 1, "explain": "词义推断题。前文提到过度使用手机的负面影响，而后一句说设置屏幕时间限制等做法可以mitigate这些负面影响，根据语境，mitigate应为'减轻、缓解'，与reduce同义，故选B。"}]};

/* ========== 受保护云函数请求：个人访问码 + HMAC-SHA256 ========== */
const encoder=new TextEncoder();
function hex(bytes){ return [...new Uint8Array(bytes)].map(b=>b.toString(16).padStart(2,'0')).join(''); }
function accessKey(){
  let key=localStorage.getItem('APP_ACCESS_KEY')||'';
  if(!key) key=(prompt('请输入个人访问码（仅保存在本机）')||'').trim();
  if(key) localStorage.setItem('APP_ACCESS_KEY',key);
  return key;
}
async function protectedFetch(payload){
  const key=accessKey(); if(!key) throw new Error('未提供访问码');
  const body=JSON.stringify(payload);
  const timestamp=String(Math.floor(Date.now()/1000));
  const nonce=hex(crypto.getRandomValues(new Uint8Array(18)));
  const digest=hex(await crypto.subtle.digest('SHA-256',encoder.encode(body)));
  const cryptoKey=await crypto.subtle.importKey('raw',encoder.encode(key),
    {name:'HMAC',hash:'SHA-256'},false,['sign']);
  const signature=hex(await crypto.subtle.sign('HMAC',cryptoKey,
    encoder.encode(timestamp+'\n'+nonce+'\n'+digest)));
  const response=await fetch(TTS_API,{method:'POST',headers:{
    'Content-Type':'application/json','X-App-Timestamp':timestamp,
    'X-App-Nonce':nonce,'X-App-Signature':signature},body});
  if(response.status===401||response.status===403){
    localStorage.removeItem('APP_ACCESS_KEY');
    throw new Error('访问码无效或已过期，请重新输入');
  }
  return response;
}

/* ========== 发音引擎(腾讯云按需 + 浏览器回退) ========== */
let usVoice=null;
function pickFallback(){ const vs=speechSynthesis.getVoices();
  usVoice=vs.find(v=>/en-US/i.test(v.lang)&&/Google|Natural|Neural|Enhanced|Siri|Premium/i.test(v.name))
        ||vs.find(v=>v.lang==='en-US')||vs.find(v=>/^en/i.test(v.lang))||null; }
pickFallback(); speechSynthesis.onvoiceschanged=pickFallback;
function speakFallback(text){ return new Promise(resolve=>{ speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text); u.lang='en-US'; u.rate=rate;
  if(usVoice)u.voice=usVoice; u.onend=resolve; u.onerror=resolve; speechSynthesis.speak(u); }); }

const clipCache=new Map(); let curAudio=null, token=0, activeParagraph=-1;
function setSpeakingState(index){
  activeParagraph=typeof index==='number'?index:-1;
  document.querySelectorAll('.para').forEach((p,i)=>{
    p.classList.toggle('speaking',i===activeParagraph);
    if(i===activeParagraph)p.setAttribute('aria-current','true'); else p.removeAttribute('aria-current'); });
  const mobile=document.getElementById('mobile-play');
  mobile.textContent=activeParagraph>=0?'⏹ 停止':'▶ 朗读';
  mobile.setAttribute('aria-pressed',String(activeParagraph>=0));
}
function stopAll(){ token++; if(curAudio){curAudio.pause();curAudio=null;} speechSynthesis.cancel();
  setSpeakingState(-1); }
function splitClient(text){ const parts=text.trim().split(/(?<=[.!?;:])\s+/); const out=[]; let buf='';
  for(let s of parts){ while(s.length>180){ let c=s.lastIndexOf(' ',180); if(c<=0)c=180;
    out.push(s.slice(0,c)); s=s.slice(c).trim(); }
    if((buf+' '+s).trim().length<=180) buf=(buf+' '+s).trim();
    else { if(buf)out.push(buf); buf=s; } }
  if(buf)out.push(buf); return out.length?out:[text.trim()]; }
async function fetchClip(text){ const key=voice+'|'+text;
  if(clipCache.has(key))return clipCache.get(key);
  const r=await protectedFetch({text,voice});
  if(!r.ok)throw new Error('http'+r.status); const j=await r.json();
  if(!j.audio)throw new Error(j.error||'no audio');
  const url='data:audio/mp3;base64,'+j.audio; clipCache.set(key,url); return url; }
function playClip(url){ return new Promise((res,rej)=>{ const a=new Audio(url);
  a.playbackRate=rate; curAudio=a; a.onended=res; a.onerror=()=>rej(new Error('audio'));
  a.play().catch(rej); }); }
async function play(text, hiEl, paragraphIndex){
  if(!text) return; stopAll(); const my=token;
  if(typeof paragraphIndex==='number')setSpeakingState(paragraphIndex);
  else if(hiEl)hiEl.classList.add('speaking');
  try{
    if(!cloudOn){ await speakFallback(text); return; }
    const parts=splitClient(text);
    for(let i=0;i<parts.length;i++){ if(my!==token)return;
      const cur=fetchClip(parts[i]); if(i+1<parts.length)fetchClip(parts[i+1]).catch(()=>{});
      let url; try{ url=await cur; }catch(e){ await speakFallback(parts.slice(i).join(' ')); return; }
      if(my!==token)return; await playClip(url); }
  } finally { if(my===token){ if(hiEl)hiEl.classList.remove('speaking'); setSpeakingState(-1); } }
}

const progressBar=document.getElementById('read-progress');
const resumeBox=document.getElementById('continue-reading');
const mobilePanel=document.getElementById('mobile-panel');
function nearestParagraph(){
  const paras=[...document.querySelectorAll('.para')]; let best=0,dist=Infinity;
  paras.forEach((p,i)=>{ const d=Math.abs(p.getBoundingClientRect().top-innerHeight*.42);
    if(d<dist){dist=d;best=i;} }); return best;
}
function updateReadingProgress(){
  const max=Math.max(1,document.documentElement.scrollHeight-innerHeight);
  const ratio=Math.min(1,Math.max(0,scrollY/max)); const percent=Math.round(ratio*100);
  progressBar.style.width=percent+'%'; progressBar.setAttribute('aria-valuenow',String(percent));
  const lastParagraph=nearestParagraph();
  saveProgress({ratio,lastParagraph,completed:progressState.completed||ratio>=.92});
  const toolbar=document.querySelector('.toolbar');
  document.getElementById('mobile-float').classList.toggle('visible',
    innerWidth<=640&&toolbar.getBoundingClientRect().bottom<0);
}
let progressFrame=0;
addEventListener('scroll',()=>{ if(!progressFrame) progressFrame=requestAnimationFrame(()=>{
  progressFrame=0; updateReadingProgress(); }); },{passive:true});
addEventListener('resize',updateReadingProgress);
if(progressState.ratio>.05&&!progressState.completed) resumeBox.classList.add('show');
document.getElementById('resume-reading').onclick=()=>{
  const max=Math.max(0,document.documentElement.scrollHeight-innerHeight);
  scrollTo({top:max*progressState.ratio,behavior:'smooth'}); resumeBox.classList.remove('show'); };

    opts.forEach((o,oi)=>{
      const b=document.createElement('button'); b.className='opt'; b.type='button';
      b.innerHTML='<span class="lab">'+LAB[oi]+'</span><span>'+esc(o)+'</span>';
      b.onclick=()=>{ if(card.dataset.done) return; card.dataset.done='1'; answeredCount++;
        if(oi===ans)quizScore++; else{incorrectQuestions.push(qi);card.dataset.incorrect='true';}
        card.querySelectorAll('.opt').forEach((x,xi)=>{ x.disabled=true;
          if(xi===ans) x.classList.add('correct');
          else if(xi===oi) x.classList.add('wrong'); });
        const e=card.querySelector('.exp'); if(e) e.classList.add('show'); updateQuizSummary(); };
      card.appendChild(b);
    });
    const exp=document.createElement('div'); exp.className='exp';
    exp.innerHTML='<b>答案 '+LAB[ans]+'</b>　'+esc(q.explain||q.explanation||'');
    card.appendChild(exp);
    quizEl.appendChild(card);
  });
} else {
  document.getElementById('quiz-sec').style.display='none';   // 旧文章没有题目则隐藏
}
if(QS.length&&progressState.quizScore!==null&&progressState.quizTotal===QS.length){
  document.getElementById('quiz-result').textContent='上次得分 '+progressState.quizScore+' / '+QS.length;
  quizSummary.classList.add('show');
}
let wrongOnly=false;
document.getElementById('quiz-wrong').onclick=()=>{ wrongOnly=!wrongOnly;
  document.querySelectorAll('.quiz .q').forEach(card=>card.style.display=
    wrongOnly&&card.dataset.incorrect!=='true'?'none':'');
  document.getElementById('quiz-wrong').textContent=wrongOnly?'显示全部':'只看错题'; };
document.getElementById('quiz-reset').onclick=()=>{
  quizScore=0;answeredCount=0;incorrectQuestions=[];wrongOnly=false;
  document.querySelectorAll('.quiz .q').forEach(card=>{card.style.display='';delete card.dataset.done;
    delete card.dataset.incorrect;card.querySelectorAll('.opt').forEach(b=>{b.disabled=false;
      b.classList.remove('correct','wrong');});card.querySelector('.exp')?.classList.remove('show');});
  quizSummary.classList.remove('show');saveProgress({quizScore:null,quizTotal:0,completed:false}); };

/* ========== toast ========== */
let toastT=null;
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),1600); }
async function doAdd(text){ text=(text||'').trim(); if(!text) return;
  if(!cloudOn){ toast('需云函数支持'); return; }
  toast('正在加入墨墨…');
  try{
    const r=await protectedFetch({op:'maimemo',text});
    const j=await r.json();
    if(j.ok){ toast(j.dup?'已经在墨墨里了':('已加入墨墨 ✓ 共 '+(j.total||'?')+' 词')); }
    else { toast('加入失败'+(j.error?'：'+j.error:'')); }
  }catch(e){ toast('加入失败，请重试'); } }

/* ========== 双击加生词，其他选词行为交给系统默认菜单 ========== */
const selbar=document.getElementById('selbar');
let selText='';
let phraseStart=null, phraseEnd=null, phraseTokens=[];
const artEl=document.getElementById('article');

function tokenize(){
  artEl.querySelectorAll('.en').forEach(en=>{
    en.querySelectorAll('.kw').forEach(k=>{ k.classList.add('tok');
      k.dataset.w=(k.firstChild.textContent||k.textContent).trim(); });
    const tw=document.createTreeWalker(en, NodeFilter.SHOW_TEXT, null);
    const nodes=[]; let n;
    while(n=tw.nextNode()){ const p=n.parentNode;
      if(p.classList&&(p.classList.contains('ipa')||p.classList.contains('tok'))) continue;
      if(p.closest&&p.closest('.kw')) continue;
      if(n.nodeValue.trim()) nodes.push(n); }
    nodes.forEach(tn=>{
      const frag=document.createDocumentFragment();
      tn.nodeValue.split(/(\s+)/).forEach(part=>{
        if(part==='') return;
        if(/^\s+$/.test(part)) frag.appendChild(document.createTextNode(part));
        else { const s=document.createElement('span'); s.className='tok';
          s.dataset.w=part; s.textContent=part; frag.appendChild(s); }
      });
      tn.parentNode.replaceChild(frag, tn);
    });
  });
}
tokenize();
let TOKENS=[];
function indexTokens(){ TOKENS=[...artEl.querySelectorAll('.tok')]; TOKENS.forEach((t,i)=>t.dataset.i=i); }
indexTokens();

function cleanToken(text){ return (text||'').trim().replace(/^[^A-Za-z]+|[^A-Za-z]+$/g,''); }
function cleanPhraseEdge(text){
  return (text||'').trim().replace(/^[^A-Za-z]+|[^A-Za-z]+$/g,'');
}
function phraseFromTokens(tokens){
  return cleanPhraseEdge(tokens.map(t=>cleanPhraseEdge(t.dataset.w||t.textContent))
    .filter(Boolean).join(' '));
}
function clearPhraseHighlight(){
  phraseTokens.forEach(t=>t.classList.remove('phrase-selected'));
  phraseTokens=[];
}
function clearSel(){
  clearPhraseHighlight(); phraseStart=null; phraseEnd=null; selText='';
  selbar.classList.remove('phrase-mode','phrase-ready');
  document.getElementById('phrase-preview').textContent='';
  document.getElementById('phrase-hint').textContent='';
  selbar.style.display='none';
}
function exitPhraseMode(){ clearSel(); }
function enterPhraseMode(){
  if(!phraseStart) return;
  clearPhraseHighlight(); phraseTokens=[phraseStart];
  phraseStart.classList.add('phrase-selected'); selText='';
  selbar.classList.add('phrase-mode'); selbar.classList.remove('phrase-ready');
  document.getElementById('phrase-hint').textContent='请选择短语最后一个词';
  selbar.style.display='flex';
}
function selectPhraseEnd(end){
  const start=phraseStart;
  if(!start||start.closest('.en')!==end.closest('.en')){
    toast('短语需在同一段内'); exitPhraseMode(); return;
  }
  const siblings=[...start.closest('.en').querySelectorAll('.tok')];
  const a=siblings.indexOf(start), b=siblings.indexOf(end);
  const selected=siblings.slice(Math.min(a,b),Math.max(a,b)+1);
  if(selected.length<2){ toast('请再选择一个词'); return; }
  if(selected.length>10){ toast('短语最多 10 个词'); return; }
  clearPhraseHighlight(); phraseTokens=selected; phraseEnd=end;
  phraseTokens.forEach(t=>t.classList.add('phrase-selected'));
  selText=phraseFromTokens(phraseTokens);
  document.getElementById('phrase-preview').textContent=selText;
  selbar.classList.add('phrase-ready');
}
function showBar(tok){ selbar.style.display='flex';
  const r=tok.getBoundingClientRect();
  const bw=selbar.offsetWidth, bh=selbar.offsetHeight;
  let cx=Math.min(Math.max(r.left+r.width/2, bw/2+8), window.innerWidth-bw/2-8);  // 收拢进屏幕
  let top=r.top-8; if(top<bh+8) top=r.bottom+bh+12;          // 离顶太近则移到下方
  selbar.style.left=cx+'px'; selbar.style.top=top+'px'; }

artEl.addEventListener('dblclick', e=>{
  const tok=e.target.closest&&e.target.closest('.tok');
  if(!tok||!artEl.contains(tok)){ clearSel(); return; }
  clearSel(); phraseStart=tok;
  selText=cleanToken(tok.dataset.w||tok.textContent);
  if(!selText){ clearSel(); return; }
  showBar(tok);
}, true);
artEl.addEventListener('click',e=>{
  if(!selbar.classList.contains('phrase-mode')) return;
  const tok=e.target.closest&&e.target.closest('.tok');
  if(!tok) return;
  e.preventDefault(); e.stopPropagation(); selectPhraseEnd(tok);
},true);
document.getElementById('sel-add').onclick=()=>{ if(selText){ doAdd(selText); clearSel(); } };
document.getElementById('sel-phrase').onclick=e=>{ e.stopPropagation(); enterPhraseMode(); };
document.getElementById('phrase-add').onclick=e=>{
  e.stopPropagation(); if(selText){ doAdd(selText); exitPhraseMode(); }
};
document.getElementById('phrase-cancel').onclick=e=>{ e.stopPropagation(); exitPhraseMode(); };
document.addEventListener('click',e=>{
  if(!e.target.closest||e.target.closest('#selbar')) return;
  if(selbar.classList.contains('phrase-mode')&&e.target.closest('.tok')) return;
  clearSel();
},true);
document.addEventListener('scroll',()=>{
  if(!selbar.classList.contains('phrase-mode')) clearSel();
},true);

</script>
