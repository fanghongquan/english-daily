name: daily-english

on:
  schedule:
    # UTC 22:30 = 北京时间次日 06:30，每天推送一次
    - cron: "30 22 * * *"
  workflow_dispatch: {}   # 允许在 GitHub 网页上手动触发，方便测试

permissions:
  contents: write         # 允许把生成的网页提交回仓库（GitHub Pages 用）

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install openai || true

      - name: Build + push
        env:
          SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}
          TTS_API_URL:   ${{ vars.TTS_API_URL }}      # 腾讯云函数地址，注入网页
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          FEISHU_SECRET:  ${{ secrets.FEISHU_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL:   ${{ vars.OPENAI_BASE_URL }}
          OPENAI_MODEL:      ${{ vars.OPENAI_MODEL }}
        # 每天用 AI(DeepSeek)生成新文章；生成失败会自动回退到现有最新文章。
        run: python daily.py --source ai

      - name: Commit generated pages
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add articles docs
          git commit -m "daily: $(date -u +%F)" || echo "nothing to commit"
          git push
