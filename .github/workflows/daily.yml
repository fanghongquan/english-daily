name: daily-english

on:
  schedule:
    # GitHub 定时是“尽力而为”，整点/逢5的分钟最拥堵，常被延迟或丢弃。
    # 用冷门分钟 + 多个备用时段，靠 daily.py 的当日去重保证只推一次。
    - cron: "13 4 * * *"   # 北京 12:13 主推
    - cron: "37 4 * * *"   # 北京 12:37 备用①
    - cron: "7 5 * * *"    # 北京 13:07 备用②
  workflow_dispatch: {}   # 允许在 GitHub 网页上手动触发，方便测试

permissions:
  contents: write         # 允许把生成的网页提交回仓库（GitHub Pages 用）

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install openai || true

      - name: Build + push
        env:
          SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}
          TTS_API_URL:   ${{ vars.TTS_API_URL }}      # 腾讯云函数地址，注入网页
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          FEISHU_SECRET:  ${{ secrets.FEISHU_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL:   ${{ vars.OPENAI_BASE_URL }}
          OPENAI_MODEL:      ${{ vars.OPENAI_MODEL }}
        # 每天用 AI(DeepSeek)生成新文章；生成失败会自动回退到现有最新文章。
        run: python daily.py --source ai

      - name: Commit generated pages
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add articles docs
          git commit -m "daily: $(date -u +%F)" || echo "nothing to commit"
          git push
