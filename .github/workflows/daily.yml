name: daily-english

on:
  schedule:
    # GitHub 定时是“尽力而为”，整点/逢5的分钟最拥堵，常被延迟或丢弃。
    # 用冷门分钟 + 多个备用时段，靠 daily.py 的当日去重保证只推一次。
    - cron: "13 4 * * *"   # 北京 12:13 主推
    - cron: "37 4 * * *"   # 北京 12:37 备用①
    - cron: "7 5 * * *"    # 北京 13:07 备用②
  workflow_dispatch:      # 允许在 GitHub 网页上手动触发
    inputs:
      force:
        description: "强制重做今天的文章（即使已存在也重新生成并推送）"
        type: boolean
        default: false

permissions:
  contents: write         # 允许把生成的网页提交回仓库（GitHub Pages 用）

concurrency:
  group: daily-english
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Verify
        run: |
          python -m unittest discover -v
          python -m compileall -q *.py scf/index.py

      - name: Generate + build
        env:
          SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}
          TTS_API_URL:   ${{ vars.TTS_API_URL }}      # 腾讯云函数地址，注入网页
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          FEISHU_SECRET:  ${{ secrets.FEISHU_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL:   ${{ vars.OPENAI_BASE_URL }}
          OPENAI_MODEL:      ${{ vars.OPENAI_MODEL }}
        run: |
          FORCE=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then FORCE="--force"; fi
          python daily.py --source ai --no-push $FORCE
          if [ -n "$FORCE" ]; then rm -f "state/$(date -u +%F).json"; fi

      - name: Commit generated pages
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add articles docs state
          git commit -m "daily: $(date -u +%F)" || echo "nothing to commit"
          git push

      - name: Wait for published page
        env:
          SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}
        run: |
          PAGE="$SITE_BASE_URL/$(date -u +%F).html"
          for attempt in 1 2 3 4 5 6; do
            if curl --fail --silent --show-error "$PAGE" >/dev/null; then exit 0; fi
            sleep 10
          done
          echo "Page was not published: $PAGE" >&2
          exit 1

      - name: Push Feishu after publish
        env:
          SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}
          TTS_API_URL: ${{ vars.TTS_API_URL }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
        run: python daily.py --source ai

      - name: Commit delivery state
        run: |
          git add state
          git commit -m "delivery: $(date -u +%F)" || echo "nothing to commit"
          git push
